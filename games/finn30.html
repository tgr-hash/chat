  function updateLogic(dt) {
    state.time += dt;
    if (!state.gameStarted) {
      updateIdleMenuGame(dt);
      return;
    }
    if (state.toastTimer > 0) state.toastTimer -= dt;
    if (state.prepTimer > 0) state.prepTimer = Math.max(0, state.prepTimer - dt);
    if (state.finalityCinematicTimer > 0) {
      state.finalityCinematicTimer = Math.max(0, state.finalityCinematicTimer - dt);
      if (state.finalityCinematicTimer <= 0 && state.finalityRewardPending) {
        state.finalityRewardPending = false;
        if (!maybeUnlockWorld3FinalityRewards() && state.w3FinalDefeated && state.level < 125) {
          toast("Inequality Engine down. Reach World III level 125 for rebirth + win.", 3.2);
        }
      }
    }

    if (state.paused || state.modal || state.gameOver) return;

    if (state.prepTimer <= 0 && !majorBossFightActive() && state.finalityCinematicTimer <= 0) {
      state.spawnTimer -= dt;
      while (state.spawnTimer <= 0) {
        const deficit = Math.max(0, enemyCap() - state.enemies.length);
        let batchSize = Math.min(8, Math.max(1, deficit));
        if (state.world === 1 && state.level <= 6) {
          batchSize = Math.min(2, batchSize);
        } else if (state.world === 1 && state.level <= 10) {
          batchSize = Math.min(3, batchSize);
        }
        for (let i = 0; i < batchSize; i += 1) {
          spawnEnemy();
        }
        state.spawnTimer += 1 / spawnRate();
      }
    }

    updatePlayer(dt);
    updateDrones(dt);
    updateBullets(dt);
    updateEnemyBullets(dt);
    updateEnemies(dt);
    updateEffects(dt);
    maybeSpawnBoss();

    if (state.world === 1 && state.level >= 20 && !state.path && !state.ascendedPath) chooseWorld1Path();
    if (state.world === 2 && state.level >= 100 && !state.world3Unlocked) onLevelMilestones();
  }

  function drawBackground() {
    if (state.lightMode) {
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, state.world === 1 ? "#f2f7ff" : state.world === 2 ? "#eef4ff" : "#fff0f4");
      gradient.addColorStop(1, state.world === 1 ? "#d9e8ff" : state.world === 2 ? "#dfe6ff" : "#ffdbe4");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      const stars = state.world === 1 ? 80 : state.world === 2 ? 120 : 150;
      ctx.fillStyle = state.world === 1
        ? "rgba(52, 92, 165, 0.22)"
        : state.world === 2
          ? "rgba(85, 63, 156, 0.24)"
          : "rgba(156, 38, 62, 0.24)";
      for (let i = 0; i < stars; i += 1) {
        const x = (i * 157 + state.time * (8 + (i % 5))) % (width + 30);
        const y = ((i * 83) % height) + Math.sin(state.time * 0.5 + i) * 5;
        ctx.fillRect(x, y, 1.5, 1.5);
      }
      return;
    }

    const gradient = ctx.createLinearGradient(0, 0, width, height);
    gradient.addColorStop(0, state.world === 1 ? "#06080f" : state.world === 2 ? "#030512" : "#07030f");
    gradient.addColorStop(1, state.world === 1 ? "#111827" : state.world === 2 ? "#090d22" : "#2a0913");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);

    const stars = state.world === 1 ? 90 : state.world === 2 ? 140 : 170;
    ctx.fillStyle = state.world === 1
      ? "rgba(119, 166, 255, 0.18)"
      : state.world === 2
        ? "rgba(176, 140, 255, 0.20)"
        : "rgba(255, 126, 145, 0.24)";
    for (let i = 0; i < stars; i += 1) {
      const x = (i * 157 + state.time * (8 + (i % 5))) % (width + 30);
      const y = ((i * 83) % height) + Math.sin(state.time * 0.5 + i) * 5;
      ctx.fillRect(x, y, 1.5, 1.5);
    }
  }

  function drawPlayer() {
    const angle = playerAimAngle();
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(angle);

    if (state.optimizeMode) {
      const scale = state.path === "colossal"
        ? 1.34
        : state.path === "tank"
          ? 1.2
          : state.ascendedPath === "transcendental"
            ? 1.18
            : state.path === "create"
              ? 1.1
              : 1;
      const size = Math.max(10, player.radius * scale);
      const fill = state.path === "tank" || state.path === "colossal"
        ? "#40424e"
        : state.path === "spray"
          ? "#1c3554"
          : state.path === "create"
            ? "#22354f"
            : state.ascendedPath === "transcendental"
              ? "#2d2248"
              : "#2f9dfb";
      const stroke = state.lightMode ? "#1a2636" : "#d7ecff";
      fillStrokeTriangle(size, fill, stroke, 2);
    } else if (state.ascendedPath === "deployer") {
      ctx.fillStyle = "#091322";
      ctx.strokeStyle = "#78e8ff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(30, 0);
      ctx.lineTo(6, -11);
      ctx.lineTo(-18, -18);
      ctx.lineTo(-26, -7);
      ctx.lineTo(-16, 0);
      ctx.lineTo(-26, 7);
      ctx.lineTo(-18, 18);
      ctx.lineTo(6, 11);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#6ae8ff";
      ctx.beginPath();
      ctx.arc(12, 0, 5, 0, TAU);
      ctx.fill();

      ctx.fillStyle = "#18314a";
      ctx.fillRect(-16, -14, 7, 11);
      ctx.fillRect(-16, 3, 7, 11);

      ctx.fillStyle = "#5ecfff";
      ctx.fillRect(26, -3, 10, 2);
      ctx.fillRect(26, 1, 10, 2);
    } else if (state.ascendedPath === "transcendental") {
      ctx.fillStyle = "#140d22";
      ctx.strokeStyle = "#c7a8ff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(0, -22);
      ctx.lineTo(20, 0);
      ctx.lineTo(0, 22);
      ctx.lineTo(-20, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.strokeStyle = "#9be8ff";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-10, 0);
      ctx.lineTo(10, 0);
      ctx.moveTo(0, -10);
      ctx.lineTo(0, 10);
      ctx.stroke();

      ctx.strokeStyle = "rgba(186, 151, 255, 0.75)";
      ctx.lineWidth = 1.8;
      for (let i = 0; i < 2; i += 1) {
        const spin = state.time * (i === 0 ? 1.8 : -1.4);
        const radius = 24 + i * 8 + Math.sin(state.time * 4 + i) * 1.6;
        ctx.beginPath();
        ctx.arc(0, 0, radius, spin, spin + Math.PI * 1.45);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(125, 236, 255, 0.48)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(0, 0, 34 + Math.sin(state.time * 3.5) * 1.8, 0, TAU);
      ctx.stroke();
    } else if (state.path === "spray") {
      ctx.fillStyle = "#0d1a2a";
      ctx.strokeStyle = "#8fc8ff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-24, -12);
      ctx.lineTo(8, -14);
      ctx.lineTo(22, -8);
      ctx.lineTo(26, -6);
      ctx.lineTo(26, 6);
      ctx.lineTo(22, 8);
      ctx.lineTo(8, 14);
      ctx.lineTo(-24, 12);
      ctx.lineTo(-14, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#b5eeff";
      ctx.fillRect(24, -8, 4, 16);
      ctx.fillStyle = "#79d4ff";
      for (let i = -2; i <= 2; i += 1) {
        ctx.fillRect(28, i * 3.6 - 1, 7, 2);
      }
    } else if (state.path === "create") {
      ctx.fillStyle = "#131a2c";
      ctx.strokeStyle = "#9ed8ff";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(24, 0);
      ctx.lineTo(8, -18);
      ctx.lineTo(-18, -16);
      ctx.lineTo(-24, 0);
      ctx.lineTo(-18, 16);
      ctx.lineTo(8, 18);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#c8ecff";
      ctx.beginPath();
      ctx.arc(6, 0, 5, 0, TAU);
      ctx.fill();

      ctx.strokeStyle = "rgba(151, 224, 255, 0.7)";
      ctx.lineWidth = 1.4;
      for (let i = 0; i < 3; i += 1) {
        const r = 19 + i * 6 + Math.sin(state.time * 2.8 + i) * 1.1;
        ctx.beginPath();
        ctx.arc(0, 0, r, state.time * (0.8 + i * 0.25), state.time * (0.8 + i * 0.25) + Math.PI * 0.95);
        ctx.stroke();
      }
    } else if (state.path === "tank") {
      const outer = player.radius + 3;
      const inner = Math.max(8, player.radius - 2);
      ctx.fillStyle = "#2a2a34";
      ctx.strokeStyle = "#9fb6d7";
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      for (let i = 0; i < 6; i += 1) {
        const a = (i / 6) * TAU;
        const r = i % 2 === 0 ? outer : inner;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#c3cee0";
      ctx.fillRect(-6, -4, 18, 8);
    } else if (state.path === "colossal") {
      const outer = player.radius + 5;
      const inner = player.radius * 0.66;
      ctx.fillStyle = "#33262a";
      ctx.strokeStyle = "#ffadb2";
      ctx.lineWidth = 3.2;
      ctx.beginPath();
      for (let i = 0; i < 8; i += 1) {
        const a = (i / 8) * TAU;
        const r = i % 2 === 0 ? outer : inner;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#ffd0d3";
      ctx.fillRect(-10, -5, 24, 10);
      ctx.strokeStyle = "rgba(255, 174, 183, 0.6)";
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.arc(0, 0, outer + 5 + Math.sin(state.time * 4) * 2, 0, TAU);
      ctx.stroke();
    } else {
      ctx.fillStyle = "#2f9dfb";
      ctx.beginPath();
      ctx.arc(0, 0, player.radius, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = "#b8f4ff";
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.restore();

    if (player.invuln > 0) {
      ctx.strokeStyle = "rgba(183, 239, 255, 0.6)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 8 + Math.sin(state.time * 20), 0, TAU);
      ctx.stroke();
    }

    if (player.tempHp > 0) {
      const shieldFrac = clamp(player.tempHp / 2000, 0, 1);
      ctx.strokeStyle = `rgba(120, 244, 255, ${0.28 + shieldFrac * 0.5})`;
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius + 14 + Math.sin(state.time * 3.3) * 1.2, 0, TAU);
      ctx.stroke();
    }
  }

  function drawEnemies() {
    for (const enemy of state.enemies) {
      const hpFrac = clamp(enemy.healthBar, 0, 1);
      ctx.save();
      ctx.translate(enemy.x, enemy.y);

      if (state.optimizeMode) {
        const phase = enemy.phase || 0;
        const wobble = enemy.boss ? 1 + Math.sin(state.time * 2 + phase * 0.8) * 0.08 : 1;
        const triSize = Math.max(6, enemy.size * wobble);
        const fill = enemy.boss
          ? enemy.type === "bossHyperDodeca"
            ? "#7a2436"
            : enemy.type === "bossW3Final"
              ? "#581428"
              : "#643142"
          : enemy.crimsonVariant
            ? "#380a14"
            : enemy.color;
        const stroke = state.lightMode ? "#162437" : "#eaf4ff";
        const spin = enemy.boss ? state.time * 0.9 + phase * 0.15 : 0;
        fillStrokeTriangle(triSize, fill, stroke, enemy.boss ? 2.8 : 1.6, spin);
        if (enemy.boss) {
          const coreFill = enemy.type === "bossW3Final"
            ? "rgba(255, 126, 149, 0.36)"
            : "rgba(255, 216, 228, 0.34)";
          fillStrokeTriangle(
            Math.max(5, triSize * 0.58),
            coreFill,
            "rgba(255, 244, 248, 0.74)",
            1.2,
            -state.time * 1.3
          );
        }
      } else if (enemy.type === "bossSuper") {
        const pulse = 0.92 + 0.08 * Math.sin(state.time * 4);
        ctx.rotate(state.time * 0.5);
        ctx.fillStyle = "#3f1650";
        ctx.strokeStyle = "#ffd0ff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const a = -Math.PI / 2 + (i / 10) * TAU;
          const r = i % 2 === 0 ? enemy.size * 1.08 : enemy.size * 0.68;
          const x = Math.cos(a) * r;
          const y = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.rotate(-state.time * 1.15);
        ctx.fillStyle = "#7d3cb0";
        ctx.beginPath();
        for (let i = 0; i < 5; i += 1) {
          const a = -Math.PI / 2 + (i / 5) * TAU;
          const x = Math.cos(a) * enemy.size * 0.56;
          const y = Math.sin(a) * enemy.size * 0.56;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = `rgba(255, 211, 255, ${0.75 * pulse})`;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.size * 0.22, 0, TAU);
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 208, 255, 0.5)";
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.size * 1.28 * pulse, 0, TAU);
        ctx.stroke();
      } else if (enemy.type === "bossW2Hex") {
        const pulse = 0.9 + 0.1 * Math.sin(state.time * 3.2);
        ctx.rotate(state.time * 0.62);
        ctx.fillStyle = "#1a2e61";
        ctx.strokeStyle = "#c6ddff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let i = 0; i < 6; i += 1) {
          const a = -Math.PI / 2 + (i / 6) * TAU;
          const x = Math.cos(a) * enemy.size;
          const y = Math.sin(a) * enemy.size;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.rotate(-state.time * 1.2);
        ctx.fillStyle = "#86b8ff";
        ctx.beginPath();
        for (let i = 0; i < 6; i += 1) {
          const a = -Math.PI / 2 + (i / 6) * TAU;
          const x = Math.cos(a) * enemy.size * 0.54;
          const y = Math.sin(a) * enemy.size * 0.54;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = "rgba(210, 228, 255, 0.55)";
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.size * 1.2 * pulse, 0, TAU);
        ctx.stroke();
      } else if (enemy.type === "bossW2Tri") {
        ctx.rotate(state.time * 1.3 + enemy.phase);
        ctx.fillStyle = "#36558a";
        ctx.strokeStyle = "#e0edff";
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(0, -enemy.size);
        ctx.lineTo(enemy.size * 0.88, enemy.size * 0.72);
        ctx.lineTo(-enemy.size * 0.88, enemy.size * 0.72);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#d5e8ff";
        ctx.beginPath();
        ctx.moveTo(0, -enemy.size * 0.42);
        ctx.lineTo(enemy.size * 0.34, enemy.size * 0.24);
        ctx.lineTo(-enemy.size * 0.34, enemy.size * 0.24);
        ctx.closePath();
        ctx.fill();
      } else if (enemy.type === "bossHyperDodeca") {
        const t = state.time;
        const pulse = 0.82 + 0.18 * Math.sin(t * 1.9);
        const quality = hyperBossQualityScale();
        const layers = Math.max(3, Math.round(8 * quality));
        const rings = Math.max(2, Math.round(6 * quality));
        const ringPoints = Math.max(12, Math.round(30 * quality));
        const heavyFx = quality > 0.66;

        ctx.globalCompositeOperation = heavyFx ? "lighter" : "source-over";
        for (let layer = 0; layer < layers; layer += 1) {
          ctx.save();
          const spin = t * (0.12 + layer * 0.06) * (layer % 2 === 0 ? 1 : -1) + Math.sin(t * 0.9 + layer) * 0.55;
          ctx.rotate(spin);
          const poly = Math.max(10, Math.round((16 + layer * 2) * (0.68 + quality * 0.45)));
          const shade = layer % 2 === 0 ? "255, 100, 130" : "125, 14, 38";
          const alpha = 0.12 + layer * 0.025;
          ctx.fillStyle = `rgba(${shade}, ${alpha})`;
          ctx.strokeStyle = layer % 2 === 0 ? "rgba(255, 178, 198, 0.55)" : "rgba(164, 22, 55, 0.55)";
          ctx.lineWidth = (1.2 + layer * 0.2) * (0.65 + quality * 0.45);
          ctx.shadowColor = heavyFx
            ? layer % 2 === 0 ? "rgba(255, 145, 171, 0.58)" : "rgba(110, 12, 32, 0.65)"
            : "transparent";
          ctx.shadowBlur = heavyFx ? (16 + layer * 5) * quality : 0;
          ctx.beginPath();
          for (let i = 0; i < poly; i += 1) {
            const a = (i / poly) * TAU;
            const split = 0.64 + 0.22 * Math.sin(a * 5 + t * 1.7 + layer * 0.6);
            const edge = 0.1 * Math.cos(a * 13 - t * 2.1 + layer);
            const micro = 0.055 * Math.sin(a * 26 + t * 3.1 + layer * 1.4);
            const r = enemy.size * (1.03 - layer * 0.085) * (split + edge + micro);
            const x = Math.cos(a) * r;
            const y = Math.sin(a) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }
        ctx.globalCompositeOperation = "source-over";

        for (let ring = 0; ring < rings; ring += 1) {
          const wobble = Math.sin(t * (1.1 + ring * 0.14) + ring) * 0.32;
          const radius = enemy.size * (0.32 + ring * 0.1 + wobble * 0.06);
          ctx.strokeStyle = ring % 2 === 0 ? "rgba(255, 186, 203, 0.44)" : "rgba(145, 16, 43, 0.5)";
          ctx.lineWidth = 2.1 * (0.7 + quality * 0.35);
          ctx.beginPath();
          for (let i = 0; i <= ringPoints; i += 1) {
            const a = (i / ringPoints) * TAU + t * (0.22 + ring * 0.05);
            const edgeBreak = 1 + 0.16 * Math.sin(a * 7 + t * 2.2 + ring * 0.8);
            const x = Math.cos(a) * radius * edgeBreak;
            const y = Math.sin(a) * radius * edgeBreak;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }

        ctx.strokeStyle = `rgba(255, 218, 228, ${0.58 + pulse * 0.2})`;
        ctx.lineWidth = 4.8;
        ctx.shadowColor = heavyFx ? "rgba(255, 132, 160, 0.75)" : "transparent";
        ctx.shadowBlur = heavyFx ? 20 : 0;
        ctx.beginPath();
        ctx.moveTo(-enemy.size * 0.43, -enemy.size * 0.08);
        ctx.lineTo(enemy.size * 0.43, enemy.size * 0.08);
        ctx.moveTo(-enemy.size * 0.08, -enemy.size * 0.43);
        ctx.lineTo(enemy.size * 0.08, enemy.size * 0.43);
        ctx.moveTo(-enemy.size * 0.32, enemy.size * 0.31);
        ctx.lineTo(enemy.size * 0.32, -enemy.size * 0.31);
        ctx.moveTo(-enemy.size * 0.32, -enemy.size * 0.31);
        ctx.lineTo(enemy.size * 0.32, enemy.size * 0.31);
        ctx.stroke();
        ctx.shadowBlur = 0;

        if (quality > 0.58) {
          const coreGlow = ctx.createRadialGradient(0, 0, enemy.size * 0.05, 0, 0, enemy.size * 0.36);
          coreGlow.addColorStop(0, "rgba(255, 237, 242, 0.97)");
          coreGlow.addColorStop(1, "rgba(255, 94, 122, 0.06)");
          ctx.fillStyle = coreGlow;
        } else {
          ctx.fillStyle = "rgba(255, 175, 194, 0.44)";
        }
        ctx.beginPath();
        ctx.arc(0, 0, enemy.size * 0.36, 0, TAU);
        ctx.fill();
      } else if (enemy.type === "bossW3Final") {
        const t = state.time;
        const reforming = Boolean(enemy.reforming);
        const stage2 = enemy.stage >= 2 && !reforming;
        if (reforming) {
          const duration = Math.max(0.1, enemy.reformDuration || 2.2);
          const reformT = 1 - clamp(enemy.reformTimer / duration, 0, 1);
          if (reformT < 0.2) {
            ctx.restore();
            continue;
          }
          const appear = clamp((reformT - 0.2) / 0.8, 0, 1);
          const flicker = 0.46 + 0.54 * (0.5 + 0.5 * Math.sin(t * 92 + enemy.phase * 3.7));
          ctx.globalAlpha *= appear * flicker;
        }
        const pulse = 0.78 + 0.22 * Math.sin(t * (stage2 ? 3.8 : 2.4));
        if (stage2) {
          const jitterX = Math.sin(t * 69 + enemy.phase * 3.2) * 2.6;
          const jitterY = Math.cos(t * 74 + enemy.phase * 2.4) * 2.6;
          ctx.translate(jitterX, jitterY);
        }

        ctx.globalCompositeOperation = "lighter";
        for (let layer = 0; layer < (stage2 ? 7 : 6); layer += 1) {
          ctx.save();
          const spin = t * (0.24 + layer * 0.11) * (layer % 2 === 0 ? 1 : -1) + Math.sin(t * (0.7 + layer * 0.18)) * (stage2 ? 1.25 : 0.9);
          ctx.rotate(spin);
          const hue = layer % 2 === 0 ? "255, 104, 128" : "130, 18, 42";
          const alpha = 0.16 + layer * 0.03;
          ctx.fillStyle = `rgba(${hue}, ${alpha})`;
          ctx.shadowColor = layer % 2 === 0 ? "rgba(255, 132, 150, 0.65)" : "rgba(120, 12, 33, 0.72)";
          ctx.shadowBlur = 24 + layer * 7;
          ctx.beginPath();
          for (let i = 0; i < 10; i += 1) {
            const a = (i / 10) * TAU;
            const irregular = 0.68 + 0.22 * Math.sin(t * 1.8 + i * 1.37 + layer);
            const ripple = 0.12 * Math.cos(t * (1.1 + layer * 0.12) + i * 2.2);
            const r = enemy.size * (1.03 - layer * 0.1) * (irregular + ripple);
            const x = Math.cos(a) * r;
            const y = Math.sin(a) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
        ctx.globalCompositeOperation = "source-over";

        const scale = enemy.size * 0.7;
        for (let mirror = -1; mirror <= 1; mirror += 2) {
          ctx.beginPath();
          for (let i = 0; i <= 54; i += 1) {
            const xNorm = -1 + (i / 54) * 2;
            const yNorm = mirror * (0.22 + Math.pow(Math.abs(xNorm), 1.58) * 0.54 + Math.sin(t * 2.3 + xNorm * 4.7) * 0.09);
            const x = xNorm * scale;
            const y = yNorm * scale * 0.58;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = mirror > 0 ? "rgba(255, 152, 167, 0.72)" : "rgba(123, 20, 40, 0.78)";
          ctx.lineWidth = 2.8;
          ctx.shadowColor = mirror > 0 ? "rgba(255, 126, 146, 0.75)" : "rgba(111, 15, 34, 0.76)";
          ctx.shadowBlur = 18;
          ctx.stroke();
        }

        for (let ring = 0; ring < (stage2 ? 7 : 3); ring += 1) {
          ctx.save();
          const spin = t * (0.36 + ring * 0.14) * (ring % 2 === 0 ? 1 : -1);
          const radius = enemy.size * (0.56 + ring * 0.16 + Math.sin(t * (1.2 + ring * 0.22)) * 0.03);
          const flatten = 0.6 + Math.sin(t * (1.6 + ring * 0.19) + ring * 1.1) * 0.08;
          ctx.rotate(spin);
          ctx.strokeStyle = ring % 2 === 0 ? "rgba(255, 182, 197, 0.62)" : "rgba(118, 20, 38, 0.72)";
          ctx.lineWidth = 2.2 - ring * 0.25;
          ctx.shadowColor = ring % 2 === 0 ? "rgba(255, 130, 149, 0.65)" : "rgba(95, 13, 29, 0.72)";
          ctx.shadowBlur = 16 - ring * 2;
          ctx.setLineDash([12 + ring * 4, 7 + ring * 2]);
          ctx.beginPath();
          ctx.ellipse(0, 0, radius, radius * flatten, 0, 0, TAU);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }

        ctx.strokeStyle = `rgba(255, 194, 206, ${0.55 + pulse * 0.2})`;
        ctx.lineWidth = 4.2;
        ctx.shadowColor = "rgba(255, 145, 160, 0.75)";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.moveTo(-enemy.size * 0.38, -enemy.size * 0.38);
        ctx.lineTo(enemy.size * 0.38, enemy.size * 0.38);
        ctx.moveTo(enemy.size * 0.38, -enemy.size * 0.38);
        ctx.lineTo(-enemy.size * 0.38, enemy.size * 0.38);
        ctx.stroke();
        ctx.shadowBlur = 0;

        const coreGlow = ctx.createRadialGradient(0, 0, enemy.size * 0.06, 0, 0, enemy.size * 0.42);
        coreGlow.addColorStop(0, "rgba(255, 230, 236, 0.95)");
        coreGlow.addColorStop(1, "rgba(255, 96, 120, 0.05)");
        ctx.fillStyle = coreGlow;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.size * 0.42, 0, TAU);
        ctx.fill();

        if (stage2) {
          ctx.strokeStyle = "rgba(255, 88, 109, 0.74)";
          ctx.lineWidth = 2.6;
          for (let i = 0; i < 4; i += 1) {
            const r = enemy.size * (0.86 + i * 0.23 + Math.sin(t * (3.2 + i * 0.8)) * 0.04);
            ctx.beginPath();
            ctx.ellipse(0, 0, r, r * (0.72 + i * 0.06), t * (0.5 + i * 0.17), 0, TAU);
            ctx.stroke();
          }
        }
      } else if (enemy.boss) {
        ctx.fillStyle = enemy.color;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.roundRect(-enemy.size, -enemy.size, enemy.size * 2, enemy.size * 2, 10);
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.fillStyle = enemy.color;
        const isCrimsonSentinel = enemy.type === "beamSentinel" && enemy.crimsonVariant;
        if (isCrimsonSentinel) ctx.fillStyle = "#821329";
        ctx.beginPath();
        if (enemy.type === "xpCache") {
          ctx.roundRect(-enemy.size, -enemy.size * 0.8, enemy.size * 2, enemy.size * 1.6, 6);
        } else if (enemy.type === "latticeRunner") {
          ctx.moveTo(0, -enemy.size);
          ctx.lineTo(enemy.size * 0.92, -enemy.size * 0.15);
          ctx.lineTo(enemy.size * 0.34, enemy.size);
          ctx.lineTo(-enemy.size * 0.34, enemy.size);
          ctx.lineTo(-enemy.size * 0.92, -enemy.size * 0.15);
          ctx.closePath();
        } else if (enemy.type === "theoremKnight") {
          ctx.roundRect(-enemy.size, -enemy.size, enemy.size * 2, enemy.size * 2, 10);
        } else if (enemy.type === "axiomTurret") {
          ctx.moveTo(0, -enemy.size);
          ctx.lineTo(enemy.size, 0);
          ctx.lineTo(0, enemy.size);
          ctx.lineTo(-enemy.size, 0);
          ctx.closePath();
        } else if (enemy.type === "paradoxReaver") {
          ctx.roundRect(-enemy.size, -enemy.size * 0.85, enemy.size * 2, enemy.size * 1.7, 7);
        } else if (enemy.type === "beamSentinel") {
          ctx.moveTo(0, -enemy.size);
          ctx.lineTo(enemy.size * 0.56, -enemy.size * 0.2);
          ctx.lineTo(enemy.size * 0.88, 0);
          ctx.lineTo(enemy.size * 0.56, enemy.size * 0.2);
          ctx.lineTo(0, enemy.size);
          ctx.lineTo(-enemy.size * 0.56, enemy.size * 0.2);
          ctx.lineTo(-enemy.size * 0.88, 0);
          ctx.lineTo(-enemy.size * 0.56, -enemy.size * 0.2);
          ctx.closePath();
        } else if (enemy.type === "vitaShard") {
          ctx.moveTo(0, -enemy.size);
          ctx.lineTo(enemy.size * 0.55, -enemy.size * 0.18);
          ctx.lineTo(enemy.size * 0.32, enemy.size * 0.86);
          ctx.lineTo(-enemy.size * 0.32, enemy.size * 0.86);
          ctx.lineTo(-enemy.size * 0.55, -enemy.size * 0.18);
          ctx.closePath();
        } else if (state.world === 1) {
          ctx.roundRect(-enemy.size, -enemy.size, enemy.size * 2, enemy.size * 2, 4);
        } else {
          if (enemy.type === "phaseStalker") {
            ctx.moveTo(0, -enemy.size);
            ctx.lineTo(enemy.size, 0);
            ctx.lineTo(0, enemy.size);
            ctx.lineTo(-enemy.size, 0);
            ctx.closePath();
          } else {
            ctx.roundRect(-enemy.size, -enemy.size, enemy.size * 2, enemy.size * 2, 8);
          }
        }
        ctx.fill();
        if (enemy.type === "beamSentinel") {
          const isCrimson = Boolean(enemy.crimsonVariant);
          ctx.strokeStyle = isCrimson ? "rgba(255, 173, 189, 0.92)" : "rgba(255, 226, 255, 0.82)";
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(-enemy.size * 0.62, 0);
          ctx.lineTo(enemy.size * 0.62, 0);
          ctx.stroke();
          ctx.fillStyle = isCrimson ? "rgba(255, 221, 230, 0.95)" : "rgba(255, 240, 255, 0.92)";
          ctx.beginPath();
          ctx.arc(0, 0, enemy.size * 0.25, 0, TAU);
          ctx.fill();

          const chargeMax = Math.max(0.0001, enemy.beamChargeMax || 0.001);
          const chargeFrac = clamp(enemy.beamCharge / chargeMax, 0, 1);
          const summonFrac = clamp(enemy.summonFxTimer / 1, 0, 1);
          if (chargeFrac > 0 || summonFrac > 0) {
            const warmup = Math.max(chargeFrac, summonFrac);
            const pulse = 0.72 + 0.28 * Math.sin(state.time * 26 + enemy.phase * 1.7);
            const aura = enemy.size * (0.92 + (1 - warmup) * 0.72 + pulse * 0.04);
            ctx.strokeStyle = isCrimson
              ? `rgba(255, 86, 112, ${0.34 + warmup * 0.48})`
              : `rgba(247, 183, 255, ${0.3 + warmup * 0.45})`;
            ctx.lineWidth = isCrimson ? 2.4 : 2;
            ctx.beginPath();
            ctx.arc(0, 0, aura, 0, TAU);
            ctx.stroke();

            ctx.strokeStyle = isCrimson
              ? `rgba(255, 191, 206, ${0.22 + warmup * 0.36})`
              : `rgba(255, 239, 255, ${0.2 + warmup * 0.32})`;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(0, 0, aura * 0.74, 0, TAU);
            ctx.stroke();
          }
        }
      }

      if (enemy.invuln > 0) {
        const pulse = 0.5 + 0.5 * Math.sin(state.time * 12);
        const alpha = clamp(0.35 + enemy.invuln * 0.3, 0.25, 0.9) * (0.8 + 0.2 * pulse);
        ctx.strokeStyle = `rgba(232, 245, 255, ${alpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.size * 1.24, 0, TAU);
        ctx.stroke();
      }
      ctx.restore();

      if (enemy.type !== "bossHyperDodeca" && enemy.type !== "bossW3Final") {
        const barW = enemy.size * 1.7;
        const barX = enemy.x - barW / 2;
        const barY = enemy.y - enemy.size - 12;
        ctx.fillStyle = "rgba(10, 12, 16, 0.7)";
        ctx.fillRect(barX, barY, barW, 4);
        ctx.fillStyle = enemy.boss ? "#ffcf75" : "#8cffc2";
        ctx.fillRect(barX, barY, barW * hpFrac, 4);
      }
    }
  }

  function drawBullets() {
    const hyperFight = hyperDodecaFightActive();
    const quality = hyperFight ? hyperBossQualityScale() : 1;

    const playerStep = hyperFight && state.bullets.length > 340
      ? (quality >= 0.75 ? 2 : quality >= 0.55 ? 3 : 4)
      : 1;
    for (let i = 0; i < state.bullets.length; i += playerStep) {
      const bullet = state.bullets[i];
      const playerFill = state.lightMode ? "#1778bf" : bullet.color;
      if (playerStep === 1) {
        if (state.optimizeMode) {
          ctx.save();
          ctx.translate(bullet.x, bullet.y);
          ctx.rotate(Math.atan2(bullet.vy || 0, bullet.vx || 1));
          fillStrokeTriangle(
            Math.max(2.8, bullet.radius * 1.45),
            playerFill,
            state.lightMode ? "#091b30" : "rgba(236, 250, 255, 0.72)",
            1.1
          );
          ctx.restore();
        } else {
          ctx.fillStyle = playerFill;
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, bullet.radius, 0, TAU);
          ctx.fill();
          if (state.lightMode) {
            ctx.strokeStyle = "rgba(7, 20, 36, 0.92)";
            ctx.lineWidth = Math.max(1.1, bullet.radius * 0.55);
            ctx.stroke();
          }
        }
      } else {
        if (state.optimizeMode) {
          ctx.save();
          ctx.translate(bullet.x, bullet.y);
          ctx.rotate(Math.atan2(bullet.vy || 0, bullet.vx || 1));
          fillStrokeTriangle(
            Math.max(2.8, bullet.radius * 1.5),
            playerFill,
            state.lightMode ? "#091b30" : "rgba(236, 250, 255, 0.72)",
            1
          );
          ctx.restore();
        } else {
          const size = Math.max(2, bullet.radius * 1.35);
          ctx.fillStyle = playerFill;
          ctx.fillRect(bullet.x - size / 2, bullet.y - size / 2, size, size);
          if (state.lightMode) {
            ctx.strokeStyle = "rgba(7, 20, 36, 0.88)";
            ctx.lineWidth = 1;
            ctx.strokeRect(bullet.x - size / 2, bullet.y - size / 2, size, size);
          }
        }
      }
    }

    const enemyStep = hyperFight && state.enemyBullets.length > 150
      ? (quality >= 0.8 ? 2 : quality >= 0.6 ? 3 : 4)
      : 1;
    for (let i = 0; i < state.enemyBullets.length; i += enemyStep) {
      const bullet = state.enemyBullets[i];
      const enemyFill = state.lightMode ? "#d23a54" : bullet.color;
      if (enemyStep === 1) {
        if (state.optimizeMode) {
          ctx.save();
          ctx.translate(bullet.x, bullet.y);
          ctx.rotate(Math.atan2(bullet.vy || 0, bullet.vx || 1));
          fillStrokeTriangle(
            Math.max(3, bullet.radius * 1.5),
            enemyFill,
            state.lightMode ? "#310812" : "rgba(255, 219, 228, 0.74)",
            1.1
          );
          ctx.restore();
        } else {
          ctx.fillStyle = enemyFill;
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, bullet.radius, 0, TAU);
          ctx.fill();
          if (state.lightMode) {
            ctx.strokeStyle = "rgba(53, 8, 20, 0.88)";
            ctx.lineWidth = Math.max(1, bullet.radius * 0.5);
            ctx.stroke();
          }
        }
      } else {
        if (state.optimizeMode) {
          ctx.save();
          ctx.translate(bullet.x, bullet.y);
          ctx.rotate(Math.atan2(bullet.vy || 0, bullet.vx || 1));
          fillStrokeTriangle(
            Math.max(3, bullet.radius * 1.55),
            enemyFill,
            state.lightMode ? "#310812" : "rgba(255, 219, 228, 0.74)",
            1
          );
          ctx.restore();
        } else {
          const size = Math.max(2.4, bullet.radius * 1.3);
          ctx.fillStyle = enemyFill;
          ctx.fillRect(bullet.x - size / 2, bullet.y - size / 2, size, size);
          if (state.lightMode) {
            ctx.strokeStyle = "rgba(53, 8, 20, 0.82)";
            ctx.lineWidth = 1;
            ctx.strokeRect(bullet.x - size / 2, bullet.y - size / 2, size, size);
          }
        }
      }
    }
  }

  function drawEffects() {
    for (const effect of state.effects) {
      const alpha = clamp(effect.life * 3.2, 0, 1);
      if (effect.type === "beam") {
        const beamColor = effect.color || "#9df7ff";
        if (beamColor.startsWith("#")) {
          const r = parseInt(beamColor.slice(1, 3), 16);
          const g = parseInt(beamColor.slice(3, 5), 16);
          const b = parseInt(beamColor.slice(5, 7), 16);
          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
        } else {
          ctx.strokeStyle = `rgba(157, 247, 255, ${alpha})`;
        }
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(effect.x1, effect.y1);
        ctx.lineTo(effect.x2, effect.y2);
        ctx.stroke();
      } else if (effect.type === "boom" || effect.type === "nova") {
        ctx.strokeStyle = effect.type === "nova"
          ? `rgba(213, 175, 255, ${alpha})`
          : `rgba(255, 224, 156, ${alpha})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, effect.radius * (1 - effect.life), 0, TAU);
        ctx.stroke();
      } else if (effect.type === "pop" || effect.type === "ram") {
        if (typeof effect.color === "string" && effect.color.startsWith("#") && effect.color.length === 7) {
          const r = parseInt(effect.color.slice(1, 3), 16);
          const g = parseInt(effect.color.slice(3, 5), 16);
          const b = parseInt(effect.color.slice(5, 7), 16);
          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
        } else if (typeof effect.color === "string") {
          ctx.strokeStyle = effect.color;
        } else {
          ctx.strokeStyle = `rgba(255, 210, 166, ${alpha})`;
        }
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, effect.radius ? effect.radius * (1 - effect.life) : 18 * (1 - effect.life), 0, TAU);
        ctx.stroke();
      } else if (effect.type === "evade") {
        ctx.strokeStyle = `rgba(165, 252, 255, ${alpha})`;
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, player.radius + 10 * (1 - effect.life), 0, TAU);
        ctx.stroke();
      } else if (effect.type === "transHit") {
        const maxLife = effect.maxLife || 0.28;
        const t = 1 - clamp(effect.life / maxLife, 0, 1);
        const outer = effect.radius * (0.5 + t * 0.95);
        const inner = effect.radius * (0.22 + t * 0.45);

        ctx.strokeStyle = `rgba(201, 167, 255, ${alpha})`;
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, outer + 2, 0, TAU);
        ctx.stroke();

        ctx.strokeStyle = `rgba(145, 238, 255, ${alpha * 0.92})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, inner + 2, 0, TAU);
        ctx.stroke();

        const spikes = effect.spikes || 8;
        const spin = (effect.spin || 0) + t * 8 * (effect.twist || 1);
        for (let i = 0; i < spikes; i += 1) {
          const a = spin + (i / spikes) * TAU;
          const r1 = inner * 0.7;
          const r2 = outer * 1.18;
          ctx.strokeStyle = `rgba(214, 186, 255, ${alpha * 0.7})`;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.moveTo(effect.x + Math.cos(a) * r1, effect.y + Math.sin(a) * r1);
          ctx.lineTo(effect.x + Math.cos(a) * r2, effect.y + Math.sin(a) * r2);
          ctx.stroke();
        }

        ctx.fillStyle = `rgba(240, 232, 255, ${alpha * 0.5})`;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, Math.max(1.5, effect.radius * (0.24 - t * 0.18)), 0, TAU);
        ctx.fill();
      } else if (effect.type === "hexDormantTri") {
        const glow = effect.awaken ? 0.45 + 0.55 * effect.turnProgress : 0.24;
        ctx.save();
        ctx.translate(effect.x, effect.y);
        ctx.rotate(effect.angle || 0);
        ctx.fillStyle = effect.awaken ? "#9ec4ff" : "#5f83bf";
        ctx.strokeStyle = effect.awaken ? "#eff7ff" : "#bed7ff";
        ctx.lineWidth = 2;
        const s = effect.size || 11;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.lineTo(s * 0.86, s * 0.72);
        ctx.lineTo(-s * 0.86, s * 0.72);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = effect.awaken ? `rgba(242, 250, 255, ${0.7 + glow * 0.3})` : "rgba(224, 237, 255, 0.85)";
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.46);
        ctx.lineTo(s * 0.4, s * 0.28);
        ctx.lineTo(-s * 0.4, s * 0.28);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (effect.type === "jkBurstWord") {
        const maxLife = effect.maxLife || 1;
        const lifeFrac = clamp(effect.life / maxLife, 0, 1);
        const scalePulse = (effect.glow ? 1.18 : 1) + (1 - lifeFrac) * (effect.glow ? 0.6 : 0.45);
        ctx.save();
        ctx.translate(effect.x, effect.y);
        ctx.rotate(effect.rotation || 0);
        ctx.scale(scalePulse, scalePulse);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = `bold ${Math.round(effect.size || 40)}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
        ctx.fillStyle = effect.glow
          ? `rgba(214, 235, 255, ${0.38 + lifeFrac * 0.62})`
          : `rgba(250, 236, 255, ${0.22 + lifeFrac * 0.78})`;
        ctx.fillText("jk", 0, 0);
        ctx.restore();
      } else if (effect.type === "finalShard") {
        ctx.save();
        ctx.translate(effect.x, effect.y);
        ctx.rotate(effect.rotation || 0);
        ctx.fillStyle = effect.color || "#ff7486";
        ctx.beginPath();
        ctx.moveTo(0, -(effect.size || 12));
        ctx.lineTo((effect.size || 12) * 0.72, (effect.size || 12) * 0.65);
        ctx.lineTo(-(effect.size || 12) * 0.72, (effect.size || 12) * 0.65);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (effect.type === "finalReformShard") {
        ctx.save();
        ctx.translate(effect.x, effect.y);
        ctx.rotate(effect.rotation || 0);
        ctx.fillStyle = effect.color || "#ff91a4";
        const s = effect.size || 11;
        ctx.beginPath();
        ctx.moveTo(0, -s);
        ctx.lineTo(s * 0.68, s * 0.56);
        ctx.lineTo(-s * 0.68, s * 0.56);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (effect.type === "inequalityShade") {
        const shadeLife = effect.collapse ? clamp(effect.life * 1.2, 0, 1) : 1;
        if (shadeLife <= 0.01) continue;
        const s = effect.size || 16;
        ctx.save();
        ctx.translate(effect.x, effect.y);
        ctx.rotate((effect.rotation || 0) + Math.sin(state.time * 2.2 + (effect.phase || 0)) * 0.18);
        ctx.globalAlpha *= 0.85 * shadeLife;
        ctx.fillStyle = "#000000";
        ctx.beginPath();
        for (let i = 0; i < 7; i += 1) {
          const a = (i / 7) * TAU;
          const wobble = 0.7 + 0.32 * Math.sin(state.time * 3.2 + a * 2.8 + (effect.phase || 0));
          const r = s * wobble;
          const px = Math.cos(a) * r;
          const py = Math.sin(a) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else if (effect.type === "finalBurst") {
        const t = 1 - clamp(effect.life / 0.9, 0, 1);
        const r = (effect.radius || 220) * (0.26 + t * 0.9);
        ctx.strokeStyle = `rgba(255, 118, 134, ${alpha})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, r, 0, TAU);
        ctx.stroke();
        ctx.strokeStyle = `rgba(143, 18, 45, ${alpha * 0.9})`;
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.arc(effect.x, effect.y, r * 0.72, 0, TAU);
        ctx.stroke();
      }
    }
  }

  function drawLowHpStress() {
    const danger = clamp(1 - player.hp / player.maxHp, 0, 1);
    if (danger <= 0.02) return;
    const perfScale = hyperDodecaFightActive()
      ? hyperBossQualityScale()
      : clamp(state.fps / 60, 0.5, 1);

    const dim = Math.pow(danger, 1.12);
    ctx.fillStyle = `rgba(95, 104, 120, ${0.26 * dim})`;
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = `rgba(0, 0, 0, ${0.45 * dim})`;
    ctx.fillRect(0, 0, width, height);

    const radius = Math.max(width, height) * 0.95;
    const vignette = ctx.createRadialGradient(player.x, player.y, 38, player.x, player.y, radius);
    vignette.addColorStop(0, "rgba(0, 0, 0, 0)");
    vignette.addColorStop(1, `rgba(0, 0, 0, ${0.56 * dim})`);
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, width, height);

    if (danger > 0.74) {
      const pulse = (Math.sin(state.time * 8.8) + 1) * 0.5;
      ctx.fillStyle = `rgba(120, 24, 36, ${(danger - 0.74) * 0.22 * pulse})`;
      ctx.fillRect(0, 0, width, height);
    }

    const fuzz = clamp((danger - 0.12) / 0.88, 0, 1);
    if (fuzz > 0) {
      const staticCount = Math.floor((120 + fuzz * 440) * perfScale);
      for (let i = 0; i < staticCount; i += 1) {
        const s = Math.random() < 0.6 ? 3 : (Math.random() < 0.88 ? 4 : 6);
        const x = Math.floor(Math.random() * (width / s)) * s;
        const y = Math.floor(Math.random() * (height / s)) * s;
        const alpha = (0.08 + Math.random() * 0.2) * fuzz;
        ctx.fillStyle = Math.random() < 0.5
          ? `rgba(245, 250, 255, ${alpha})`
          : `rgba(20, 30, 54, ${alpha * 1.05})`;
        ctx.fillRect(x, y, s, s);

        if (Math.random() < 0.22 * fuzz) {
          const b = irand(8, 14);
          const bx = Math.floor(Math.random() * (width / b)) * b;
          const by = Math.floor(Math.random() * (height / b)) * b;
          const blockAlpha = alpha * 0.9;
          ctx.fillStyle = Math.random() < 0.5
            ? `rgba(250, 254, 255, ${blockAlpha})`
            : `rgba(12, 18, 34, ${blockAlpha})`;
          ctx.fillRect(bx, by, b, b);
        }
      }

      const lineAlpha = 0.12 * fuzz * (0.7 + perfScale * 0.3);
      ctx.fillStyle = `rgba(205, 218, 245, ${lineAlpha})`;
      const lineStep = perfScale < 0.62 ? 8 : perfScale < 0.75 ? 6 : 5;
      const yStart = ((state.time * 135) % lineStep) - lineStep;
      for (let y = yStart; y < height; y += lineStep) {
        ctx.fillRect(0, y, width, 2);
      }

      const tearCount = perfScale < 0.58 ? 0 : Math.floor((1 + fuzz * 4) * perfScale);
      for (let i = 0; i < tearCount; i += 1) {
        const y = Math.floor(Math.random() * height);
        const h = irand(2, 5);
        const shift = irand(-14, 14) * fuzz;
        ctx.save();
        ctx.globalAlpha = 0.12 * fuzz;
        ctx.drawImage(canvas, 0, y, width, h, shift, y, width, h);
        ctx.restore();
      }
    }
  }

    ctx.fillStyle = hpFrac > 0.3 ? "#7dffaf" : "#ff7d88";

    let hintY = 142;

      ctx.fillStyle = "#ffd486";

      } else {
        ctx.fillText(`Rebirth temporarily disabled   Points saved: ${state.rebirthTokens.toFixed(2)}`, 24, hintY);

    }

    if (state.path === "colossal" && !state.ascendedPath) {

        ctx.fillStyle = "#cdb88b";
        ctx.fillText(`Colossal Forge lock: ${forgeProgressLockText(progress)}`, 24, hintY);
      }
      if (colossalForgeUnlocked() || progress.done > 0) hintY += 18;
    } else if (state.path === "create" && !state.ascendedPath) {
      const progress = createForgeProgress();
      if (createForgeUnlocked()) {
        ctx.fillStyle = "#9fe8ff";
        ctx.fillText("Create Forge unlocked: press I", 24, hintY);
      } else if (progress.done > 0) {
        ctx.fillStyle = "#86c9de";
        ctx.fillText(`Create Forge lock: ${forgeProgressLockText(progress)}`, 24, hintY);
      }
      if (createForgeUnlocked() || progress.done > 0) hintY += 18;

      ctx.fillStyle = "#9df7ff";
      ctx.fillText(`Upgrade prep: ${state.prepTimer.toFixed(1)}s`, 24, hintY);
      hintY += 18;
    }

    if (state.toastTimer > 0 && state.toast) {
      const alpha = clamp(state.toastTimer, 0, 1);
      ctx.fillStyle = `rgba(9, 12, 20, ${0.65 * alpha})`;
      const w = Math.min(width - 40, Math.max(240, state.toast.length * 8 + 30));
      const x = width / 2 - w / 2;
      const y = 16;
      ctx.fillRect(x, y, w, 34);
      ctx.fillStyle = `rgba(226, 239, 255, ${alpha})`;
      ctx.textAlign = "center";

    }

      ctx.fillStyle = "rgba(9, 10, 18, 0.62)";
      ctx.fillRect(14, height - 34, 240, 18);
      ctx.fillStyle = "#ad91ff";
      ctx.fillRect(16, height - 32, 236 * ch, 14);
      ctx.fillStyle = "#f0e7ff";
      ctx.fillText(`Transcend charge ${Math.floor(transcend.charge)}%`, 20, height - 20);
    }
  }

  function drawInequalityBossBar() {
    const boss = state.enemies.find((enemy) => enemy.type === "bossW3Final" && !enemy.dead);
    if (!boss) return;

    const hyperVisible = state.enemies.some((enemy) => enemy.type === "bossHyperDodeca" && !enemy.dead);
    const y = hyperVisible ? 58 : 10;
    const barW = Math.min(width - 140, width * 0.74);
    const barH = 12;
    const gap = 5;
    const x = width / 2 - barW / 2;

    const reforming = Boolean(boss.reforming);
    const inStage2 = boss.stage >= 2 || reforming;
    let bar1Frac = 0;
    let bar2Frac = 0;
    let showSecond = false;

    if (reforming) {
      bar1Frac = clamp(boss.reformBar1 || 0, 0, 1);
      bar2Frac = clamp(boss.reformBar2 || 0, 0, 1);
      showSecond = bar1Frac >= 0.999 || bar2Frac > 0;
    } else if (boss.stage >= 2) {
      const total = Math.max(1, boss.maxHp);
      const half = total * 0.5;
      if (boss.hp > half) {
        bar1Frac = clamp((boss.hp - half) / half, 0, 1);
        bar2Frac = 1;
      } else {
        bar1Frac = 0;
        bar2Frac = clamp(boss.hp / half, 0, 1);
      }
      showSecond = true;
    } else {
      bar1Frac = clamp(boss.hp / Math.max(1, boss.phaseOneMaxHp || boss.maxHp), 0, 1);
      bar2Frac = 0;
      showSecond = false;
    }

    const panelH = showSecond ? 58 : 42;
    ctx.fillStyle = "rgba(7, 9, 14, 0.84)";
    ctx.fillRect(x - 12, y - 6, barW + 24, panelH);
    ctx.strokeStyle = "rgba(255, 121, 146, 0.6)";
    ctx.lineWidth = 1.4;
    ctx.strokeRect(x - 12, y - 6, barW + 24, panelH);

    ctx.fillStyle = "rgba(0, 0, 0, 0.62)";
    ctx.fillRect(x, y + 14, barW, barH);
    const stage1Grad = ctx.createLinearGradient(x, 0, x + barW, 0);
    stage1Grad.addColorStop(0, "#ff8da1");
    stage1Grad.addColorStop(1, "#a81e3f");
    ctx.fillStyle = stage1Grad;
    ctx.fillRect(x, y + 14, barW * bar1Frac, barH);

    if (showSecond) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.62)";
      ctx.fillRect(x, y + 14 + barH + gap, barW, barH);
      const stage2Grad = ctx.createLinearGradient(x, 0, x + barW, 0);
      stage2Grad.addColorStop(0, "#ff5d7a");
      stage2Grad.addColorStop(1, "#6e0f25");
      ctx.fillStyle = stage2Grad;
      ctx.fillRect(x, y + 14 + barH + gap, barW * bar2Frac, barH);
    }

    ctx.textAlign = "center";
    ctx.fillStyle = "#ffe8ee";
    ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    ctx.fillText("Inequality Engine", width / 2, y + 8);
    ctx.fillStyle = "#ffd7e0";
    ctx.font = "12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    if (reforming) {
      ctx.fillText("Phase I rebooting // Phase II charging", width / 2, y + (showSecond ? 53 : 35));
    } else if (boss.stage >= 2) {
      ctx.fillText(`Phase II ${Math.ceil(Math.max(0, boss.hp))} / ${Math.ceil(boss.maxHp)}`, width / 2, y + 53);
    } else {
      ctx.fillText(`${Math.ceil(boss.hp)} / ${Math.ceil(boss.maxHp)}`, width / 2, y + 35);
    }
    ctx.textAlign = "left";
  }

  function drawTelemetryPanel() {
    const panelX = 14;
    const panelW = 390;
    const firingRate = shotsPerSecond();
    const effectiveReduction = clamp(
      player.damageReduction + (state.path === "spray" && !state.ascendedPath ? player.sprayMitigation : 0),
      0,
      0.9
    );
    const damageReductionPct = effectiveReduction * 100;
    const impactReductionPct = clamp(effectiveReduction + player.massDensityReduction, 0, 0.99) * 100;

    let fireLabel = `${firingRate.toFixed(2)}/s`;
    if (state.path === "tank" && !state.ascendedPath) {
      fireLabel = "N/A (Tank)";
    } else if (state.path === "colossal" && !state.ascendedPath) {
      fireLabel = "N/A (Colossal)";
    } else if (state.path === "create" && !state.ascendedPath) {
      fireLabel = "N/A (Create)";
    } else if (state.ascendedPath === "deployer") {
      fireLabel = "N/A (Deployer)";
    } else if (state.ascendedPath === "transcendental") {
      fireLabel = `${firingRate.toFixed(2)}/s (${Math.max(1, Math.floor(transcend.shotCount))} blasts)`;
    }

    const lines = [
      `FPS ${state.fps.toFixed(1)}   Enemies ${state.enemies.length}/${enemyCap()}   Points ${state.points}`,
      `HP ${Math.ceil(player.hp)}/${Math.ceil(player.maxHp)}   Shield ${Math.ceil(player.tempHp)}   Regen ${player.regen.toFixed(2)}/s`,
      `Move Speed ${Math.round(player.speed)}   Damage Red. ${damageReductionPct.toFixed(1)}%   Impact Red. ${impactReductionPct.toFixed(1)}%`,
      `Fire Rate ${fireLabel}`,
      `Bullet Dmg ${player.bulletDamage.toFixed(1)}   Pierce ${player.bulletPierce}   Bounces ${player.bulletBounces}`,
      `Bullet Speed ${Math.round(player.bulletSpeed)}   Bullet Life ${player.bulletLife.toFixed(2)}s`,
    ];

    if (state.rebirthUnlocked || state.rebirthCount > 0) {
      lines.push(`Rebirth Points ${state.rebirthTokens.toFixed(2)}   Cycles ${state.rebirthCount}   Next ${rebirthTokenReward().toFixed(1)}`);
    }

    if (state.ascendedPath === "deployer") {
      lines.push(`Drones ${state.drones.length}   Uplink x${deployer.fireRate.toFixed(2)}   Slots ${deployer.slots}`);
      lines.push(`Pulse ${deployer.pulseDamage.toFixed(1)}  Beam ${deployer.beamDamage.toFixed(1)}  Bomber ${deployer.bomberDamage.toFixed(1)}`);
    } else if (state.ascendedPath === "transcendental") {
      lines.push(`Blast Size ${transcend.width.toFixed(1)}   Charge ${Math.floor(transcend.charge)}%   Gain x${transcend.chargeGain.toFixed(2)}`);
      lines.push(`Blast Dmg ${transcend.damage.toFixed(1)}   Cooldown ${transcend.cooldown.toFixed(2)}s`);
    } else if (state.path === "create" && !state.ascendedPath) {
      const activeMinions = state.drones.filter((drone) => !drone.deadTimer || drone.deadTimer <= 0).length;
      lines.push(`Legacy Minions ${activeMinions}/${createPath.slots}   Command x${createPath.fireRate.toFixed(2)}   Damage x${createPath.damage.toFixed(2)}`);
      lines.push(`Minion HP ${Math.round(createPath.hp)}   Regen ${createPath.botRegen.toFixed(2)}/s   Respawn ${createPath.respawn.toFixed(2)}s`);
      lines.push(`Mode ${createPath.mode}   ${createPath.pathRateSync ? "Rate-Link ON" : "Rate-Link OFF"}   ${createPath.instantAim ? "Insta-Aim ON" : "Insta-Aim OFF"}   ${createPath.dangerAvoidance ? "Avoidance ON" : "Avoidance OFF"}`);
    } else if (state.path === "colossal" && !state.ascendedPath) {
      lines.push(`Colossal Ram ${Math.round(player.ramDamage)}   Knockback ${player.tankKnockback.toFixed(2)}   Size ${Math.round(player.radius)}`);
    } else if (state.path === "tank" && !state.ascendedPath) {
      lines.push(`Ram Damage ${Math.round(player.ramDamage)}   Knockback ${player.tankKnockback.toFixed(2)}`);
    } else {
      lines.push(`Weapon Profile ${state.path || "base"}`);
    }

    const lineHeight = 18;
    const panelH = 30 + lines.length * lineHeight + 10;
    const bottomPad = state.ascendedPath === "transcendental" ? 56 : 16;
    const panelY = height - panelH - bottomPad;

    ctx.fillStyle = "rgba(8, 11, 19, 0.84)";
    ctx.fillRect(panelX, panelY, panelW, panelH);
    ctx.strokeStyle = "rgba(130, 190, 255, 0.45)";
    ctx.strokeRect(panelX, panelY, panelW, panelH);

    ctx.fillStyle = "#d7ebff";
    ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    ctx.fillText("Telemetry", panelX + 12, panelY + 20);

    ctx.fillStyle = "#a9c6e8";
    const lineX = panelX + 12;
    for (let i = 0; i < lines.length; i += 1) {
      ctx.fillText(lines[i], lineX, panelY + 44 + i * lineHeight);
    }
  }

  function drawUpgradeMenu() {
    if (!state.upgradeMenuOpen || state.modal) return;
    const options = availableUpgrades().slice(0, 9);
    const panelW = 460;
    const panelH = 34 + options.length * 28;
    const x = width - panelW - 16;
    const y = 18;
    ctx.fillStyle = "rgba(8, 10, 18, 0.88)";
    ctx.fillRect(x, y, panelW, panelH);
    ctx.strokeStyle = "rgba(148, 203, 255, 0.5)";
    ctx.strokeRect(x, y, panelW, panelH);
    ctx.fillStyle = "#d6e8ff";
    ctx.fillText(`Upgrades (points: ${state.points})`, x + 14, y + 22);

    for (let i = 0; i < options.length; i += 1) {
      const up = options[i];
      const level = uLvl(up.id);
      const cost = Math.max(1, Math.floor(up.cost ? up.cost(level) : 1));
      const canBuy = level < up.max && up.available() && state.points >= cost;
      ctx.fillStyle = canBuy ? "#b9f6d6" : "#8f96a8";
      const text = `${i + 1}) ${up.name} [${level}/${up.max}] (${cost} pts) - ${up.desc}`;
      ctx.fillText(text, x + 14, y + 44 + i * 26);
    }
  }

  function drawColossalForgeMenu() {
    if (!state.colossalForgeOpen || state.modal) return;
    if (state.path !== "colossal" || state.ascendedPath) return;

    const options = COLOSSAL_FORGE_UPGRADES;
    const panelW = 500;
    const panelH = 74 + options.length * 28;
    const x = width - panelW - 16;
    const y = 18;

    ctx.fillStyle = "rgba(24, 14, 8, 0.92)";
    ctx.fillRect(x, y, panelW, panelH);
    ctx.strokeStyle = "rgba(255, 206, 132, 0.55)";
    ctx.strokeRect(x, y, panelW, panelH);
    ctx.fillStyle = "#ffe3bc";
    ctx.fillText(`Colossal Forge (points: ${state.points})`, x + 14, y + 22);

    const progress = colossalForgeProgress();
    ctx.fillStyle = colossalForgeUnlocked() ? "#ffd28a" : "#b3966d";
    ctx.fillText(`Unlock req: ${progress.need} core upgrades taken (${progress.done}/${progress.need})`, x + 14, y + 42);

    for (let i = 0; i < options.length; i += 1) {
      const up = options[i];
      const level = uLvl(up.id);
      const cost = typeof up.cost === "function" ? up.cost(level) : up.cost;
      const canBuy = colossalForgeUnlocked() && level < up.max && state.points >= cost;
      ctx.fillStyle = canBuy ? "#ffe9c6" : "#8f8373";
      ctx.fillText(`${i + 1}) ${up.name} [${level}/${up.max}] (${cost} pts) - ${up.desc}`, x + 14, y + 66 + i * 26);
    }
  }

  function drawCreateForgeMenu() {
    if (!state.createForgeOpen || state.modal) return;
    if (state.path !== "create" || state.ascendedPath) return;

    const options = CREATE_FORGE_UPGRADES;
    const panelW = 520;
    const panelH = 74 + options.length * 28;
    const x = width - panelW - 16;
    const y = 18;

    ctx.fillStyle = "rgba(10, 20, 26, 0.92)";
    ctx.fillRect(x, y, panelW, panelH);
    ctx.strokeStyle = "rgba(132, 226, 255, 0.5)";
    ctx.strokeRect(x, y, panelW, panelH);
    ctx.fillStyle = "#d8f6ff";
    ctx.fillText(`Create Forge (points: ${state.points})`, x + 14, y + 22);
    const progress = createForgeProgress();
    ctx.fillStyle = createForgeUnlocked() ? "#b7eeff" : "#7ea5b4";
    ctx.fillText(`Unlock req: ${progress.need} core upgrades taken (${progress.done}/${progress.need})`, x + 14, y + 42);

    for (let i = 0; i < options.length; i += 1) {
      const up = options[i];
      const level = uLvl(up.id);
      const cost = typeof up.cost === "function" ? up.cost(level) : up.cost;
      const canBuy = createForgeUnlocked() && level < up.max && state.points >= cost;
      ctx.fillStyle = canBuy ? "#d8fbff" : "#7f96a1";
      ctx.fillText(`${i + 1}) ${up.name} [${level}/${up.max}] (${cost} pts) - ${up.desc}`, x + 14, y + 66 + i * 26);
    }
  }

  function drawRebirthShop() {
    if (!REBIRTH_ENABLED) return;
    if (!state.rebirthShopOpen || state.modal) return;
    const options = availableRebirthUpgrades().slice(0, 9);
    const panelW = 560;
    const panelH = 68 + options.length * 28 + 34;
    const x = width - panelW - 16;
    const y = 18;
    ctx.fillStyle = "rgba(13, 6, 10, 0.92)";
    ctx.fillRect(x, y, panelW, panelH);
    ctx.strokeStyle = "rgba(255, 123, 143, 0.55)";
    ctx.strokeRect(x, y, panelW, panelH);
    ctx.fillStyle = "#ffd7de";
    ctx.fillText(`Rebirth Shop   Points: ${state.rebirthTokens.toFixed(2)}   Cycles: ${state.rebirthCount}`, x + 14, y + 22);
    ctx.fillStyle = "#ffc0cc";
    ctx.fillText(`Next rebirth payout: ${rebirthTokenReward().toFixed(1)} points`, x + 14, y + 42);

    for (let i = 0; i < options.length; i += 1) {
      const up = options[i];
      const level = rLvl(up.id);
      const cost = up.cost ? up.cost(level) : 1;
      const unlocked = up.available();
      const canBuy = unlocked && level < up.max && state.rebirthTokens + 1e-8 >= cost;
      ctx.fillStyle = canBuy ? "#ffd7de" : unlocked ? "#b4979f" : "#7e646b";
      const status = unlocked ? `${level}/${up.max}` : `Locked: ${up.lockText}`;
      const text = `${i + 1}) ${up.name} [${status}] (${cost.toFixed(1)} pts) - ${up.desc}`;
      ctx.fillText(text, x + 14, y + 66 + i * 26);
    }

    ctx.fillStyle = "#ffb8c4";
    ctx.fillText("R: Rebirth now   B: Beat game   K: Close shop", x + 14, y + panelH - 12);
  }

  function drawDevMenu() {
    if (!state.devMenuOpen) return;
    const panelW = 360;
    const panelH = 198;
    const x = width - panelW - 16;
    const y = height - panelH - 16;
    ctx.fillStyle = "rgba(7, 10, 18, 0.92)";
    ctx.fillRect(x, y, panelW, panelH);
    ctx.strokeStyle = "rgba(122, 226, 255, 0.55)";
    ctx.strokeRect(x, y, panelW, panelH);

    ctx.fillStyle = "#d7ecff";
    ctx.font = "14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    ctx.fillText("Dev Hotkeys", x + 14, y + 22);

    ctx.fillStyle = "#a9c6e8";
    ctx.fillText("`: instant lvl 20 for wrld 1", x + 14, y + 50);
    ctx.fillText("~: Wrld 2!", x + 14, y + 72);
    ctx.fillText("G: GOD MODE", x + 14, y + 94);
    ctx.fillText("J: GOD MODE PATH CHOICE", x + 14, y + 116);
    ctx.fillText("_: Wrld 3!", x + 14, y + 138);
    ctx.fillText("|: how u got here (toggle)", x + 14, y + 160);
  }

  function drawModal() {
    if (!state.modal) return;
    const w = Math.min(width - 60, 720);
    const h = 170 + state.modal.options.length * 44;
    const x = width / 2 - w / 2;
    const y = height / 2 - h / 2;

    ctx.fillStyle = "rgba(4, 6, 12, 0.92)";
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = "#86d0ff";
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    ctx.fillStyle = "#e7f2ff";
    ctx.font = "20px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    ctx.fillText(state.modal.title, x + 20, y + 36);
    ctx.font = "14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    ctx.fillStyle = "#b5cbe9";
    ctx.fillText(state.modal.subtitle, x + 20, y + 58);

    state.modal.options.forEach((option, index) => {
      const oy = y + 90 + index * 44;
      ctx.fillStyle = "rgba(18, 24, 38, 0.95)";
      ctx.fillRect(x + 18, oy - 16, w - 36, 34);
      ctx.strokeStyle = "rgba(133, 196, 255, 0.35)";
      ctx.strokeRect(x + 18, oy - 16, w - 36, 34);
      ctx.fillStyle = "#d8ebff";
      ctx.fillText(`${index + 1}) ${option.label}`, x + 30, oy + 6);
      ctx.fillStyle = "#9db8d8";
      ctx.fillText(option.desc, x + 220, oy + 6);
    });
  }

  function render() {
    drawBackground();
    if (!state.gameStarted) {
      if (state.idleMenuGame) {
        drawIdleMenuGame();
      }
      drawModal();
      return;
    }
    drawEffects();
    drawBullets();
    drawEnemies();
    drawPlayer();

    if (state.ascendedPath === "deployer" || (state.path === "create" && !state.ascendedPath)) {
      for (const drone of state.drones) {
        if (drone.deadTimer > 0) continue;
        const facing = Math.atan2(drone.vy || 0, drone.vx || 1);
        if (state.optimizeMode) {
          const baseSize = (drone.size || 11) * (drone.variantScale || 1);
          const triSize = Math.max(4.8, baseSize * 0.72);
          const isTranscendDrone = drone.mode === "transcend";
          const fill = isTranscendDrone
            ? "#312549"
            : drone.kind === "beam"
              ? "#1e3848"
              : drone.kind === "bomber"
                ? "#3d2c18"
                : "#183247";
          const stroke = state.lightMode ? "#1a2f43" : "#daf5ff";
          ctx.save();
          ctx.translate(drone.x, drone.y);
          ctx.rotate(facing + (isTranscendDrone ? state.time * 1.1 : 0));
          fillStrokeTriangle(triSize, fill, stroke, 1.15);
          if (isTranscendDrone) {
            fillStrokeTriangle(
              Math.max(3.4, triSize * 0.54),
              "rgba(203, 166, 255, 0.35)",
              "rgba(234, 217, 255, 0.72)",
              0.95,
              -state.time * 1.4
            );
          }
          ctx.restore();
          continue;
        }
        if (state.ascendedPath === "deployer") {
          ctx.fillStyle = drone.kind === "pulse" ? "#75ecff" : drone.kind === "beam" ? "#c0fffb" : "#ffd694";
          ctx.beginPath();
          ctx.arc(drone.x, drone.y, 5.4, 0, TAU);
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.5)";
          ctx.stroke();
          continue;
        }
        ctx.save();
        ctx.translate(drone.x, drone.y);
        ctx.rotate(facing);
        const hueShift = drone.variantHue || 0;
        const styleScale = drone.variantScale || 1;
        const modelScale = drone.variantModel || 1;
        const scale = ((drone.size || 11) / 11) * styleScale;

        if (drone.mode === "transcend") {
          ctx.fillStyle = `hsl(${Math.round(262 + hueShift * 0.45)}, 40%, 13%)`;
          ctx.strokeStyle = `hsl(${Math.round(278 + hueShift * 0.35)}, 85%, 82%)`;
          ctx.lineWidth = 1.2 * scale;
          ctx.beginPath();
          ctx.moveTo(0, -8.8 * scale * modelScale);
          ctx.lineTo(8.2 * scale * modelScale, 0);
          ctx.lineTo(0, 8.8 * scale * modelScale);
          ctx.lineTo(-8.2 * scale * modelScale, 0);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.strokeStyle = `hsla(${Math.round(194 + hueShift)}, 100%, 80%, 0.72)`;
          ctx.beginPath();
          ctx.arc(0, 0, 10.8 * scale, state.time * 1.2, state.time * 1.2 + Math.PI * 0.75);
          ctx.stroke();
        } else {
          ctx.fillStyle = `hsl(${Math.round(210 + hueShift * 0.35)}, 52%, 13%)`;
          ctx.strokeStyle = `hsl(${Math.round(196 + hueShift)}, 100%, 78%)`;
          ctx.lineWidth = 1.2 * scale;
          ctx.beginPath();
          ctx.moveTo(-9.8 * scale, -5.4 * scale * modelScale);
          ctx.lineTo(3.6 * scale, -6.2 * scale * modelScale);
          ctx.lineTo(9.8 * scale * modelScale, -3.1 * scale);
          ctx.lineTo(9.8 * scale * modelScale, 3.1 * scale);
          ctx.lineTo(3.6 * scale, 6.2 * scale * modelScale);
          ctx.lineTo(-9.8 * scale, 5.4 * scale * modelScale);
          ctx.lineTo(-6.2 * scale, 0);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = `hsl(${Math.round(192 + hueShift)}, 100%, 80%)`;
          for (let i = -2; i <= 2; i += 1) {
            ctx.fillRect(9.8 * scale * modelScale, i * 2.05 * scale - 0.55 * scale, 4.8 * scale, 1.15 * scale);
          }
          ctx.fillStyle = `hsla(${Math.round(198 + hueShift)}, 100%, 72%, 0.9)`;
          ctx.fillRect(-4.2 * scale, -1 * scale, 2.1 * scale, 2 * scale);
        }
        ctx.restore();
      }
    }

    drawHUD();
    drawInequalityBossBar();
    drawHyperBossBar();
    drawTelemetryPanel();
    drawUpgradeMenu();
    drawColossalForgeMenu();
    drawCreateForgeMenu();
    drawRebirthShop();
    drawDevMenu();
    drawModal();
    drawLowHpStress();

    if (state.gameOver) {
      ctx.fillStyle = "rgba(255, 88, 110, 0.9)";
      ctx.font = "28px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
      ctx.textAlign = "center";
      ctx.fillText("Destroyed", width / 2, height * 0.18);
      ctx.textAlign = "left";
    }

    if (state.gameBeaten) {
      ctx.fillStyle = "rgba(255, 206, 216, 0.92)";
      ctx.font = "26px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
      ctx.textAlign = "center";
      ctx.fillText("yay u won", width / 2, height * 0.12);
      ctx.font = "14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
      ctx.fillText(
        REBIRTH_ENABLED
          ? "Press K for rebirth shop or B to rebirth"
          : "Press B for rebirth option (disabled)",
        width / 2,
        height * 0.16
      );
      ctx.textAlign = "left";
    }
  }

  let rafId = 0;
  let lastTime = performance.now();
  function frame(now) {
    if (!state.running) return;
    const rawDt = Math.max(0.0001, (now - lastTime) / 1000);
    const dt = Math.min(0.033, rawDt);
    lastTime = now;
    const instantFps = 1 / rawDt;
    state.fps = state.fps * 0.9 + instantFps * 0.1;
    updateLogic(dt);
    render();
    rafId = requestAnimationFrame(frame);
  }

  state.paused = true;
  openStartMenu();
  onLevelMilestones();
  rafId = requestAnimationFrame(frame);

  window.__neonRiftSurvivor = { destroy };





  
})();





/* =========================
   END OF GAME CODE
   ========================= */
</script>

</body>
