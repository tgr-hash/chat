  function enemyCap() {
    return 10 + state.level;
  }

  function addEnemy(enemy, force = false) {
    if (!enemy) return false;
    if (state.enemies.length >= enemyCap()) {
      if (!force) return false;
      const replacementIndex = state.enemies.findIndex((candidate) => !candidate.boss);
      if (replacementIndex === -1) return false;
      state.enemies.splice(replacementIndex, 1);
    }
    state.enemies.push(enemy);
    return true;
  }

  function scaleBossForMark(enemy, mark, world) {
    if (!enemy) return;
    const tier = Math.max(0, Math.floor(mark / 10) - 1);
    const worldCfg = world === 1
      ? { hpStart: 0.62, hpStep: 1.105, damageStart: 0.58, damageStep: 1.09, speedStart: 0.84, speedStep: 1.018, xpStart: 0.72, xpStep: 1.1 }
      : world === 2
        ? { hpStart: 0.8, hpStep: 1.1, damageStart: 0.74, damageStep: 1.1, speedStart: 0.9, speedStep: 1.02, xpStart: 0.88, xpStep: 1.105 }
        : { hpStart: 1.04, hpStep: 1.095, damageStart: 0.98, damageStep: 1.1, speedStart: 0.96, speedStep: 1.022, xpStart: 1.02, xpStep: 1.11 };

    const hpMult = worldCfg.hpStart * Math.pow(worldCfg.hpStep, tier);
    const damageMult = worldCfg.damageStart * Math.pow(worldCfg.damageStep, tier);
    const speedMult = worldCfg.speedStart * Math.pow(worldCfg.speedStep, tier);
    const xpMult = worldCfg.xpStart * Math.pow(worldCfg.xpStep, tier);

    enemy.maxHp *= hpMult;
    enemy.hp = enemy.maxHp;
    enemy.damage *= damageMult;
    enemy.speed *= speedMult;
    enemy.xp *= xpMult;
  }

  function maybeSpawnBoss() {
    if (state.modal || state.gameOver || state.prepTimer > 0) return;

    if (!state.hyperDodecaSpawned && state.level >= 1000) {
      const hyperBoss = createEnemy("bossHyperDodeca", {
        boss: true,
        x: width / 2,
        y: height / 2,
        invuln: 2.2,
      });
      if (hyperBoss) {
        hyperBoss.size = Math.max(180, Math.min(width, height) * 0.5);
        hyperBoss.maxHp = 5000000;
        hyperBoss.hp = hyperBoss.maxHp;
        hyperBoss.damage = 505;
        hyperBoss.speed = 44;
        hyperBoss.modeTimer = 2.2;
        hyperBoss.fireTimer = 0.6;
        hyperBoss.summonTimer = 99;
        hyperBoss.phase = rand(0, TAU);
        state.enemies.length = 0;
        state.enemyBullets.length = 0;
        addEnemy(hyperBoss, true);
        clampGodModeDuringHyperBoss();
        state.hyperDodecaSpawned = true;
        state.hyperDodecaFight = true;
        toast("LEVEL 1000 // HYPER DODECAHEDRON");
      }
      return;
    }

    if (hasBoss()) return;

    if (state.world === 1) {
      if (!state.w1SuperSpawned && state.level >= 50) {
        const superBoss = createEnemy("bossSuper", { boss: true, x: width / 2, y: Math.max(92, height * 0.14), invuln: 1.4 });
        if (superBoss) {
          scaleBossForMark(superBoss, 50, 1);
          superBoss.modeTimer = 1.8;
          superBoss.fireTimer = 0.3;
          superBoss.summonTimer = 3.2;
          state.enemies = state.enemies.filter((enemy) => enemy.boss);
          addEnemy(superBoss, true);
          state.w1SuperSpawned = true;
          state.lastBossW1 = Math.max(state.lastBossW1, 50);
          toast("LEVEL 50 SUPER-BOSS ARRIVED");
        }
        return;
      }

      const mark = Math.floor(state.level / 10) * 10;
      if (mark >= 10 && mark > state.lastBossW1) {
        state.lastBossW1 = mark;
        if (mark !== 50) {
          const boss = createEnemy("bossPrime", { boss: true, x: width / 2, y: Math.max(84, height * 0.13), invuln: 1.2 });
          if (boss) {
            scaleBossForMark(boss, mark, 1);
            boss.modeTimer = 2.6;
            boss.fireTimer = 0.2;
            addEnemy(boss, true);
            toast(`Boss incoming (level ${mark})`);
          }
        }
      }
      return;
    }

    if (state.world === 2) {
      if (!state.w2HexSpawned && state.level >= 50) {
        const hexBoss = createEnemy("bossW2Hex", { boss: true, x: width / 2, y: Math.max(108, height * 0.16), invuln: 1.5 });
        if (hexBoss) {
          scaleBossForMark(hexBoss, 50, 2);
          hexBoss.modeTimer = 1.8;
          hexBoss.fireTimer = 0.24;
          hexBoss.summonTimer = 3.1;
          state.enemies = state.enemies.filter((enemy) => enemy.boss);
          addEnemy(hexBoss, true);
          state.w2HexSpawned = true;
          state.lastBossW2 = Math.max(state.lastBossW2, 50);
          toast("World II SUPER-BOSS: Hex Core");
        }
        return;
      }

      const mark = Math.floor(state.level / 10) * 10;
      if (mark >= 10 && mark > state.lastBossW2) {
        state.lastBossW2 = mark;
        if (mark !== 50) {
          const type = mark % 20 === 0 ? "bossW2B" : "bossW2A";
          const boss = createEnemy(type, { boss: true, x: width / 2, y: Math.max(96, height * 0.15), invuln: 1.3 });
          if (boss) {
            state.enemies = state.enemies.filter((enemy) => enemy.boss);
            scaleBossForMark(boss, mark, 2);
            boss.modeTimer = 1.9;
            boss.fireTimer = 0.3;
            boss.summonTimer = 4;
            addEnemy(boss, true);
            toast(`World II boss pattern: ${type === "bossW2B" ? "Singularity Tyrant" : "Aether Marshal"}`);
          }
        }
      }
      return;
    }

    if (state.world === 3) {
      if (state.w3FinalDefeated) return;

      if (!state.w3SuperSpawned && state.level >= 200) {
        const finalBoss = createEnemy("bossW3Final", {
          boss: true,
          x: width / 2,
          y: Math.max(128, height * 0.19),
          invuln: 2.4,
        });
        if (finalBoss) {
          scaleBossForMark(finalBoss, 200, 3);
          finalBoss.maxHp *= 5;
          finalBoss.hp = finalBoss.maxHp;
          finalBoss.damage *= 1.28;
          finalBoss.modeTimer = 1.3;
          finalBoss.fireTimer = 0.16;
          finalBoss.summonTimer = 2.6;
          finalBoss.phase = rand(0, TAU);
          finalBoss.stage = 1;
          finalBoss.phaseOneMaxHp = finalBoss.maxHp;
          finalBoss.phaseTwoMaxHp = finalBoss.maxHp * 2;
          finalBoss.reforming = false;
          finalBoss.reformBar1 = 0;
          finalBoss.reformBar2 = 0;
          state.enemies = state.enemies.filter((enemy) => enemy.boss);
          state.enemyBullets.length = 0;
          addEnemy(finalBoss, true);
          state.w3SuperSpawned = true;
          state.lastBossW3 = 200;
          toast("FINAL BOSS // INEQUALITY ENGINE");
        }
      }
      return;
    }
  }

  function spawnEnemy() {
    if (state.modal || state.gameOver) return;
    if (majorBossFightActive()) return;
    if (state.enemies.length >= enemyCap()) return;

    const bossAlive = hasBoss();
    if (bossAlive && Math.random() < 0.2) return;

    const pick = weightedPick(worldEnemyPool());
    const enemy = createEnemy(pick.type);
    addEnemy(enemy);
  }

  function spawnRate() {
    if (state.world === 1) {
      const base = 0.95 + state.level * 0.06 + Math.max(0, state.level - 40) * 0.03;
      const earlySpawnMult = state.level <= 10 ? lerp(0.9, 1, clamp(state.level / 10, 0, 1)) : 1;
      return Math.min(8.2, base) * earlySpawnMult;
    }
    if (state.world === 2) {
      const base = 1.3 + state.level * 0.09;
      return Math.min(8.8, base);
    }
    const base = 1.8 + state.level * 0.11;
    return Math.min(10.6, base);
  }

  function spawnPlayerBullet(x, y, angle, options = {}) {
    if (state.bullets.length >= dynamicPlayerBulletCap()) return;
    const speed = options.speed || player.bulletSpeed;
    state.bullets.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: options.radius || 4,
      damage: options.damage || player.bulletDamage,
      life: options.life || player.bulletLife,
      pierce: options.pierce || player.bulletPierce,
      bounces: options.bounces != null ? options.bounces : player.bulletBounces,
      color: options.color || "#b8f4ff",
      explodeRadius: options.explodeRadius || 0,
      dot: Boolean(options.dot),
      knockback: options.knockback == null ? 1 : options.knockback,
      owner: options.owner || "player",
      wallBounceRule: Boolean(options.wallBounceRule),
      dead: false,
    });
  }

  function spawnEnemyBullet(x, y, angle, speed, radius, damage, color, homing = false, life = 5) {
    if (state.enemyBullets.length >= dynamicEnemyBulletCap()) return;
    state.enemyBullets.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius,
      damage,
      color,
      life,
      homing,
      dead: false,
    });
  }

  function playerAimAngle() {
    return Math.atan2(input.mouse.y - player.y, input.mouse.x - player.x);
  }

  function firePrimary() {
    if (state.gameOver) return;

    if (state.ascendedPath === "deployer") return;
    if (state.path === "tank" && !state.ascendedPath) return;
    if (state.path === "colossal" && !state.ascendedPath) return;
    if (state.path === "create" && !state.ascendedPath) return;

    const angle = playerAimAngle();

    if (state.ascendedPath === "transcendental") {
      fireTranscendBlast(angle);
      return;
    }

    if (state.path === "spray" && !state.ascendedPath) {
      const forwardX = Math.cos(angle);
      const forwardY = Math.sin(angle);
      const sideX = -forwardY;
      const sideY = forwardX;
      const originX = player.x + forwardX * (player.radius + 4);
      const originY = player.y + forwardY * (player.radius + 4);

      for (let i = -2; i <= 2; i += 1) {
        const laneOffset = i * 4.4;
        const jitter = rand(-0.012, 0.012);
        spawnPlayerBullet(
          originX + sideX * laneOffset + forwardX * 6,
          originY + sideY * laneOffset + forwardY * 6,
          angle + jitter,
          {
            damage: player.bulletDamage * 0.44,
            radius: 3.6,
            life: player.bulletLife + 1.25,
            bounces: player.bulletBounces,
            pierce: player.bulletPierce,
            color: "#99f3ff",
            wallBounceRule: true,
          }
        );
      }
      return;
    }

    spawnPlayerBullet(player.x, player.y, angle, {
      radius: 4.2,
      color: "#d4f7ff",
      pierce: player.bulletPierce,
      bounces: player.bulletBounces,
    });
  }

  function fireTranscendBlast(angle) {
    const shotCount = Math.max(1, Math.floor(transcend.shotCount));
    const spread = transcend.shotSpread;
    for (let i = 0; i < shotCount; i += 1) {
      const offset = i - (shotCount - 1) * 0.5;
      const a = angle + offset * spread;
      spawnPlayerBullet(player.x, player.y, a, {
        speed: 860,
        radius: transcend.width,
        damage: transcend.damage,
        life: 0.9,
        pierce: 999,
        bounces: 0,
        color: "#d7c8ff",
        dot: transcend.entropy,
        owner: "transcend",
        knockback: 0.45,
      });
    }

    if (transcend.aftershock) {
      const fx = player.x + Math.cos(angle) * 160;
      const fy = player.y + Math.sin(angle) * 160;
      state.effects.push({
        type: "aftershock",
        x: fx,
        y: fy,
        delay: 0.22,
        radius: 90,
        damage: transcend.damage * 0.55,
        life: 0.34,
      });
    }

    if (transcend.phaseMantle) {
      player.invuln = Math.max(player.invuln, 0.18 + 0.035 * uLvl("phase_mantle"));
    }
  }

  function shotsPerSecond() {
    if (state.godMode && !hyperDodecaFightActive()) return 120;
    let shots = 1 * player.fireRateMult;
    if (state.path === "spray" && !state.ascendedPath) shots *= 1.6;
    if (state.path === "create" && !state.ascendedPath) shots *= 0.9;
    if (state.ascendedPath === "transcendental") shots = Math.max(0.35, 1 / transcend.cooldown);
    return clamp(shots, 0.25, 28);
  }

  function updatePlayer(dt) {
    let moveX = 0;
    let moveY = 0;
    if (input.keys.has("KeyW")) moveY -= 1;
    if (input.keys.has("KeyS")) moveY += 1;
    if (input.keys.has("KeyA")) moveX -= 1;
    if (input.keys.has("KeyD")) moveX += 1;

    if (moveX !== 0 || moveY !== 0) {
      const len = Math.hypot(moveX, moveY) || 1;
      moveX /= len;
      moveY /= len;
      player.x += moveX * player.speed * dt;
      player.y += moveY * player.speed * dt;
    }

    player.x = clamp(player.x, player.radius + 3, width - player.radius - 3);
    player.y = clamp(player.y, player.radius + 3, height - player.radius - 3);

    player.invuln = Math.max(0, player.invuln - dt);
    player.collisionCd = Math.max(0, player.collisionCd - dt);
    updateWorld3ShieldSuppression();
    player.hp = Math.min(player.maxHp, player.hp + player.regen * dt);
    if (state.godMode) {
      if (hyperDodecaFightActive()) clampGodModeDuringHyperBoss();
      else applyGodModeBonuses();
    }

    state.shotTimer -= dt;
    if (state.shotTimer <= 0) {
      firePrimary();
      state.shotTimer += 1 / shotsPerSecond();
    }
  }

  function syncDrones() {
    if (state.ascendedPath === "deployer") {
      while (state.drones.length < deployer.slots) {
        state.drones.push({
          kind: "pulse",
          x: player.x,
          y: player.y,
          angleOffset: rand(0, TAU),
          cooldown: rand(0.1, 0.8),
        });
      }
      if (state.drones.length > deployer.slots) {
        state.drones.length = deployer.slots;
      }

      const availableKinds = ["pulse"];
      if (deployer.beamUnlocked) availableKinds.push("beam");
      if (deployer.bomberUnlocked) availableKinds.push("bomber");

      for (let i = 0; i < state.drones.length; i += 1) {
        const drone = state.drones[i];
        drone.kind = availableKinds[i % availableKinds.length];
      }
      return;
    }

    if (state.path === "create" && !state.ascendedPath) {
      const desiredSlots = hyperDodecaFightActive()
        ? Math.min(createPath.slots, hyperCreateBotCap())
        : createPath.slots;

      while (state.drones.length < desiredSlots) {
        state.drones.push({
          mode: createPath.mode,
          x: player.x + rand(-30, 30),
          y: player.y + rand(-30, 30),
          vx: 0,
          vy: 0,
          lastAimAngle: rand(0, TAU),
          cooldown: rand(0.08, 0.4),
          maxHp: createPath.hp,
          hp: createPath.hp,
          size: createPath.mode === "transcend" ? 12.5 : 11,
          deadTimer: 0,
          variantHue: rand(-16, 16),
          variantScale: rand(0.93, 1.08),
          variantModel: rand(0.92, 1.08),
        });
      }
      if (state.drones.length > desiredSlots) {
        state.drones.length = desiredSlots;
      }
      for (let i = 0; i < state.drones.length; i += 1) {
        const drone = state.drones[i];
        drone.mode = createPath.mode;
        drone.maxHp = createPath.hp;
        drone.size = (createPath.mode === "transcend" ? 12.5 : 11) * createPath.size;
        drone.vx = drone.vx || 0;
        drone.vy = drone.vy || 0;
        if (drone.lastAimAngle == null) drone.lastAimAngle = rand(0, TAU);
        if (drone.variantHue == null) drone.variantHue = rand(-16, 16);
        if (drone.variantScale == null) drone.variantScale = rand(0.93, 1.08);
        if (drone.variantModel == null) drone.variantModel = rand(0.92, 1.08);
        if (drone.deadTimer <= 0) drone.hp = clamp(drone.hp || createPath.hp, 0, createPath.hp);
      }
      return;
    }

    if (state.drones.length > 0) {
      state.drones.length = 0;
    }
  }

  function enemyOnScreen(enemy, padding = 0) {
    return !(
      enemy.x + enemy.size < -padding ||
      enemy.x - enemy.size > width + padding ||
      enemy.y + enemy.size < -padding ||
      enemy.y - enemy.size > height + padding
    );
  }

  function nearestEnemy(x, y, maxRange = Infinity, onScreenOnly = false) {
    let best = null;
    let bestD2 = maxRange * maxRange;
    for (const enemy of state.enemies) {
      if (enemy.dead) continue;
      if (onScreenOnly && !enemyOnScreen(enemy)) continue;
      const d = (enemy.x - x) ** 2 + (enemy.y - y) ** 2;
      if (d < bestD2) {
        bestD2 = d;
        best = enemy;
      }
    }
    return best;
  }

  function aliveCreateBots() {
    if (state.path !== "create" || state.ascendedPath) return [];
    return state.drones.filter((drone) => !drone.deadTimer || drone.deadTimer <= 0);
  }

  function nearestCombatTarget(x, y) {
    let target = player;
    let bestD2 = (player.x - x) ** 2 + (player.y - y) ** 2;
    const bots = aliveCreateBots();
    for (const bot of bots) {
      const d2 = (bot.x - x) ** 2 + (bot.y - y) ** 2;
      if (d2 < bestD2) {
        bestD2 = d2;
        target = bot;
      }
    }
    return target;
  }

  function enemyTarget(enemy) {
    return nearestCombatTarget(enemy.x, enemy.y);
  }

  function updateDrones(dt) {
    syncDrones();

    if (state.ascendedPath !== "deployer" && (state.path !== "create" || state.ascendedPath)) return;

    if (state.ascendedPath === "deployer") {
      for (let i = 0; i < state.drones.length; i += 1) {
        const drone = state.drones[i];
        const orbitR = 52 + 8 * Math.sin(state.time * 1.1 + i);
        const orbitA = state.time * (0.9 + i * 0.03) + drone.angleOffset;
        drone.x = player.x + Math.cos(orbitA) * orbitR;
        drone.y = player.y + Math.sin(orbitA) * orbitR;

        drone.cooldown -= dt;
        const target = nearestEnemy(drone.x, drone.y, 440, true);
        if (!target || drone.cooldown > 0) continue;

        const angle = Math.atan2(target.y - drone.y, target.x - drone.x);
        if (drone.kind === "pulse") {
          spawnPlayerBullet(drone.x, drone.y, angle, {
            damage: deployer.pulseDamage,
            speed: 700,
            radius: 3.4,
            life: 1.8,
            pierce: 1,
            bounces: 0,
            color: "#7fe7ff",
            owner: "drone",
          });
          drone.cooldown = 0.35 / deployer.fireRate;
        } else if (drone.kind === "beam") {
          target.hp -= deployer.beamDamage;
          state.effects.push({
            type: "beam",
            x1: drone.x,
            y1: drone.y,
            x2: target.x,
            y2: target.y,
            life: 0.1,
            color: "#9df7ff",
          });
          drone.cooldown = 0.62 / deployer.fireRate;
        } else if (drone.kind === "bomber") {
          spawnPlayerBullet(drone.x, drone.y, angle, {
            damage: deployer.bomberDamage,
            speed: 380,
            radius: 6,
            life: 2.6,
            pierce: 1,
            bounces: 0,
            color: "#ffd57f",
            explodeRadius: 64,
            owner: "drone",
            knockback: 0.45,
          });
          drone.cooldown = 1.05 / deployer.fireRate;
        }
      }
      return;
    }

    const hyperFight = hyperDodecaFightActive();
    const hyperQuality = hyperFight ? hyperBossQualityScale() : 1;

    for (let i = 0; i < state.drones.length; i += 1) {
      const drone = state.drones[i];

      if (drone.deadTimer > 0) {
        drone.deadTimer -= dt;
        if (drone.deadTimer <= 0) {
          drone.deadTimer = 0;
          drone.hp = drone.maxHp;
          drone.x = player.x + rand(-24, 24);
          drone.y = player.y + rand(-24, 24);
          drone.vx = 0;
          drone.vy = 0;
          state.effects.push({ type: "pop", x: drone.x, y: drone.y, radius: 24, life: 0.24, color: "#d4f0ff" });
        }
        continue;
      }

      const target = nearestEnemy(drone.x, drone.y, 720, true);
      if (target) {
        const leadTime = createPath.instantAim ? 0.18 : 0.06;
        const tx = target.x + (target.vx || 0) * leadTime;
        const ty = target.y + (target.vy || 0) * leadTime;
        const a = Math.atan2(ty - drone.y, tx - drone.x);
        drone.lastAimAngle = a;
        const accel = createPath.instantAim ? 420 : 320;
        if (createPath.dangerAvoidance) {
          const dx = tx - drone.x;
          const dy = ty - drone.y;
          const distance = Math.hypot(dx, dy) || 1;
          const desired = 150 + (drone.variantScale || 1) * 12;
          if (distance > desired + 24) {
            drone.vx += Math.cos(a) * accel * dt * 0.8;
            drone.vy += Math.sin(a) * accel * dt * 0.8;
          } else if (distance < desired - 18) {
            drone.vx -= Math.cos(a) * accel * dt * 1.1;
            drone.vy -= Math.sin(a) * accel * dt * 1.1;
          } else {
            const strafeDir = i % 2 === 0 ? 1 : -1;
            const tangent = a + strafeDir * Math.PI / 2;
            drone.vx += Math.cos(tangent) * accel * dt * 0.7;
            drone.vy += Math.sin(tangent) * accel * dt * 0.7;
          }
        } else {
          drone.vx += Math.cos(a) * accel * dt;
          drone.vy += Math.sin(a) * accel * dt;
        }
      } else {
        const orbitA = state.time * (0.8 + i * 0.05) + i * 1.1;
        const ox = player.x + Math.cos(orbitA) * 62;
        const oy = player.y + Math.sin(orbitA) * 62;
        drone.vx += (ox - drone.x) * dt * 2.2;
        drone.vy += (oy - drone.y) * dt * 2.2;
      }

      drone.vx *= 0.92;
      drone.vy *= 0.92;
      drone.x += drone.vx * dt;
      drone.y += drone.vy * dt;
      const pad = (drone.size || 11) + 2;
      drone.x = clamp(drone.x, pad, width - pad);
      drone.y = clamp(drone.y, pad, height - pad);
      drone.hp = Math.min(drone.maxHp, drone.hp + createPath.botRegen * dt);

      drone.cooldown -= dt;
      const keepFiring = createPath.pathRateSync && drone.lastAimAngle != null;
      if ((target || keepFiring) && drone.cooldown <= 0) {
        let angle = drone.lastAimAngle;
        if (target) {
          const leadTime = createPath.instantAim ? 0.2 : 0.05;
          const tx = target.x + (target.vx || 0) * leadTime;
          const ty = target.y + (target.vy || 0) * leadTime;
          angle = Math.atan2(ty - drone.y, tx - drone.x);
          drone.lastAimAngle = angle;
        }
        if (angle == null) angle = playerAimAngle();
        let botRateMult = createPath.fireRate * Math.max(0.7, player.fireRateMult * 0.85);
        if (createPath.pathRateSync) {
          botRateMult *= Math.max(1, shotsPerSecond() * 1.45);
        }
        botRateMult = Math.max(0.3, botRateMult);
        if (drone.mode === "transcend") {
          const transHue = Math.round(272 + (drone.variantHue || 0) * 0.6);
          spawnPlayerBullet(drone.x, drone.y, angle, {
            damage: 17 * createPath.damage,
            speed: 760,
            radius: 7.2,
            life: 1.2,
            pierce: 5,
            bounces: 0,
            color: `hsla(${transHue}, 100%, 82%, 1)`,
            owner: "create",
            knockback: 0.35,
          });
          const transcendCycle = hyperFight ? lerp(1.3, 1.05, hyperQuality) : 1.02;
          drone.cooldown = transcendCycle / botRateMult;
        } else {
          const forwardX = Math.cos(angle);
          const forwardY = Math.sin(angle);
          const sideX = -forwardY;
          const sideY = forwardX;
          const originX = drone.x + forwardX * 8;
          const originY = drone.y + forwardY * 8;
          const laneMin = hyperFight && hyperQuality < 0.74 ? -1 : -2;
          const laneMax = hyperFight && hyperQuality < 0.74 ? 1 : 2;
          for (let lane = laneMin; lane <= laneMax; lane += 1) {
            const laneOffset = lane * 2.5;
            const jitter = createPath.instantAim ? 0 : rand(-0.012, 0.012);
            spawnPlayerBullet(
              originX + sideX * laneOffset + forwardX * 4,
              originY + sideY * laneOffset + forwardY * 4,
              angle + jitter,
              {
                damage: player.bulletDamage * 0.44 * createPath.damage,
                speed: player.bulletSpeed,
                radius: 3.6,
                life: player.bulletLife + 1.25,
                pierce: player.bulletPierce,
                bounces: player.bulletBounces,
                color: `hsla(${Math.round(192 + (drone.variantHue || 0))}, 100%, 78%, 1)`,
                owner: "create",
              }
            );
          }
          const sprayCycle = hyperFight ? lerp(0.95, 0.7, hyperQuality) : 0.62;
          drone.cooldown = sprayCycle / botRateMult;
        }
      }

      for (const enemy of state.enemies) {
        if (enemy.dead) continue;
        const hitR = enemy.size + (drone.size || 11);
        if ((enemy.x - drone.x) ** 2 + (enemy.y - drone.y) ** 2 > hitR * hitR) continue;
        const botArmor = clamp(createPath.armor + (drone.mode === "transcend" ? 0.1 : 0), 0, 0.85);
        drone.hp -= enemy.damage * dt * 1.1 * (1 - botArmor);
      }

      if (drone.hp <= 0) {
        drone.hp = 0;
        drone.deadTimer = createPath.respawn;
        state.effects.push({ type: "pop", x: drone.x, y: drone.y, radius: 18, life: 0.2, color: "#98bfff" });
      }
    }
  }

  function applyExplosionDamage(x, y, radius, damage) {
    const radius2 = radius * radius;
    for (const enemy of state.enemies) {
      if (enemy.dead) continue;
      const d2 = (enemy.x - x) ** 2 + (enemy.y - y) ** 2;
      if (d2 > radius2) continue;
      const distance = Math.sqrt(d2);
      const falloff = 1 - distance / radius;
      let dealt = damage * clamp(falloff, 0.22, 1);
      if (enemy.type === "bossW3Final") {
        dealt *= 0.18;
        dealt = Math.min(dealt, enemy.maxHp * 0.015);
      }
      enemy.hp -= dealt;
    }
  }

  function applyEnemyDot(enemy, dt) {
    if (enemy.dotTimer > 0) {
      enemy.dotTimer -= dt;
      enemy.hp -= enemy.dotDamage * dt;
    }
  }

  function updateBullets(dt) {
    for (const bullet of state.bullets) {
      if (bullet.dead) continue;
      if (!bullet.wallBounceRule) bullet.life -= dt;
      bullet.x += bullet.vx * dt;
      bullet.y += bullet.vy * dt;

      let bounced = false;
      if (bullet.x < bullet.radius || bullet.x > width - bullet.radius) {
        if (bullet.bounces > 0) {
          bullet.vx *= -1;
          bullet.x = clamp(bullet.x, bullet.radius + 1, width - bullet.radius - 1);
          bullet.bounces -= 1;
          bounced = true;
        } else {
          bullet.dead = true;
        }
      }
      if (bullet.y < bullet.radius || bullet.y > height - bullet.radius) {
        if (bullet.bounces > 0) {
          bullet.vy *= -1;
          bullet.y = clamp(bullet.y, bullet.radius + 1, height - bullet.radius - 1);
          bullet.bounces -= 1;
          bounced = true;
        } else {
          bullet.dead = true;
        }
      }

      if (!bullet.wallBounceRule && bullet.life <= 0 && !bounced) bullet.dead = true;
      if (bullet.dead) {
        if (bullet.explodeRadius > 0) {
          applyExplosionDamage(bullet.x, bullet.y, bullet.explodeRadius, bullet.damage * 0.9);
          state.effects.push({
            type: "boom",
            x: bullet.x,
            y: bullet.y,
            radius: bullet.explodeRadius,
            life: 0.25,
          });
        }
        continue;
      }

      for (const enemy of state.enemies) {
        if (enemy.dead) continue;
        if (enemy.invuln > 0) continue;
        const hitR = enemy.size + bullet.radius;
        if ((enemy.x - bullet.x) ** 2 + (enemy.y - bullet.y) ** 2 > hitR * hitR) continue;

        let dealtDamage = bullet.damage;
        if (enemy.type === "bossW3Final") {
          if (bullet.owner === "transcend") dealtDamage *= 0.16;
          else if (bullet.owner === "create") dealtDamage *= 0.78;
          dealtDamage = Math.min(dealtDamage, enemy.maxHp * 0.01);
        }
        enemy.hp -= dealtDamage;
        if (bullet.owner === "transcend" && enemy.transHitCd <= 0) {
          enemy.transHitCd = 0.06;
          state.effects.push({
            type: "transHit",
            x: enemy.x,
            y: enemy.y,
            radius: enemy.size * 1.15,
            life: 0.28,
            maxLife: 0.28,
            spin: rand(0, TAU),
            spikes: irand(6, 10),
            twist: Math.random() < 0.5 ? -1 : 1,
          });
        }
        bullet.pierce -= 1;
        if (bullet.dot) {
          enemy.dotTimer = Math.max(enemy.dotTimer, 2.8);
          enemy.dotDamage = Math.max(enemy.dotDamage, dealtDamage * 0.35);
        }

        if (!enemy.boss && !enemy.immobile) {
          const angle = Math.atan2(enemy.y - bullet.y, enemy.x - bullet.x);
          const knock = 58 * bullet.knockback;
          enemy.vx += Math.cos(angle) * knock;
          enemy.vy += Math.sin(angle) * knock;
        }

        if (bullet.explodeRadius > 0) {
          applyExplosionDamage(bullet.x, bullet.y, bullet.explodeRadius, bullet.damage * 0.65);
          state.effects.push({
            type: "boom",
            x: bullet.x,
            y: bullet.y,
            radius: bullet.explodeRadius,
            life: 0.25,
          });
          bullet.dead = true;
          break;
        }

        if (bullet.pierce <= 0) {
          bullet.dead = true;
          break;
        }
      }
    }

    state.bullets = state.bullets.filter((bullet) => !bullet.dead);
  }

  function updateEnemyBullets(dt) {
    const hyperFight = hyperDodecaFightActive();
    const allAliveBots = aliveCreateBots();
    const collisionCap = hyperFight
      ? Math.max(36, Math.round(48 + hyperBossQualityScale() * 72))
      : allAliveBots.length;
    const collisionBots = hyperFight && allAliveBots.length > collisionCap
      ? allAliveBots.slice(0, collisionCap)
      : allAliveBots;

    for (const bullet of state.enemyBullets) {
      if (bullet.dead) continue;
      bullet.life -= dt;

      if (bullet.homing) {
        const lock = hyperFight ? player : nearestCombatTarget(bullet.x, bullet.y);
        const aimAngle = Math.atan2(lock.y - bullet.y, lock.x - bullet.x);
        const speed = Math.hypot(bullet.vx, bullet.vy);
        const current = Math.atan2(bullet.vy, bullet.vx);
        const turn = Math.atan2(Math.sin(aimAngle - current), Math.cos(aimAngle - current));
        const next = current + clamp(turn, -2.2 * dt, 2.2 * dt);
        bullet.vx = Math.cos(next) * speed;
        bullet.vy = Math.sin(next) * speed;
      }

      bullet.x += bullet.vx * dt;
      bullet.y += bullet.vy * dt;

      if (
        bullet.life <= 0 ||
        bullet.x < -40 ||
        bullet.x > width + 40 ||
        bullet.y < -40 ||
        bullet.y > height + 40
      ) {
        bullet.dead = true;
        continue;
      }

      for (const bot of collisionBots) {
        const rBot = (bot.size || 11) + bullet.radius;
        if ((bot.x - bullet.x) ** 2 + (bot.y - bullet.y) ** 2 <= rBot * rBot) {
          const botArmor = clamp(createPath.armor + (bot.mode === "transcend" ? 0.1 : 0), 0, 0.85);
          const botDamage = Math.max(1, bullet.damage * (1 - botArmor));
          bot.hp -= botDamage;
          bullet.dead = true;
          break;
        }
      }
      if (bullet.dead) continue;

      const r = player.radius + bullet.radius;
      if ((player.x - bullet.x) ** 2 + (player.y - bullet.y) ** 2 <= r * r) {
        damagePlayer(bullet.damage);
        bullet.dead = true;
      }
    }
    state.enemyBullets = state.enemyBullets.filter((bullet) => !bullet.dead);
  }

  function damagePlayer(rawDamage, isCollision = false) {
    if (state.godMode && !hyperDodecaFightActive()) {
      player.hp = player.maxHp;
      return;
    }
    if (state.gameOver || player.invuln > 0) return;

    let reduction = player.damageReduction;
    if (state.path === "spray" && !state.ascendedPath) reduction += player.sprayMitigation;
    reduction = clamp(reduction, 0, 0.9);
    if (isCollision) {
      reduction = clamp(reduction + player.massDensityReduction, 0, 0.99);
    }

    if (state.path === "spray" && !state.ascendedPath && Math.random() < player.sprayEvade) {
      state.effects.push({
        type: "evade",
        x: player.x,
        y: player.y,
        life: 0.16,
      });
      return;
    }

    const finalDamage = Math.max(1, rawDamage * (1 - reduction));
    let remaining = finalDamage;
    if (player.tempHp > 0) {
      const absorbed = Math.min(player.tempHp, remaining);
      player.tempHp -= absorbed;
      remaining -= absorbed;
    }
    if (remaining > 0) player.hp -= remaining;
    player.invuln = 0.07;

    if (player.hp <= 0) {
      player.hp = 0;
      state.gameOver = true;
      state.paused = true;
      openModal("Game Over", "1) Respawn  2) Keep spectating  (R also respawns)", [
        {
          label: "Respawn",
          desc: "Restart from level 1 immediately.",
          onPick: () => {
            restartRun();
          },
        },
        {
          label: "Keep Spectating",
          desc: "Leave arena open to inspect balance.",
          onPick: () => {
            state.paused = true;
          },
        },
      ]);
    }
  }

  function handleCollision(enemy) {
    if (enemy.dead) return;
    if (enemy.type === "bossW3Final" && enemy.reforming) return;
    const overlap = player.radius + enemy.size;
    const d2 = (enemy.x - player.x) ** 2 + (enemy.y - player.y) ** 2;
    if (d2 > overlap * overlap) return;
    const angle = Math.atan2(enemy.y - player.y, enemy.x - player.x);

    if ((state.path === "tank" || state.path === "colossal") && !state.ascendedPath) {
      if (enemy.ramHitCd <= 0) {
        const colossalMult = state.path === "colossal" ? 1.35 : 1;
        enemy.hp -= player.ramDamage * colossalMult;
        enemy.ramHitCd = state.path === "colossal" ? 0.16 : 0.22;
        if (!enemy.boss && !enemy.immobile) {
          const recoil = (state.path === "colossal" ? 56 : 70) * player.tankKnockback;
          enemy.vx += Math.cos(angle) * recoil;
          enemy.vy += Math.sin(angle) * recoil;
        }
        state.effects.push({
          type: "ram",
          x: enemy.x,
          y: enemy.y,
          life: 0.11,
        });
      }
    }

    if (player.collisionCd <= 0) {
      damagePlayer(enemy.damage, true);
      player.collisionCd = 0.18;
    }
  }

  function enemyChase(enemy, dt, speedScale = 1, targetEntity = null) {
    const target = targetEntity || enemyTarget(enemy);
    const angle = Math.atan2(target.y - enemy.y, target.x - enemy.x);
    enemy.vx += Math.cos(angle) * enemy.speed * speedScale * dt * 2.2;
    enemy.vy += Math.sin(angle) * enemy.speed * speedScale * dt * 2.2;
  }

  function updateEnemyAI(enemy, dt) {
    enemy.aiTimer -= dt;
    enemy.modeTimer -= dt;
    enemy.fireTimer -= dt;
    enemy.summonTimer -= dt;
    applyEnemyDot(enemy, dt);
    const target = enemyTarget(enemy);

    if (enemy.type === "skitter") {
      enemyChase(enemy, dt, 0.95);
    } else if (enemy.type === "brute") {
      enemyChase(enemy, dt, 0.65);
    } else if (enemy.type === "runner") {
      enemy.phase += dt * 6;
      const wobble = Math.sin(enemy.phase) * 0.8;
      const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x) + wobble;
      enemy.vx += Math.cos(angle) * enemy.speed * dt * 2.3;
      enemy.vy += Math.sin(angle) * enemy.speed * dt * 2.3;
    } else if (enemy.type === "xpCache") {
      enemy.vx = 0;
      enemy.vy = 0;
      const rampTo55 = clamp((state.level - 25) / 30, 0, 1);
      const rampPost55 = clamp((state.level - 55) / 40, 0, 1);
      const cooldownScale = state.level <= 55
        ? lerp(1.85, 1.15, rampTo55)
        : lerp(1.15, 0.78, rampPost55);
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = 0.72 * cooldownScale;
        const base = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        spawnEnemyBullet(enemy.x, enemy.y, base - 0.18, 272, 4.4, enemy.damage * 0.5, "#ffd873", false);
        spawnEnemyBullet(enemy.x, enemy.y, base, 298, 4.9, enemy.damage * 0.65, "#ffe89d", false);
        spawnEnemyBullet(enemy.x, enemy.y, base + 0.18, 272, 4.4, enemy.damage * 0.5, "#ffd873", false);
      }
    } else if (enemy.type === "phaseStalker") {
      if (enemy.aiTimer <= 0) {
        enemy.aiTimer = rand(1.2, 2.3);
        enemy.x += rand(-95, 95);
        enemy.y += rand(-95, 95);
        enemy.x = clamp(enemy.x, enemy.size, width - enemy.size);
        enemy.y = clamp(enemy.y, enemy.size, height - enemy.size);
      }
      enemyChase(enemy, dt, 0.9);
    } else if (enemy.type === "lancer") {
      if (enemy.modeTimer <= 0) {
        enemy.modeTimer = 1.5;
        const dashAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        enemy.vx += Math.cos(dashAngle) * enemy.speed * 3;
        enemy.vy += Math.sin(dashAngle) * enemy.speed * 3;
      }
      enemyChase(enemy, dt, 0.52);
    } else if (enemy.type === "artillery") {
      const away = Math.atan2(enemy.y - player.y, enemy.x - player.x);
      const dist = Math.sqrt((enemy.x - player.x) ** 2 + (enemy.y - player.y) ** 2);
      if (dist < 220) {
        enemy.vx += Math.cos(away) * enemy.speed * dt * 2.4;
        enemy.vy += Math.sin(away) * enemy.speed * dt * 2.4;
      } else {
        enemyChase(enemy, dt, 0.34);
      }
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(0.9, 1.6);
        const shotAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        spawnEnemyBullet(enemy.x, enemy.y, shotAngle, 260, 5, enemy.damage * 0.9, "#9ab6ff");
      }
    } else if (enemy.type === "splitter") {
      enemyChase(enemy, dt, 0.82);
    } else if (enemy.type === "latticeRunner") {
      enemy.phase += dt * 8.5;
      const wobble = Math.sin(enemy.phase) * 1.05;
      const angle = Math.atan2(target.y - enemy.y, target.x - enemy.x) + wobble;
      enemy.vx += Math.cos(angle) * enemy.speed * dt * 2.8;
      enemy.vy += Math.sin(angle) * enemy.speed * dt * 2.8;
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(1.05, 1.65);
        const base = Math.atan2(target.y - enemy.y, target.x - enemy.x);
        spawnEnemyBullet(enemy.x, enemy.y, base, 320, 4.2, enemy.damage * 0.52, "#ff9da7");
      }
    } else if (enemy.type === "theoremKnight") {
      enemyChase(enemy, dt, 0.6);
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(0.92, 1.3);
        const base = Math.atan2(target.y - enemy.y, target.x - enemy.x);
        spawnEnemyBullet(enemy.x, enemy.y, base - 0.1, 300, 4.8, enemy.damage * 0.6, "#ff7c89");
        spawnEnemyBullet(enemy.x, enemy.y, base + 0.1, 300, 4.8, enemy.damage * 0.6, "#ff7c89");
      }
    } else if (enemy.type === "axiomTurret") {
      enemy.vx = 0;
      enemy.vy = 0;
      enemy.phase += dt * 1.8;
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(0.7, 1.15);
        const points = 7;
        for (let i = 0; i < points; i += 1) {
          const t = (i / (points - 1)) * 2 - 1;
          const inequality = 0.38 + Math.pow(Math.abs(t), 1.6) * 0.4;
          const a = enemy.phase + t * 0.95;
          const speed = 255 + inequality * 115;
          spawnEnemyBullet(enemy.x, enemy.y, a, speed, 4.1, enemy.damage * 0.44, "#ff9ba6");
          spawnEnemyBullet(enemy.x, enemy.y, a + Math.PI, speed, 4.1, enemy.damage * 0.44, "#d83e54");
        }
      }
    } else if (enemy.type === "paradoxReaver") {
      if (enemy.aiTimer <= 0) {
        enemy.aiTimer = rand(0.9, 1.4);
        const warp = rand(0, TAU);
        enemy.x = clamp(target.x + Math.cos(warp) * rand(90, 190), enemy.size, width - enemy.size);
        enemy.y = clamp(target.y + Math.sin(warp) * rand(90, 190), enemy.size, height - enemy.size);
      }
      enemyChase(enemy, dt, 0.76);
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(0.68, 1.05);
        const base = Math.atan2(target.y - enemy.y, target.x - enemy.x);
        spawnEnemyBullet(enemy.x, enemy.y, base, 360, 4.5, enemy.damage * 0.5, "#ff7585");
        spawnEnemyBullet(enemy.x, enemy.y, base + Math.PI / 2, 300, 4.2, enemy.damage * 0.35, "#ff9dad");
        spawnEnemyBullet(enemy.x, enemy.y, base - Math.PI / 2, 300, 4.2, enemy.damage * 0.35, "#ff9dad");
      }
    } else if (enemy.type === "beamSentinel") {
      const isCrimson = Boolean(enemy.crimsonVariant);
      const a = Math.atan2(target.y - enemy.y, target.x - enemy.x);
      const d = Math.sqrt((target.x - enemy.x) ** 2 + (target.y - enemy.y) ** 2);
      const desired = isCrimson ? 300 : 285;
      if (d < desired - 70) {
        enemy.vx -= Math.cos(a) * enemy.speed * dt * (isCrimson ? 2.05 : 1.8);
        enemy.vy -= Math.sin(a) * enemy.speed * dt * (isCrimson ? 2.05 : 1.8);
      } else if (d > desired + 95) {
        enemy.vx += Math.cos(a) * enemy.speed * dt * (isCrimson ? 1.4 : 1.2);
        enemy.vy += Math.sin(a) * enemy.speed * dt * (isCrimson ? 1.4 : 1.2);
      }
      enemy.phase += dt * (isCrimson ? 4.4 : 3.5);

      if (enemy.summonFxTimer > 0) {
        enemy.summonFxTimer = Math.max(0, enemy.summonFxTimer - dt);
        enemy.vx *= 0.93;
        enemy.vy *= 0.93;
      } else if (enemy.beamCharge > 0) {
        enemy.beamCharge = Math.max(0, enemy.beamCharge - dt);
        if (enemy.beamCharge <= 0) {
          const sweep = Math.sin(enemy.phase * (isCrimson ? 1.05 : 0.7)) * (isCrimson ? 0.22 : 0.16);
          const beamAngle = Math.atan2(target.y - enemy.y, target.x - enemy.x) + sweep;
          const beamLen = Math.max(width, height) * 1.25;
          const beamX2 = enemy.x + Math.cos(beamAngle) * beamLen;
          const beamY2 = enemy.y + Math.sin(beamAngle) * beamLen;

          state.effects.push({
            type: "beam",
            x1: enemy.x,
            y1: enemy.y,
            x2: beamX2,
            y2: beamY2,
            life: isCrimson ? 0.19 : 0.14,
            color: isCrimson ? "#ff5f78" : "#f18dff",
          });
          state.effects.push({
            type: "beam",
            x1: enemy.x,
            y1: enemy.y,
            x2: beamX2,
            y2: beamY2,
            life: isCrimson ? 0.12 : 0.08,
            color: isCrimson ? "#ffd4dc" : "#ffe8ff",
          });

          const playerBeamR = player.radius + 7;
          const beamDamage = enemy.damage * (isCrimson ? 1.28 : 0.95);
          if (pointSegmentDist2(player.x, player.y, enemy.x, enemy.y, beamX2, beamY2) <= playerBeamR * playerBeamR) {
            damagePlayer(beamDamage);
          }

          const bots = aliveCreateBots();
          for (const bot of bots) {
            const botR = (bot.size || 11) + 6;
            if (pointSegmentDist2(bot.x, bot.y, enemy.x, enemy.y, beamX2, beamY2) > botR * botR) continue;
            const botArmor = clamp(createPath.armor + (bot.mode === "transcend" ? 0.1 : 0), 0, 0.85);
            bot.hp -= Math.max(1, beamDamage * 0.76 * (1 - botArmor));
          }

          enemy.fireTimer = rand(isCrimson ? 0.64 : 0.92, isCrimson ? 0.96 : 1.28);
        }
      } else if (enemy.fireTimer <= 0) {
        enemy.beamCharge = isCrimson ? 0.74 : 0.44;
        enemy.beamChargeMax = enemy.beamCharge;
      }
    } else if (enemy.type === "vitaShard") {
      enemy.phase += dt * 4.6;
      const angle = Math.atan2(target.y - enemy.y, target.x - enemy.x) + Math.sin(enemy.phase) * 0.45;
      enemy.vx += Math.cos(angle) * enemy.speed * dt * 1.85;
      enemy.vy += Math.sin(angle) * enemy.speed * dt * 1.85;
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(1.2, 1.8);
        const base = Math.atan2(target.y - enemy.y, target.x - enemy.x);
        spawnEnemyBullet(enemy.x, enemy.y, base, 280, 3.8, enemy.damage * 0.35, "#b4ffe2");
      }
    } else if (enemy.type === "riftWisp") {
      enemy.phase += dt * 7.2;
      const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x) + Math.sin(enemy.phase) * 0.95;
      enemy.vx += Math.cos(angle) * enemy.speed * dt * 2.6;
      enemy.vy += Math.sin(angle) * enemy.speed * dt * 2.6;
    } else if (enemy.type === "bulwark") {
      enemyChase(enemy, dt, 0.58);
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(0.85, 1.25);
        const base = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        spawnEnemyBullet(enemy.x, enemy.y, base - 0.12, 300, 5.2, enemy.damage * 0.72, "#9eb8ff", false);
        spawnEnemyBullet(enemy.x, enemy.y, base + 0.12, 300, 5.2, enemy.damage * 0.72, "#9eb8ff", false);
      }
    } else if (enemy.type === "voidArtillery") {
      const away = Math.atan2(enemy.y - player.y, enemy.x - player.x);
      const dist = Math.sqrt((enemy.x - player.x) ** 2 + (enemy.y - player.y) ** 2);
      if (dist < 260) {
        enemy.vx += Math.cos(away) * enemy.speed * dt * 2.3;
        enemy.vy += Math.sin(away) * enemy.speed * dt * 2.3;
      } else {
        enemyChase(enemy, dt, 0.31);
      }
      if (enemy.fireTimer <= 0) {
        enemy.fireTimer = rand(0.8, 1.35);
        const shotAngle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        for (let i = -1; i <= 1; i += 1) {
          spawnEnemyBullet(enemy.x, enemy.y, shotAngle + i * 0.11, 325, 4.8, enemy.damage * 0.7, "#be8fff");
        }
      }
    } else if (enemy.type === "phaseRipper") {
      if (enemy.aiTimer <= 0) {
        enemy.aiTimer = rand(0.95, 1.55);
        const warpAngle = rand(0, TAU);
        enemy.x = clamp(player.x + Math.cos(warpAngle) * rand(90, 170), enemy.size, width - enemy.size);
        enemy.y = clamp(player.y + Math.sin(warpAngle) * rand(90, 170), enemy.size, height - enemy.size);
        const dash = Math.atan2(player.y - enemy.y, player.x - enemy.x);
        enemy.vx += Math.cos(dash) * enemy.speed * 2.1;
        enemy.vy += Math.sin(dash) * enemy.speed * 2.1;
      }
      enemyChase(enemy, dt, 0.66);
    } else if (enemy.type === "pentling") {
      enemyChase(enemy, dt, 1.25);
    } else if (enemy.type === "bossHyperDodeca") {
      const quality = hyperBossQualityScale();
      const hardCap = dynamicEnemyBulletCap();
      const bulletBudget = Math.max(90, Math.min(hardCap - 8, Math.round(95 + quality * 125)));
      enemy.phase += dt * lerp(0.55, 0.72, quality);
      const anchorX = width / 2 + Math.cos(state.time * 0.28) * width * 0.08;
      const anchorY = height / 2 + Math.sin(state.time * 0.33) * height * 0.07;
      enemy.vx += (anchorX - enemy.x) * dt * 0.75;
      enemy.vy += (anchorY - enemy.y) * dt * 0.75;
      if (state.enemyBullets.length >= bulletBudget) return;

      if (enemy.modeTimer <= 0) {
        enemy.modeTimer = lerp(3.1, 2.1, quality);
        enemy.modeIndex = (enemy.modeIndex + 1) % 4;
        enemy.fireTimer = 0;
      }

      if (enemy.modeIndex === 0) {
        if (enemy.fireTimer <= 0) {
          enemy.fireTimer = 0.45 / Math.max(0.55, quality);

  function spawnInequalityShades(enemy, count = 12) {
    if (!enemy) return;
    for (let i = 0; i < count; i += 1) {
      const a = rand(0, TAU);
      const startR = rand(enemy.size * 0.18, enemy.size * 0.92);
      const x = enemy.x + Math.cos(a) * startR;
      const y = enemy.y + Math.sin(a) * startR;
      state.effects.push({
        type: "inequalityShade",
        x,
        y,
        vx: Math.cos(a) * rand(35, 95),
        vy: Math.sin(a) * rand(35, 95),
        size: rand(enemy.size * 0.18, enemy.size * 0.34),
        spin: rand(-2.6, 2.6),
        rotation: rand(0, TAU),
        phase: rand(0, TAU),
        wobble: rand(0.7, 1.4),
        collapse: false,
        life: 9999,
        maxLife: 9999,
      });
    }
  }

  function collapseInequalityShades(originX, originY) {
    for (const effect of state.effects) {
      if (effect.type !== "inequalityShade" || effect.collapse) continue;
      effect.collapse = true;
      const a = Math.atan2(effect.y - originY, effect.x - originX);
      effect.vx += Math.cos(a) * rand(90, 190);
      effect.vy += Math.sin(a) * rand(90, 190);
      effect.life = Math.min(effect.life, 0.9);
      effect.maxLife = Math.max(effect.maxLife || 0.9, 0.9);
    }
  }

  function triggerInequalityStageTwo(enemy) {
    if (!enemy || enemy.type !== "bossW3Final" || enemy.reforming || enemy.stage >= 2) return;

    enemy.stage = 1;
    enemy.reforming = true;
    enemy.reformDuration = 2.2;
    enemy.reformTimer = enemy.reformDuration;
    enemy.reformBar1 = 0;
    enemy.reformBar2 = 0;
    enemy.modeIndex = 0;
    enemy.modeTimer = 2.4;
    enemy.fireTimer = 2.4;
    enemy.summonTimer = 2.4;
    enemy.aiTimer = 1.1;
    enemy.invuln = Math.max(enemy.invuln, 9);
    enemy.hp = Math.max(1, enemy.maxHp * 0.02);
    enemy.healthBar = 0;
    enemy.vx = 0;
    enemy.vy = 0;
    state.enemyBullets.length = 0;
    state.enemies = state.enemies.filter((candidate) => candidate.boss || candidate === enemy);

    for (let i = 0; i < 30; i += 1) {
      const a = (i / 30) * TAU + rand(-0.08, 0.08);
      const speed = rand(130, 340);
      state.effects.push({
        type: "finalShard",
        x: enemy.x,
        y: enemy.y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        size: rand(8, 18),
        spin: rand(-5, 5),
        rotation: rand(0, TAU),
        life: rand(0.8, 1.45),
        color: Math.random() < 0.5 ? "#ff7186" : "#8f142e",
      });
    }

    for (let i = 0; i < 30; i += 1) {
      const a = (i / 30) * TAU + rand(-0.18, 0.18);
      const dist = rand(enemy.size * 1.1, enemy.size * 2.4);
      const startX = enemy.x + Math.cos(a) * dist;
      const startY = enemy.y + Math.sin(a) * dist;
      const delay = rand(0.35, 1.1);
      const travel = rand(0.38, 0.78);
      const maxLife = delay + travel + 0.35;
      state.effects.push({
        type: "finalReformShard",
        sx: startX,
        sy: startY,
        tx: enemy.x + Math.cos(a) * rand(4, 18),
        ty: enemy.y + Math.sin(a) * rand(4, 18),
        x: startX,
        y: startY,
        delay,
        travel,
        life: maxLife,
        maxLife,
        size: rand(7, 15),
        rotation: rand(0, TAU),
        spin: rand(-7, 7),
        color: Math.random() < 0.5 ? "#ff8fa3" : "#761128",
      });
    }

    state.effects.push({
      type: "finalBurst",
      x: enemy.x,
      y: enemy.y,
      radius: enemy.size * 2.25,
      life: 1.05,
    });
    toast("Inequality Engine shattered... reforming", 1.8);
  }

  function processEnemyDeath(enemy) {
    enemy.dead = true;
    state.effects.push({
      type: "pop",
      x: enemy.x,
      y: enemy.y,
      radius: enemy.size * 1.6,
      life: 0.26,
      color: enemy.color,
    });

    if (enemy.type === "bossW3Final" && (enemy.stage < 2 || enemy.reforming)) {
      enemy.dead = false;
      triggerInequalityStageTwo(enemy);
      return;
    }

    let xpGain = enemy.xp;
    if (enemy.boss) xpGain *= 2.1;
    gainXp(Math.round(xpGain));

    if (state.ascendedPath === "transcendental") {
      transcend.charge += (enemy.boss ? 26 : 6) * transcend.chargeGain;
      if (transcend.charge >= 100) {
        transcend.charge -= 100;
        applyExplosionDamage(player.x, player.y, transcend.novaRadius, transcend.novaDamage);
        state.effects.push({
          type: "nova",
          x: player.x,
          y: player.y,
          radius: transcend.novaRadius,
          life: 0.42,
        });
      }
    }

    if (enemy.type === "vitaShard") {
      player.hp = Math.min(player.maxHp, player.hp + 100);
      state.effects.push({
        type: "pop",
        x: player.x,
        y: player.y,
        radius: 46,
        life: 0.22,
        color: "#99ffd3",
      });
      toast("+100 HP restored", 1.1);
    }

    if (enemy.type === "bossHyperDodeca") {
      state.hyperDodecaFight = false;
      state.enemyBullets.length = 0;
      for (let i = 0; i < 48; i += 1) {
        const a = (i / 48) * TAU + rand(-0.06, 0.06);
        const speed = rand(160, 390);
        state.effects.push({
          type: "finalShard",
          x: enemy.x,
          y: enemy.y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          size: rand(8, 24),
          spin: rand(-7, 7),
          rotation: rand(0, TAU),
          life: rand(1, 2.1),
          color: Math.random() < 0.5 ? "#ff6f86" : "#8c0f2e",
        });
      }
      state.effects.push({
        type: "finalBurst",
        x: enemy.x,
        y: enemy.y,
        radius: 340,
        life: 1,
      });
      toast("Hyper-truncated dodecahedron collapsed!", 2.5);
    }

    if (enemy.type === "bossW3Final") {
      collapseInequalityShades(enemy.x, enemy.y);
      state.w3FinalDefeated = true;
      state.enemies.length = 0;
      state.enemyBullets.length = 0;
      state.w3SuperSpawned = true;

      for (let i = 0; i < 26; i += 1) {
        const a = (i / 26) * TAU + rand(-0.08, 0.08);
        const speed = rand(140, 360);
        state.effects.push({
          type: "finalShard",
          x: enemy.x,
          y: enemy.y,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed,
          size: rand(9, 20),
          spin: rand(-5.2, 5.2),
          rotation: rand(0, TAU),
          life: rand(1.1, 2.1),
          color: Math.random() < 0.5 ? "#ff6d7f" : "#8f122d",
        });
      }
      state.effects.push({
        type: "finalBurst",
        x: enemy.x,
        y: enemy.y,
        radius: 280,
        life: 0.9,
      });
      state.finalityCinematicTimer = Math.max(state.finalityCinematicTimer, 1);
      state.finalityRewardPending = true;
      toast("Inequality Engine collapsing...", 1.2);
      return;
    }

    if (enemy.type === "bossW2Hex") {
      state.hexTriGroup += 1;
      state.hexTriRemaining = 6;
      const groupId = state.hexTriGroup;
      state.enemies = state.enemies.filter((candidate) => candidate.boss && !candidate.dead);
      for (let i = 0; i < 6; i += 1) {
        const a = (i / 6) * TAU;
        const tri = createEnemy("bossW2Tri", {
          boss: true,
          x: enemy.x + Math.cos(a) * 120,
          y: enemy.y + Math.sin(a) * 120,
          hexOriginal: true,
          hexGroup: groupId,
        });
        if (tri) {
          scaleBossForMark(tri, Math.max(10, Math.floor(state.level / 10) * 10), 2);
          tri.modeTimer = 0.45 + i * 0.04;
          tri.fireTimer = 0.14 + (i % 3) * 0.08;
          addEnemy(tri, true);
        }
      }
      toast("Hex Core shattered into 6 Triad Bosses!");
    }

    if (enemy.type === "bossW2Tri" && enemy.hexOriginal) {
      for (let i = 0; i < 4; i += 1) {
        const shardA = (i / 4) * TAU + rand(-0.28, 0.28);
        const shardDist = rand(34, 68);
        state.effects.push({
          type: "hexDormantTri",
          group: enemy.hexGroup,
          x: enemy.x + Math.cos(shardA) * shardDist,
          y: enemy.y + Math.sin(shardA) * shardDist,
          size: Math.max(12, enemy.size * 0.52),
          angle: rand(-Math.PI, Math.PI),
          startAngle: 0,
          turnProgress: 0,
          awaken: false,
          burstTimer: 0.45 + rand(0, 0.25),
          bursted: false,
          life: 20,
        });
      }
      if (enemy.hexGroup === state.hexTriGroup) {
        state.hexTriRemaining = Math.max(0, state.hexTriRemaining - 1);
        if (state.hexTriRemaining === 0) {
          let cx = 0;
          let cy = 0;
          let count = 0;
          for (const effect of state.effects) {
            if (effect.type !== "hexDormantTri" || effect.group !== enemy.hexGroup || effect.awaken) continue;
            effect.awaken = true;
            effect.startAngle = effect.angle;
            effect.turnProgress = 0;
            effect.burstTimer = 0.55 + rand(0, 0.26);
            cx += effect.x;
            cy += effect.y;
            count += 1;
          }
          if (count > 0) {
            state.effects.push({
              type: "jkBurstWord",
              x: cx / count,
              y: cy / count,
              vx: 0,
              vy: -10,
              size: 120,
              rotation: 0,
              spin: 0.2,
              life: 1.7,
              maxLife: 1.7,
              glow: true,
            });
          }
          toast("Triad shards align... jk burst!");
        }
      }
    }

    if (enemy.type === "splitter" && !enemy.boss) {
      for (let i = 0; i < 2; i += 1) {
        const child = createEnemy("phaseStalker", {
          x: enemy.x + rand(-18, 18),
          y: enemy.y + rand(-18, 18),
        });
        if (child) {
          child.hp *= 0.4;
          child.maxHp *= 0.4;
          child.size *= 0.7;
          child.damage *= 0.7;
          child.xp *= 0.4;
          addEnemy(child);
        }
      }
    }
  }

  function updateEnemies(dt) {
    for (const enemy of state.enemies) {
      if (enemy.dead) continue;
      updateEnemyAI(enemy, dt);

      enemy.vx *= 0.88;
      enemy.vy *= 0.88;
      enemy.invuln = Math.max(0, enemy.invuln - dt);
      enemy.ramHitCd = Math.max(0, enemy.ramHitCd - dt);
      enemy.transHitCd = Math.max(0, enemy.transHitCd - dt);
      if (enemy.immobile) {
        enemy.x = clamp(enemy.x, enemy.size + 8, width - enemy.size - 8);
        enemy.y = clamp(enemy.y, enemy.size + 8, height - enemy.size - 8);
      } else {
        enemy.x += enemy.vx * dt;
        enemy.y += enemy.vy * dt;
        enemy.x = clamp(enemy.x, -120, width + 120);
        enemy.y = clamp(enemy.y, -120, height + 120);
      }
      enemy.healthBar = lerp(enemy.healthBar, clamp(enemy.hp / enemy.maxHp, 0, 1), 0.22);

      handleCollision(enemy);

      if (enemy.hp <= 0) {
        if (enemy.type === "bossW3Final" && enemy.stage < 2 && !enemy.reforming) {
          triggerInequalityStageTwo(enemy);
          enemy.hp = Math.max(enemy.hp, 1);
          continue;
        }
        processEnemyDeath(enemy);
      }
    }

    state.enemies = state.enemies.filter((enemy) => !enemy.dead);
    if (world2BossFightActive()) {
      state.enemies = state.enemies.filter((enemy) => enemy.boss);
    }
  }

  function updateEffects(dt) {
    for (const effect of state.effects) {
      if (effect.type === "aftershock") {
        effect.delay -= dt;
        if (effect.delay <= 0 && !effect.triggered) {
          effect.triggered = true;
          applyExplosionDamage(effect.x, effect.y, effect.radius, effect.damage);
          state.effects.push({
            type: "boom",
            x: effect.x,
            y: effect.y,
            radius: effect.radius,
            life: effect.life,
          });
        }
        if (effect.triggered) effect.life -= dt;
      } else if (effect.type === "hexDormantTri") {
        if (effect.awaken) {
          effect.turnProgress = clamp(effect.turnProgress + dt * 2.5, 0, 1);
          const eased = 1 - Math.pow(1 - effect.turnProgress, 3);
          effect.angle = lerp(effect.startAngle || 0, 0, eased);
          effect.burstTimer -= dt;
          if (effect.burstTimer <= 0 && !effect.bursted) {
            effect.bursted = true;
            effect.life = Math.min(effect.life, 0.55);
          }
          if (effect.bursted) effect.life -= dt * 2.8;
        }
      } else if (effect.type === "jkBurstWord") {
        effect.x += effect.vx * dt;
        effect.y += effect.vy * dt;
        effect.vx *= 0.93;
        effect.vy *= 0.93;
        effect.rotation += effect.spin * dt;
        effect.life -= dt;
      } else if (effect.type === "finalShard") {
        effect.x += effect.vx * dt;
        effect.y += effect.vy * dt;
        effect.vx *= 0.96;
        effect.vy *= 0.96;
        effect.rotation += effect.spin * dt;
        effect.life -= dt;
      } else if (effect.type === "finalReformShard") {
        const age = (effect.maxLife || 0) - effect.life;
        if (age >= (effect.delay || 0)) {
          const travel = Math.max(0.05, effect.travel || 0.5);
          const t = clamp((age - (effect.delay || 0)) / travel, 0, 1);
          const eased = 1 - Math.pow(1 - t, 3);
          effect.x = lerp(effect.sx, effect.tx, eased);
          effect.y = lerp(effect.sy, effect.ty, eased);
        } else {
          effect.x = effect.sx;
          effect.y = effect.sy;
        }
        effect.rotation += effect.spin * dt;
        effect.life -= dt;
      } else if (effect.type === "inequalityShade") {
        effect.phase += dt * (effect.wobble || 1);
        if (effect.collapse) {
          effect.vx *= 0.94;
          effect.vy *= 0.94;
          effect.life -= dt;
        } else {
          effect.vx += Math.cos(effect.phase * 1.8 + effect.rotation) * dt * 26;
          effect.vy += Math.sin(effect.phase * 1.7 + effect.rotation) * dt * 26;
          effect.vx *= 0.965;
          effect.vy *= 0.965;
        }
        effect.x += effect.vx * dt;
        effect.y += effect.vy * dt;
        effect.rotation += effect.spin * dt;
        effect.x = clamp(effect.x, -120, width + 120);
        effect.y = clamp(effect.y, -120, height + 120);
      } else if (effect.type === "finalBurst") {
        effect.life -= dt;
      } else {
        effect.life -= dt;
      }
    }
    state.effects = state.effects.filter((effect) => effect.life > 0);
  }

      const priorityIds = [
        "create_extra_bot",
        "create_transcend_swap",
        "create_bot_full_upgrade",
        "create_path_rate_sync",
        "create_instant_aim",
        "temp_shield",
        "hyperbot_reconstruction",
      ];
      const prioritized = [];
      for (const id of priorityIds) {
        const idx = list.findIndex((entry) => entry.id === id);
        if (idx >= 0) prioritized.push(list.splice(idx, 1)[0]);
      }
      return [...prioritized, ...list];
    }

    return list;
  }

  function availableRebirthUpgrades() {
    const list = [];
    const add = (
      id,
      name,
      desc,
      max,
      cost,
      apply,
      available = () => true,
      lockText = "Locked"
    ) => {
      list.push({ id, name, desc, max, cost, apply, available, lockText });
    };

    add("token_compounder", "Token Compounder", "x10 rebirth points gained on rebirth", 2, () => 0.5, () => {});
    add("rebirth_max_hp", "Titan Reframe", "+2000 max HP each run", 999, () => 15, () => {});
    add("rebirth_regen", "Everflow Reactor", "+5 HP/s each run", 999, () => 20, () => {});
    add("rebirth_xp_gain", "Chrono Scholarship", "x2 XP each run", 999, () => 100, () => {
      refreshRebirthEconomyBonuses();
    });
    add("rebirth_damage", "War Lattice", "+20% damage each run", 999, () => 50, () => {});

    const coreBought =
      rLvl("rebirth_max_hp") > 0

      && rLvl("rebirth_xp_gain") > 0
      && rLvl("rebirth_damage") > 0;

    add(

      () => coreBought,

    );
    add(

      "Beat Game",

  function buyRebirthUpgrade(index) {
    if (!REBIRTH_ENABLED) {
      toast("Rebirth is temporarily disabled", 1.8);
      return;
    }
    if (!state.rebirthUnlocked) return;
    const upgrades = availableRebirthUpgrades();
    const upgrade = upgrades[index];
    if (!upgrade) return;

    if (!upgrade.available()) {
      toast(upgrade.lockText || "Locked");
      return;
    }

    const level = rLvl(upgrade.id);
    if (level >= upgrade.max) {
      toast(`${upgrade.name} is at cap`);
      return;
    }

    const cost = upgrade.cost ? upgrade.cost(level) : 1;
    if (state.rebirthTokens + 1e-8 < cost) {
      toast(`Need ${cost.toFixed(1)} rebirth points`);
      return;
    }

    state.rebirthTokens = Math.max(0, state.rebirthTokens - cost);
    state.rebirthTokens = Math.round(state.rebirthTokens * 100) / 100;
    incRebirthUpgrade(upgrade.id);
    upgrade.apply();
    refreshRebirthEconomyBonuses();
    toast(`${upgrade.name} upgraded (-${cost.toFixed(1)} points)`, 1.8);
  }

  function performRebirth() {
    if (!REBIRTH_ENABLED) {
      toast("Rebirth is temporarily disabled", 1.8);
      return;
    }
    if (!state.rebirthUnlocked) {
      toast("Rebirth locked until World III final boss", 2);
      return;
    }
    if (!state.beatGameUnlocked) {
      toast("Rebirth requires finality on this run", 2);
      return;
    }
    const reward = rebirthTokenReward();
    state.rebirthTokens += reward;
    state.rebirthTokens = Math.round(state.rebirthTokens * 100) / 100;
    state.rebirthCount += 1;
    restartRun();
    toast(`Rebirth ${state.rebirthCount} complete (+${reward.toFixed(1)} points)`, 2.8);
  }

  function triggerBeatGame() {
    state.gameBeaten = true;
    state.paused = true;
    const continueOption = {
      label: "Continue Playing",
      desc: "Keep this run going and rebirth later when you want.",
      onPick: () => {
        state.gameBeaten = false;
        state.paused = false;
        toast("Continuing run", 1.4);
      },
    };
    const options = REBIRTH_ENABLED
      ? [
          {
            label: "Begin Rebirth Cycle",
            desc: "Reset progression and collect rebirth rewards now.",
            onPick: () => performRebirth(),
          },
          continueOption,
        ]
      : [
          {

            onPick: () => {

              state.paused = true;
              toast("Rebirth is temporarily disabled", 1.8);
            },
          },
          continueOption,
        ];
    openModal(
      "You Beat The Game",
      REBIRTH_ENABLED ? "Choose rebirth now, or continue this run for later." : "Rebirth is temporarily disabled for now.",
      options
    );

  function maxOutCurrentPathUpgrades() {
    let safety = 0;
    while (safety < 80) {
      safety += 1;
      let changed = false;
      const upgrades = availableUpgrades();
      for (const upgrade of upgrades) {
        let level = uLvl(upgrade.id);
        const autoMaxCap = (upgrade.id === "create_extra_bot" || upgrade.id === "temp_shield")
          ? Math.min(upgrade.max, 200)
          : upgrade.max;
        while (level < autoMaxCap && upgrade.available()) {
          incUpgrade(upgrade.id);
          upgrade.apply();
          level += 1;
          changed = true;
        }
      }
      if (!changed) break;
    }
    if (state.path === "colossal" && !state.ascendedPath && (state.godMode || colossalForgeUnlocked())) {
      for (const forgeUpgrade of COLOSSAL_FORGE_UPGRADES) {
        while (uLvl(forgeUpgrade.id) < forgeUpgrade.max) {
          incUpgrade(forgeUpgrade.id);
          forgeUpgrade.apply();
        }
      }
    }
    if (state.path === "create" && !state.ascendedPath && (state.godMode || createForgeUnlocked())) {
      for (const forgeUpgrade of CREATE_FORGE_UPGRADES) {
        while (uLvl(forgeUpgrade.id) < forgeUpgrade.max) {
          incUpgrade(forgeUpgrade.id);
          forgeUpgrade.apply();
        }
      }
    }
    state.points = 0;
  }

  function buyUpgrade(index) {
