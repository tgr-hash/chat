<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game</title>

  <style>
    /* Remove default spacing */
    body {
      margin: 0;
      overflow: hidden;
      background: #111;
    }

<body>

<script>
/* =========================
   🎮 PASTE GAME CODE BELOW
   ========================= */

(() => {
  const previous = window.__neonRiftSurvivor;
  if (previous && typeof previous.destroy === "function") previous.destroy();

  const TAU = Math.PI * 2;
  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
  const lerp = (a, b, t) => a + (b - a) * t;
  const rand = (min, max) => min + Math.random() * (max - min);
  const irand = (min, max) => Math.floor(rand(min, max + 1));
  const dist2 = (a, b) => {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return dx * dx + dy * dy;
  };
  const pointSegmentDist2 = (px, py, ax, ay, bx, by) => {
    const abx = bx - ax;
    const aby = by - ay;
    const denom = abx * abx + aby * aby;
    if (denom <= 1e-6) {
      const dx = px - ax;
      const dy = py - ay;
      return dx * dx + dy * dy;
    }
    const t = clamp(((px - ax) * abx + (py - ay) * aby) / denom, 0, 1);
    const cx = ax + abx * t;
    const cy = ay + aby * t;
    const dx = px - cx;
    const dy = py - cy;
    return dx * dx + dy * dy;
  };

  function weightedPick(entries) {
    const total = entries.reduce((sum, entry) => sum + entry.weight, 0);
    let ticket = Math.random() * total;
    for (const entry of entries) {
      ticket -= entry.weight;
      if (ticket <= 0) return entry;
    }
    return entries[entries.length - 1];
  }

  function xpNeedFor(level, world) {
    const base = 26 + level * 5 + Math.pow(level, 1.06) * 1.6;
    if (world === 1 && level <= 25) {
      const t = clamp((level - 1) / 24, 0, 1);
      return Math.floor(base * lerp(0.42, 0.92, t));
    }
    return Math.floor(base);
  }

  const root = document.createElement("div");
  root.style.position = "fixed";
  root.style.inset = "0";
  root.style.zIndex = "2147483647";
  root.style.pointerEvents = "auto";
  root.style.fontFamily = "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
  document.body.appendChild(root);

  const canvas = document.createElement("canvas");
  canvas.style.width = "100%";
  canvas.style.height = "100%";
  canvas.style.pointerEvents = "auto";
  canvas.style.cursor = "crosshair";
  root.appendChild(canvas);
  const ctx = canvas.getContext("2d");

  let width = 0;
  let height = 0;
  let dpr = 1;

  function resize() {
    dpr = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();

  function traceEquilateralTriangle(size, spin = 0) {
    ctx.beginPath();
    for (let i = 0; i < 3; i += 1) {
      const angle = spin + (i * TAU) / 3;
      const x = Math.cos(angle) * size;
      const y = Math.sin(angle) * size;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  function fillStrokeTriangle(size, fill, stroke, lineWidth = 1.5, spin = 0) {
    traceEquilateralTriangle(size, spin);
    ctx.fillStyle = fill;
    ctx.fill();
    if (stroke) {
      ctx.strokeStyle = stroke;
      ctx.lineWidth = lineWidth;
      ctx.stroke();
    }
  }

  const input = {
    keys: new Set(),
    mouse: { x: width / 2, y: height / 2 },
  };
  const BLOCKED_OVERLAY_EVENTS = [
    "pointerdown",
    "pointerup",
    "mousedown",
    "mouseup",
    "click",
    "dblclick",
    "contextmenu",
    "touchstart",
    "touchend",
    "touchcancel",
  ];

  const state = {
    running: true,
    paused: false,
    upgradeMenuOpen: false,
    colossalForgeOpen: false,
    createForgeOpen: false,
    devMenuOpen: false,
    modal: null,
    gameStarted: false,
    idleMenuGame: false,
    lightMode: false,
    optimizeMode: false,
    world: 1,
    world2Unlocked: false,
    world2Prompted: false,
    world3Unlocked: false,
    world3Prompted: false,
    world3PathOffered: false,
    path: null,
    ascendedPath: null,
    pathChoiceOffered: false,
    world2PathOffered: false,
    time: 0,
    level: 1,
    xp: 0,
    xpNeed: xpNeedFor(1, 1),
    points: 0,
    enemies: [],
    bullets: [],
    enemyBullets: [],
    effects: [],
    drones: [],
    toast: "",
    toastTimer: 0,
    shotTimer: 0,
    spawnTimer: 0.4,
    prepTimer: 0,
    fps: 60,
    lastBossW1: 0,
    lastBossW2: 0,
    lastBossW3: 0,
    w1SuperSpawned: false,
    w2HexSpawned: false,
    w3SuperSpawned: false,
    hyperDodecaSpawned: false,
    hyperDodecaFight: false,
    finalityCinematicTimer: 0,
    finalityRewardPending: false,
    shieldSuppressed: false,
    shieldBank: 0,
    w3FinalDefeated: false,
    hexTriGroup: 0,
    hexTriRemaining: 0,
    rebirthTokens: 0,
    rebirthCount: 0,
    rebirthUnlocked: false,
    rebirthShopOpen: false,
    rebirthUpgrades: Object.create(null),
    beatGameUnlocked: false,
    gameBeaten: false,
    xpGainMult: 1,
    xpNeedMult: 1,
    godMode: false,
    upgrades: Object.create(null),
    gameOver: false,
  };

  const idleGame = {
    drones: 2,
    scrap: 0,
    totalScrap: 0,
    cycle: 1,
    spin: 0,
    parts: [],
    sparks: [],
    message: "Buy drones and let them scan scrap apart.",
    messageTimer: 0,
  };

  function idleDroneCostAt(droneCount) {
    return Math.max(6, Math.floor(10 * Math.pow(1.12, Math.max(0, droneCount - 1))));
  }

  function idleDronePackCost(amount) {
    let total = 0;
    for (let i = 0; i < amount; i += 1) {
      total += idleDroneCostAt(idleGame.drones + i);
    }
    return total;
  }

  function idleDroneDps() {
    return idleGame.drones * (2.4 + Math.pow(idleGame.drones, 0.42) * 0.55);
  }

  function makeIdlePart(ring, angle, radius, size, hp, reward) {
    return {
      ring,
      angle,
      radius,
      size,
      hp,
      maxHp: hp,
      reward,
      destroyed: false,
      hitFlash: 0,
      drawX: 0,
      drawY: 0,
    };
  }

  function resetIdleTarget(advanceCycle = false) {
    if (advanceCycle) idleGame.cycle += 1;
    idleGame.parts.length = 0;
    const cycleScale = 1 + Math.max(0, idleGame.cycle - 1) * 0.16;
    for (let ring = 0; ring < 3; ring += 1) {
      const segments = 10 + ring * 6;
      const radius = 70 + ring * 52;
      const baseHp = Math.floor((8 + ring * 4) * cycleScale);
      const size = 16 - ring * 1.6;
      const reward = 2 + ring * 2;
      for (let i = 0; i < segments; i += 1) {
        const angle = (i / segments) * TAU + ring * 0.13;
        idleGame.parts.push(makeIdlePart(ring, angle, radius, size, baseHp, reward));
      }
    }
  }

  function idlePartPosition(part) {
    const cx = width * 0.66;
    const cy = height * 0.52;
    const spin = idleGame.spin * (0.65 + part.ring * 0.12);
    const angle = part.angle + spin;
    return {
      x: cx + Math.cos(angle) * part.radius,
      y: cy + Math.sin(angle) * part.radius,
      angle,
    };
  }

  function pushIdleSparks(x, y, color = "#9cecff") {
    const count = 7;
    for (let i = 0; i < count; i += 1) {
      const a = (i / count) * TAU + rand(-0.2, 0.2);
      const speed = rand(40, 130);
      idleGame.sparks.push({
        x,
        y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        life: rand(0.32, 0.7),
        maxLife: 0,
        color,
      });
      idleGame.sparks[idleGame.sparks.length - 1].maxLife = idleGame.sparks[idleGame.sparks.length - 1].life;
    }
  }

  function buyIdleDrones(amount) {
    const safeAmount = clamp(Math.floor(amount || 0), 1, 1000);
    const cost = idleDronePackCost(safeAmount);
    if (idleGame.scrap < cost) {
      idleGame.message = `Need ${cost} scrap for +${safeAmount} drones`;
      idleGame.messageTimer = 1.3;
      return;
    }
    idleGame.scrap -= cost;
    idleGame.drones += safeAmount;
    idleGame.message = `Drone swarm expanded to ${idleGame.drones}`;
    idleGame.messageTimer = 1.2;
  }

  function updateIdleMenuGame(dt) {
    if (!state.idleMenuGame) return;
    if (idleGame.parts.length === 0) resetIdleTarget(false);

    idleGame.spin += dt * (0.22 + Math.min(2.8, Math.pow(idleGame.drones, 0.35) * 0.18));
    if (idleGame.messageTimer > 0) idleGame.messageTimer = Math.max(0, idleGame.messageTimer - dt);

    const aliveParts = [];
    for (const part of idleGame.parts) {
      if (part.destroyed || part.hp <= 0) continue;
      const pos = idlePartPosition(part);
      part.drawX = pos.x;
      part.drawY = pos.y;
      part.drawAngle = pos.angle;
      aliveParts.push(part);
    }

    if (aliveParts.length > 0) {
      const logicalDroneCount = Math.min(240, Math.max(1, idleGame.drones));
      const perDroneDamage = idleDroneDps() / logicalDroneCount;
      const scanStep = Math.floor(state.time * 8);
      for (let i = 0; i < logicalDroneCount; i += 1) {
        const idx = (i * 17 + scanStep) % aliveParts.length;
        const part = aliveParts[idx];
        if (!part || part.destroyed || part.hp <= 0) continue;
        part.hp -= perDroneDamage * dt;
        part.hitFlash = Math.min(0.22, part.hitFlash + 0.05);
      }

      for (const part of aliveParts) {
        if (part.hp > 0 || part.destroyed) continue;
        part.destroyed = true;
        idleGame.scrap += part.reward;
        idleGame.totalScrap += part.reward;
        pushIdleSparks(part.drawX, part.drawY, part.ring === 0 ? "#9cecff" : part.ring === 1 ? "#8fffd4" : "#ffd98d");
      }
    }

    let remaining = 0;
    for (const part of idleGame.parts) {
      if (!part.destroyed && part.hp > 0) remaining += 1;
    }
    if (remaining === 0) {
      const clearBonus = 40 + idleGame.cycle * 10;
      idleGame.scrap += clearBonus;
      idleGame.totalScrap += clearBonus;
      idleGame.message = `Target shattered! +${clearBonus} scrap`;
      idleGame.messageTimer = 1.8;
      resetIdleTarget(true);
    }

    for (const part of idleGame.parts) {
      if (part.hitFlash > 0) part.hitFlash = Math.max(0, part.hitFlash - dt);
    }

    for (let i = idleGame.sparks.length - 1; i >= 0; i -= 1) {
      const spark = idleGame.sparks[i];
      spark.life -= dt;
      if (spark.life <= 0) {
        idleGame.sparks.splice(i, 1);
        continue;
      }
      spark.x += spark.vx * dt;
      spark.y += spark.vy * dt;
      spark.vx *= 0.94;
      spark.vy *= 0.94;
    }
  }

  function drawIdleMenuGame() {
    const panelX = 24;
    const panelY = 24;
    const panelW = 468;
    const panelH = 248;
    ctx.fillStyle = state.lightMode ? "rgba(240, 248, 255, 0.9)" : "rgba(8, 13, 24, 0.9)";
    ctx.fillRect(panelX, panelY, panelW, panelH);
    ctx.strokeStyle = state.lightMode ? "rgba(20, 52, 89, 0.35)" : "rgba(124, 194, 255, 0.35)";
    ctx.strokeRect(panelX, panelY, panelW, panelH);

    ctx.fillStyle = state.lightMode ? "#123764" : "#d5eeff";
    ctx.font = "18px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    ctx.fillText("Idle Drone Scanner", panelX + 14, panelY + 28);
    ctx.font = "13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace";
    ctx.fillStyle = state.lightMode ? "#244f7f" : "#9fc8ea";
    ctx.fillText(`Drones: ${idleGame.drones}   Scan DPS: ${idleDroneDps().toFixed(1)}`, panelX + 14, panelY + 52);
    ctx.fillText(`Scrap: ${Math.floor(idleGame.scrap)}   Total Scrap: ${Math.floor(idleGame.totalScrap)}`, panelX + 14, panelY + 72);
    ctx.fillText(`Target Cycle: ${idleGame.cycle}`, panelX + 14, panelY + 92);
    ctx.fillStyle = state.lightMode ? "#1a4c7d" : "#b8ddff";
    ctx.fillText(`1) Buy +1 drone (${idleDronePackCost(1)} scrap)`, panelX + 14, panelY + 120);
    ctx.fillText(`2) Buy +10 drones (${idleDronePackCost(10)} scrap)`, panelX + 14, panelY + 140);
    ctx.fillText(`3) Buy +100 drones (${idleDronePackCost(100)} scrap)`, panelX + 14, panelY + 160);
    ctx.fillText("4) Back to main menu", panelX + 14, panelY + 180);
    ctx.fillText("5) Reset target", panelX + 14, panelY + 200);
    if (idleGame.messageTimer > 0) {
      ctx.fillStyle = state.lightMode ? "#19526f" : "#9cffde";
      ctx.fillText(idleGame.message, panelX + 14, panelY + 224);
    }

    const cx = width * 0.66;
    const cy = height * 0.52;
    ctx.strokeStyle = state.lightMode ? "rgba(21, 84, 137, 0.28)" : "rgba(104, 166, 255, 0.2)";
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i += 1) {
      ctx.beginPath();
      ctx.arc(cx, cy, 70 + i * 52, 0, TAU);
      ctx.stroke();
    }

    const aliveParts = [];
    for (const part of idleGame.parts) {
      if (part.destroyed || part.hp <= 0) continue;
      const pos = idlePartPosition(part);
      part.drawX = pos.x;
      part.drawY = pos.y;
      aliveParts.push(part);
      const hpFrac = clamp(part.hp / part.maxHp, 0, 1);
      const hue = part.ring === 0 ? 195 : part.ring === 1 ? 156 : 44;
      const light = state.lightMode ? 56 : 48;
      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(pos.angle + Math.PI / 2);
      ctx.fillStyle = `hsl(${hue}, ${state.lightMode ? 66 : 80}%, ${light + hpFrac * 16}%)`;
      ctx.fillRect(-part.size * 0.5, -part.size * 0.5, part.size, part.size);
      if (part.hitFlash > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${part.hitFlash * 3.3})`;
        ctx.fillRect(-part.size * 0.55, -part.size * 0.55, part.size * 1.1, part.size * 1.1);
      }
      ctx.restore();
    }

    const visualDrones = Math.min(90, idleGame.drones);
    const scanStep = Math.floor(state.time * 7);
    for (let i = 0; i < visualDrones; i += 1) {
      const t = visualDrones <= 1 ? 0.5 : i / visualDrones;
      const orbitR = 208 + (i % 3) * 14 + Math.sin(state.time * 1.2 + i * 0.7) * 10;
      const ang = idleGame.spin * (1.26 + (i % 5) * 0.03) + t * TAU;
      const droneX = cx + Math.cos(ang) * orbitR;
      const droneY = cy + Math.sin(ang) * orbitR * 0.74;
      if (aliveParts.length > 0) {
        const target = aliveParts[(i * 17 + scanStep) % aliveParts.length];
        const beamJitter = Math.sin(state.time * 18 + i) * 4;
        ctx.strokeStyle = state.lightMode ? "rgba(15, 120, 200, 0.34)" : "rgba(135, 232, 255, 0.34)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(droneX, droneY);
        ctx.lineTo(target.drawX + beamJitter, target.drawY - beamJitter * 0.3);
        ctx.stroke();
      }
      ctx.save();
      ctx.translate(droneX, droneY);
      ctx.rotate(ang + Math.PI / 2);
      ctx.fillStyle = state.lightMode ? "#1c70b6" : "#8be8ff";
      ctx.beginPath();
      ctx.moveTo(8, 0);
      ctx.lineTo(-6, -4.4);
      ctx.lineTo(-6, 4.4);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = state.lightMode ? "#0f3f68" : "#0d3856";
      ctx.fillRect(-2.8, -1.4, 3.1, 2.8);
      ctx.restore();
    }

    if (idleGame.drones > visualDrones) {
      ctx.fillStyle = state.lightMode ? "#24557f" : "#8eb8d8";
      ctx.fillText(`+${idleGame.drones - visualDrones} support drones off-screen`, panelX + 14, panelY + 242);
    }

    for (const spark of idleGame.sparks) {
      const frac = spark.maxLife > 0 ? clamp(spark.life / spark.maxLife, 0, 1) : 0;
      ctx.globalAlpha = frac;
      ctx.fillStyle = spark.color;
      ctx.fillRect(spark.x - 1.6, spark.y - 1.6, 3.2, 3.2);
      ctx.globalAlpha = 1;
    }
  }

  const player = {
    x: width / 2,
    y: height / 2,
    radius: 18,
    speed: 230,
    hp: 160,
    maxHp: 160,
    tempHp: 0,
    regen: 2.2,
    damageReduction: 0.05,
    massDensityReduction: 0,
    invuln: 0,
    collisionCd: 0,
    bulletDamage: 10,
    bulletSpeed: 560,
    bulletLife: 2.6,
    bulletPierce: 1,
    fireRateMult: 1,
    bulletBounces: 0,
    ramDamage: 36,
    sprayMitigation: 0,
    sprayEvade: 0,
    tankKnockback: 0.24,
  };

  function resetPlayerToBase() {
    player.x = width / 2;
    player.y = height / 2;
    player.radius = 18;
    player.speed = 230;
    player.hp = 160;
    player.maxHp = 160;
    player.tempHp = 0;
    player.regen = 2.2;
    player.damageReduction = 0.05;
    player.massDensityReduction = 0;
    player.invuln = 0;
    player.collisionCd = 0;
    player.bulletDamage = 10;
    player.bulletSpeed = 560;
    player.bulletLife = 2.6;
    player.bulletPierce = 1;
    player.fireRateMult = 1;
    player.bulletBounces = 0;
    player.ramDamage = 36;
    player.sprayMitigation = 0;
    player.sprayEvade = 0;
    player.tankKnockback = 0.24;
  }

  const deployer = {
    slots: 2,
    fireRate: 1,
    pulseDamage: 14,
    beamDamage: 26,
    bomberDamage: 40,
    beamUnlocked: false,
    bomberUnlocked: false,
  };

  const transcend = {
    cooldown: 1.35,
    damage: 62,
    width: 14,
    shotCount: 1,
    shotSpread: 0.13,
    aftershock: false,
    entropy: false,
    phaseMantle: false,
    charge: 0,
    chargeGain: 1,
    novaDamage: 120,
    novaRadius: 140,
  };

  const createPath = {
    slots: 3,
    fireRate: 1,
    damage: 0.8,
    respawn: 4.2,
    hp: 280,
    armor: 0.45,
    size: 1.35,
    mode: "spray",
    pathRateSync: false,
    instantAim: false,
    botRegen: 0,
    dangerAvoidance: false,
  };
  const REBIRTH_ENABLED = true;
  const COLOSSAL_FORGE_REQUIREMENTS = ["quake_drive", "collision_guard", "mass_density"];
  const CREATE_FORGE_REQUIREMENTS = ["create_bot_full_upgrade", "create_transcend_swap", "create_path_rate_sync"];
  const COLOSSAL_FORGE_UPGRADES = [
    { id: "colossal_forge_size", name: "Titanium Expansion", desc: "2x size", max: 2, cost: 3, apply: () => { player.radius *= 2; } },
    {
      id: "colossal_forge_damage",
      name: "Impact Singularity",
      desc: "2x ram damage",
      max: 4,
      cost: (level) => (level < 2 ? 5 : level === 2 ? 100 : 500),
      apply: () => { player.ramDamage *= 2; },
    },
    { id: "colossal_forge_speed", name: "Hyperstride Core", desc: "2x movement speed", max: 2, cost: 3, apply: () => { player.speed *= 2; } },
  ];
  const CREATE_FORGE_UPGRADES = [
    { id: "create_forge_damage", name: "Overclocked Swarm", desc: "2x bot damage", max: 1, cost: 20, apply: () => { createPath.damage *= 2; } },
    {
      id: "create_forge_health",
      name: "Fortress Frames",
      desc: "5x bot health",
      max: 1,
      cost: 32,
      apply: () => {
        createPath.hp *= 5;
        for (const drone of state.drones) {
          drone.maxHp = createPath.hp;
          if (!drone.deadTimer || drone.deadTimer <= 0) drone.hp = createPath.hp;
        }
      },
    },
    { id: "create_forge_avoidance", name: "Danger Avoidance", desc: "Bots hold a safe distance", max: 1, cost: 26, apply: () => { createPath.dangerAvoidance = true; } },
  ];
  const CREATE_FULL_UPGRADE_MAX = 10;
  const CREATE_FULL_UPGRADE_MULT = Math.pow(1.1, CREATE_FULL_UPGRADE_MAX);
  const CREATE_MODE_PROFILE = {
    spray: { damage: 0.8, fireRate: 1, hp: 280, respawn: 4.2, armor: 0.45 },
    transcend: { damage: 0.93, fireRate: 1.08, hp: 304, respawn: 4.54, armor: 0.45 },
  };

  function uLvl(id) {
    return state.upgrades[id] || 0;
  }

  function incUpgrade(id) {
    state.upgrades[id] = uLvl(id) + 1;
  }

  function requirementCountsForForge(upgrades, id) {
    const upgrade = upgrades.find((entry) => entry.id === id);
    if (!upgrade) return false;
    const level = uLvl(id);
    return level > 0;
  }

  function forgeProgressLockText(progress) {
    return `${progress.done}/${progress.need} core upgrades taken`;
  }

  function colossalForgeUnlocked() {
    if (state.path !== "colossal" || state.ascendedPath) return false;
    const progress = colossalForgeProgress();
    return progress.done >= progress.need;
  }

  function colossalForgeProgress() {
    const upgrades = availableUpgrades();
    let done = 0;
    let total = 0;
    for (const id of COLOSSAL_FORGE_REQUIREMENTS) {
      if (!upgrades.find((entry) => entry.id === id)) continue;
      total += 1;
      if (requirementCountsForForge(upgrades, id)) done += 1;
    }
    return { done, total, need: total };
  }

  function createForgeUnlocked() {
    if (state.path !== "create" || state.ascendedPath) return false;
    const progress = createForgeProgress();
    return progress.done >= progress.need;
  }

  function createForgeProgress() {
    const upgrades = availableUpgrades();
    let done = 0;
    let total = 0;
    for (const id of CREATE_FORGE_REQUIREMENTS) {
      if (!upgrades.find((entry) => entry.id === id)) continue;
      total += 1;
      if (requirementCountsForForge(upgrades, id)) done += 1;
    }
    return { done, total, need: total };
  }

  function roundedLerpPercent(start, end, t) {
    return Math.round(lerp(start * 100, end * 100, t)) / 100;
  }

  function roundedLerpInt(start, end, t) {
    return Math.round(lerp(start, end, t));
  }

  function applyCreateModeStats(mode) {
    const profile = CREATE_MODE_PROFILE[mode] || CREATE_MODE_PROFILE.spray;
    createPath.mode = mode;
    createPath.damage = profile.damage;
    createPath.fireRate = profile.fireRate;
    createPath.hp = profile.hp;
    createPath.respawn = profile.respawn;
    createPath.armor = profile.armor;
  }

  function applyCreateFullUpgradeProgress() {
    if (state.path !== "create" || state.ascendedPath) return;
    const progressLevel = clamp(uLvl("create_bot_full_upgrade"), 0, CREATE_FULL_UPGRADE_MAX);
    const t = progressLevel / CREATE_FULL_UPGRADE_MAX;
    const start = CREATE_MODE_PROFILE[createPath.mode] || CREATE_MODE_PROFILE.spray;
    const full = {
      damage: start.damage * CREATE_FULL_UPGRADE_MULT,
      fireRate: start.fireRate * CREATE_FULL_UPGRADE_MULT,
      hp: start.hp * CREATE_FULL_UPGRADE_MULT,
      respawn: start.respawn,
      armor: start.armor,
    };
    createPath.damage = roundedLerpPercent(start.damage, full.damage, t);
    createPath.fireRate = roundedLerpPercent(start.fireRate, full.fireRate, t);
    createPath.hp = roundedLerpInt(start.hp, full.hp, t);
    createPath.respawn = roundedLerpPercent(start.respawn, full.respawn, t);
    createPath.armor = roundedLerpPercent(start.armor, full.armor, t);
  }

  function rLvl(id) {
    return state.rebirthUpgrades[id] || 0;
  }

  function incRebirthUpgrade(id) {
    state.rebirthUpgrades[id] = rLvl(id) + 1;
  }

  function refreshXpNeed() {
    state.xpNeed = Math.max(8, Math.floor(xpNeedFor(state.level, state.world) * state.xpNeedMult));
  }

  function rebirthTokenReward() {
    const tokenCompounder = Math.pow(10, rLvl("token_compounder"));
    const pointMult = Math.pow(100, rLvl("rebirth_point_century"));
    return 1 * pointMult * tokenCompounder;
  }

  function refreshRebirthEconomyBonuses() {
    state.xpGainMult = Math.pow(2, rLvl("rebirth_xp_gain"));
    state.xpNeedMult = 1;
    refreshXpNeed();
  }

  function applyRebirthRunBonuses() {
    refreshRebirthEconomyBonuses();
    const hpBonus = rLvl("rebirth_max_hp") * 2000;
    const regenBonus = rLvl("rebirth_regen") * 5;
    const dmgMult = Math.pow(1.2, rLvl("rebirth_damage"));

    player.maxHp += hpBonus;
    player.hp = player.maxHp;
    player.regen += regenBonus;
    player.bulletDamage *= dmgMult;
    player.ramDamage *= dmgMult;
  }

  function world3ShieldSuppressionApplies() {
    return hyperDodecaFightActive()
      && state.godMode
      && state.world === 3
      && !state.ascendedPath
      && (state.path === "colossal" || state.path === "create");
  }

  function updateWorld3ShieldSuppression() {
    if (world3ShieldSuppressionApplies()) {
      if (!state.shieldSuppressed) {
        state.shieldSuppressed = true;
        state.shieldBank = player.tempHp;
      } else if (player.tempHp > 0) {
        state.shieldBank += player.tempHp;
      }
      player.tempHp = 0;
      return;
    }

    if (state.shieldSuppressed) {
      if (state.shieldBank > 0) {
        player.tempHp += state.shieldBank;
        toast("Aegis restored", 1.4);
      }
      state.shieldBank = 0;
      state.shieldSuppressed = false;
    }
  }

  function toast(message, duration = 2.2) {
    state.toast = message;
    state.toastTimer = duration;
  }

  function applyGodModeBonuses() {
    if (hyperDodecaFightActive()) return;
    player.maxHp = Math.max(player.maxHp, 1_000_000_000);
    player.hp = player.maxHp;
    player.regen = Math.max(player.regen, 9000);
    player.fireRateMult = Math.max(player.fireRateMult, 60);
    player.damageReduction = Math.max(player.damageReduction, 0.9);
  }

  function clampGodModeDuringHyperBoss() {
    if (!state.godMode || !hyperDodecaFightActive()) return;
    const hpCap = Math.max(260, 900 + state.level * 6);
    const regenCap = 8 + state.level * 0.02;
    player.maxHp = Math.min(player.maxHp, hpCap);
    player.hp = Math.min(player.hp, player.maxHp);
    player.regen = Math.min(player.regen, regenCap);
    player.fireRateMult = Math.min(player.fireRateMult, 3.8);
    player.damageReduction = Math.min(player.damageReduction, 0.75);
  }

  function beginPathTransitionPrep(seconds = 4) {
    const pointsFromLevel = Math.max(1, state.level);
    state.upgrades = Object.create(null);
    resetPlayerToBase();
    state.points = state.godMode ? 0 : pointsFromLevel;
    applyRebirthRunBonuses();
    if (state.godMode) state.points = 0;
    state.path = null;
    state.ascendedPath = null;
    state.enemies.length = 0;
    state.enemyBullets.length = 0;
    state.bullets.length = 0;
    state.effects.length = 0;
    state.drones.length = 0;
    state.spawnTimer = 0.4;
    state.shotTimer = 0.05;
    state.prepTimer = Math.max(state.prepTimer, seconds);
    state.shieldSuppressed = false;
    state.shieldBank = 0;
    state.finalityCinematicTimer = 0;
    state.finalityRewardPending = false;
    state.upgradeMenuOpen = !state.godMode;
    state.colossalForgeOpen = false;
    state.createForgeOpen = false;
  }

  function applyPathChoice(pathId) {
    const prepSeconds = state.godMode ? 0 : 4;
    const prepTag = state.godMode ? "" : " (4s prep)";
    const runDamageMult = Math.pow(1.2, rLvl("rebirth_damage"));
    beginPathTransitionPrep(prepSeconds);
    if (state.godMode) state.prepTimer = 0;

    if (pathId === "spray") {
      state.path = "spray";
      state.pathChoiceOffered = true;
      player.fireRateMult *= 1.12;
      player.bulletDamage *= 0.82;
      player.bulletBounces = Math.max(player.bulletBounces, 1);
      player.sprayMitigation = 0.17;
      player.sprayEvade = 0.08;
      player.radius = 17;
      toast(`Spray path online${prepTag}`);
    } else if (pathId === "tank") {
      state.path = "tank";
      state.pathChoiceOffered = true;
      player.maxHp *= 1.7;
      player.hp = player.maxHp;
      player.regen += 2.1;
      player.speed *= 0.83;
      player.ramDamage *= 1.75;
      player.radius = 24;
      player.damageReduction = Math.max(player.damageReduction, 0.22);
      toast(`Tank path engaged${prepTag}`);
    } else if (pathId === "deployer") {
      state.ascendedPath = "deployer";
      state.world2PathOffered = true;
      deployer.slots = 2;
      deployer.fireRate = 1;
      deployer.pulseDamage = 18;
      deployer.beamDamage = 30;
      deployer.bomberDamage = 46;
      deployer.beamUnlocked = false;
      deployer.bomberUnlocked = false;
      player.fireRateMult *= 0.75;
      player.bulletDamage *= 0.8;
      player.speed *= 1.08;
      player.maxHp = player.maxHp * 1.55 + 80;
      player.hp = player.maxHp;
      toast(`Ascended: Deployer${prepTag}`);
    } else if (pathId === "transcendental") {
      state.ascendedPath = "transcendental";
      state.world2PathOffered = true;
      transcend.cooldown = 1.58;
      transcend.damage = 54;
      transcend.width = 13;
      transcend.shotCount = 1;
      transcend.shotSpread = 0.14;
      transcend.aftershock = false;
      transcend.entropy = false;
      transcend.phaseMantle = false;
      transcend.charge = 0;
      transcend.chargeGain = 1;
      transcend.novaDamage = 120;
      transcend.novaRadius = 145;
      player.fireRateMult = Math.max(0.92, player.fireRateMult * 0.76);
      player.maxHp = player.maxHp * 1.5 + 90;
      player.hp = player.maxHp;
      player.regen += 1.2;
      toast(`Ascended: Transcendental${prepTag}`);
    } else if (pathId === "colossal") {
      state.path = "colossal";
      state.world3PathOffered = true;
      player.maxHp = player.maxHp * 3.2 + 420;
      player.hp = player.maxHp;
      player.regen += 4.2;
      player.speed *= 0.72;
      player.ramDamage *= 3.9;
      player.radius = 34;
      player.damageReduction = Math.max(player.damageReduction, 0.32);
      toast(`World III Path: Colossal${prepTag}`);
    } else if (pathId === "create") {
      state.path = "create";
      state.world3PathOffered = true;
      createPath.slots = 3;
      createPath.size = 1.35;
      applyCreateModeStats("spray");
      createPath.pathRateSync = false;
      createPath.instantAim = false;
      createPath.botRegen = 0;
      createPath.dangerAvoidance = false;
      applyCreateFullUpgradeProgress();
      player.maxHp = player.maxHp * 2.55 + 260;
      player.hp = player.maxHp;
      player.regen += 3.1;
      player.speed *= 0.94;
      player.damageReduction = Math.max(player.damageReduction, 0.18);
      player.radius = 24;
      toast(`World III Path: Create${prepTag}`);
    }

    if (pathId === "deployer") {
      deployer.pulseDamage *= runDamageMult;
      deployer.beamDamage *= runDamageMult;
      deployer.bomberDamage *= runDamageMult;
    } else if (pathId === "transcendental") {
      transcend.damage *= runDamageMult;
      transcend.novaDamage *= runDamageMult;
    } else if (pathId === "create") {
      createPath.damage *= runDamageMult;
    }

    if (state.godMode) {
      maxOutCurrentPathUpgrades();
      applyGodModeBonuses();
      state.points = 0;
      state.upgradeMenuOpen = false;
      state.colossalForgeOpen = false;
      state.createForgeOpen = false;
    }
  }

  function openGodPathMenu() {
    openModal("You're basically god", "", [
      { label: "Spray", desc: "Shoot shoot kill kill", onPick: () => applyPathChoice("spray") },
      { label: "Tank", desc: "Smash smash kill kill", onPick: () => applyPathChoice("tank") },
      { label: "Deployer", desc: "Let the drones do it for you", onPick: () => applyPathChoice("deployer") },
      { label: "Transcendental", desc: "I made this way too overpowered", onPick: () => applyPathChoice("transcendental") },
      { label: "Colossal", desc: "Bye-bye", onPick: () => applyPathChoice("colossal") },
      { label: "Create", desc: "Let the bots do it for you", onPick: () => applyPathChoice("create") },
    ]);
  }

  function destroy() {
    if (!state.running) return;
    state.running = false;
    window.removeEventListener("resize", onResize);
    window.removeEventListener("mousemove", onMouseMove);
    window.removeEventListener("keydown", onKeyDown);
    window.removeEventListener("keyup", onKeyUp);
    for (const eventName of BLOCKED_OVERLAY_EVENTS) {
      root.removeEventListener(eventName, blockOverlayInteraction);
    }
    if (rafId) cancelAnimationFrame(rafId);
    root.remove();
    delete window.__neonRiftSurvivor;
  }

  function openModal(title, subtitle, options) {
    state.modal = { title, subtitle, options };
  }

  function closeModal() {
    state.modal = null;
  }

  function enterIdleMenuGame() {
    state.idleMenuGame = true;
    state.paused = false;
    state.modal = null;
    if (idleGame.parts.length === 0) resetIdleTarget(false);
  }

  function exitIdleMenuGame() {
    state.idleMenuGame = false;
    state.paused = true;
    openStartMenu();
  }

  function handleIdleMenuKeyDown(event) {
    if (event.code === "Digit1" || event.code === "Numpad1") {
      event.preventDefault();
      buyIdleDrones(1);
      return;
    }
    if (event.code === "Digit2" || event.code === "Numpad2") {
      event.preventDefault();
      buyIdleDrones(10);
      return;
    }
    if (event.code === "Digit3" || event.code === "Numpad3") {
      event.preventDefault();
      buyIdleDrones(100);
      return;
    }
    if (event.code === "Digit4" || event.code === "Numpad4") {
      event.preventDefault();
      exitIdleMenuGame();
      return;
    }
    if (event.code === "Digit5" || event.code === "Numpad5") {
      event.preventDefault();
      resetIdleTarget(false);
      idleGame.message = "Target reset";
      idleGame.messageTimer = 1.2;
    }
  }

  function openStartMenu() {
    openModal("Neon Rift Survivor", "Choose options, then start", [
      {
        label: "Start Game",
        desc: "Enter the arena",
        onPick: () => {
          state.gameStarted = true;
          state.paused = false;
          toast("Run started", 1.2);
        },
      },
      {
        label: `Light Mode: ${state.lightMode ? "ON" : "OFF"}`,
        desc: "Brighter visuals",
        onPick: () => {
          state.lightMode = !state.lightMode;
          state.paused = true;
          openStartMenu();
        },
      },
      {
        label: `Optimization: ${state.optimizeMode ? "ON" : "OFF"}`,
        desc: "Simpler models (better FPS)",
        onPick: () => {
          state.optimizeMode = !state.optimizeMode;
          state.paused = true;
          openStartMenu();
        },
      },
      {
        label: "Idle Drone Scanner",
        desc: "Play a separate drone-scrap idle game",
        onPick: () => {
          enterIdleMenuGame();
        },
      },
    ]);
  }

  function onResize() {
    resize();
  }

  function onMouseMove(event) {
    input.mouse.x = event.clientX;
    input.mouse.y = event.clientY;
  }

  function blockOverlayInteraction(event) {
    if (!state.running) return;
    event.preventDefault();
    event.stopPropagation();
  }

  function onKeyDown(event) {
    if (!state.running) return;
    input.keys.add(event.code);

    if (event.code === "Escape") {
      event.preventDefault();
      destroy();
      return;
    }

    if (!state.gameStarted) {
      if (state.idleMenuGame) {
        handleIdleMenuKeyDown(event);
        return;
      }
      if (state.modal) {
        const index = parseInt(event.key, 10);
        if (!Number.isNaN(index) && index >= 1 && index <= state.modal.options.length) {
          event.preventDefault();
          const option = state.modal.options[index - 1];
          if (option) {
            closeModal();
            option.onPick();
          }
        }
      }
      return;
    }

    if (event.code === "KeyP" && !state.modal && !state.gameOver) {
      event.preventDefault();
      state.paused = !state.paused;
      toast(state.paused ? "Paused" : "Resumed", 1.1);
      return;
    }

    if (event.code === "KeyU" && !state.modal && !state.gameOver) {
      event.preventDefault();
      if (state.godMode) {
        toast("God mode auto-maxes upgrades; points disabled", 1.7);
        return;
      }
      state.upgradeMenuOpen = !state.upgradeMenuOpen;
      if (state.upgradeMenuOpen) state.colossalForgeOpen = false;
      if (state.upgradeMenuOpen) state.createForgeOpen = false;
      return;
    }

    if (event.code === "KeyI" && !state.modal && !state.gameOver) {
      event.preventDefault();
      if (state.ascendedPath || (state.path !== "colossal" && state.path !== "create")) {
        toast("Forge is only for Colossal/Create path", 1.7);
        return;
      }
      if (state.godMode) {
        toast("God mode auto-maxes upgrades; points disabled", 1.7);
        return;
      }
      if (state.path === "colossal") {
        if (!colossalForgeUnlocked()) {
          const progress = colossalForgeProgress();
          toast(`Colossal Forge locked (${forgeProgressLockText(progress)})`, 1.8);
          return;
        }
        state.colossalForgeOpen = !state.colossalForgeOpen;
        if (state.colossalForgeOpen) state.createForgeOpen = false;
      } else if (state.path === "create") {
        if (!createForgeUnlocked()) {
          const progress = createForgeProgress();
          toast(`Create Forge locked (${forgeProgressLockText(progress)})`, 1.8);
          return;
        }
        state.createForgeOpen = !state.createForgeOpen;
        if (state.createForgeOpen) state.colossalForgeOpen = false;
      }
      if (state.colossalForgeOpen || state.createForgeOpen) {
        state.upgradeMenuOpen = false;
        state.rebirthShopOpen = false;
      }
      return;
    }

    if (event.code === "KeyK" && !state.modal && !state.gameOver) {
      event.preventDefault();
      if (!REBIRTH_ENABLED) {
        toast("Rebirth is temporarily disabled", 1.8);
        return;
      }
      if (!state.rebirthUnlocked) return;
      state.rebirthShopOpen = !state.rebirthShopOpen;
      if (state.rebirthShopOpen) state.upgradeMenuOpen = false;
      if (state.rebirthShopOpen) state.colossalForgeOpen = false;
      if (state.rebirthShopOpen) state.createForgeOpen = false;
      state.paused = state.rebirthShopOpen;
      return;
    }

    if (event.code === "KeyB" && !state.modal && !state.gameOver) {
      if (!state.beatGameUnlocked) return;
      event.preventDefault();
      triggerBeatGame();
      return;
    }

    if (event.code === "Backslash" && event.key === "|" && !state.gameOver) {
      event.preventDefault();
      state.devMenuOpen = !state.devMenuOpen;
      return;
    }

    if (event.code === "KeyG" && !state.gameOver) {
      event.preventDefault();
      if (!state.godMode) {
        state.godMode = true;
        state.points = 0;
        state.upgradeMenuOpen = false;
        state.colossalForgeOpen = false;
        state.createForgeOpen = false;
        applyGodModeBonuses();
        toast("God mode enabled", 1.6);
        openGodPathMenu();
      } else {
        toast("God mode already active", 1.3);
      }
      return;
    }

    if (event.code === "KeyJ" && state.godMode && !state.gameOver) {
      event.preventDefault();
      openGodPathMenu();
      return;
    }

    if (event.code === "Backquote" && !state.gameOver) {
      event.preventDefault();
      if (event.key === "~") {
        if (!state.world2Unlocked) {
          state.world2Unlocked = true;
          state.world2Prompted = true;
          toast("World II unlocked (press N)", 2.2);
        } else {
          toast("World II already unlocked", 1.5);
        }
        return;
      }

      if (state.world !== 1) {
        toast("Level 20 path skip only works in World I", 1.8);
        return;
      }

      if (state.level < 20) {
        while (state.level < 20) {
          forceLevelUp();
        }
        toast("Dev skip: level 20 reached", 1.8);
      }

      if (!state.path && !state.ascendedPath) {
        state.pathChoiceOffered = false;
        chooseWorld1Path();
      } else {
        toast("Path already chosen", 1.6);
      }
      return;
    }

    if (event.code === "KeyN" && !state.modal && !state.gameOver) {
      event.preventDefault();
      if (state.world === 1 && state.world2Unlocked) {
        enterWorld2();
      } else if (state.world >= 2) {
        toast("Already beyond World II", 1.5);
      } else if (!state.world2Unlocked) {
        toast("World II is locked until level 75", 1.9);
      }
      return;
    }

    if (event.code === "KeyM" && !state.modal && !state.gameOver) {
      if (state.world !== 2) return;
      event.preventDefault();
      if (state.level >= 100 || state.world3Unlocked) {
        state.world3Unlocked = true;
        enterWorld3();
      } else {
        toast("World III hotkey M unlocks at World II level 100", 1.9);
      }
      return;
    }

    if (event.code === "Minus" && event.key === "_" && !state.gameOver) {
      event.preventDefault();
      state.world3Unlocked = true;
      state.world3Prompted = true;
      enterWorld3(true);
      return;
    }

    if (state.gameOver && event.code === "KeyR") {
      event.preventDefault();
      restartRun();
      return;
    }

    if (state.rebirthShopOpen && event.code === "KeyR" && !state.gameOver) {
      event.preventDefault();
      if (!REBIRTH_ENABLED) {
        state.rebirthShopOpen = false;
        toast("Rebirth is temporarily disabled", 1.8);
        return;
      }
      performRebirth();
      return;
    }

    if (state.modal) {
      const index = parseInt(event.key, 10);
      if (!Number.isNaN(index) && index >= 1 && index <= state.modal.options.length) {
        event.preventDefault();
        const option = state.modal.options[index - 1];
        if (option) {
          closeModal();
          option.onPick();
        }
      }
      return;
    }

    if (state.colossalForgeOpen) {
      const index = parseInt(event.key, 10);
      if (!Number.isNaN(index) && index >= 1 && index <= COLOSSAL_FORGE_UPGRADES.length) {
        event.preventDefault();
        buyColossalForgeUpgrade(index - 1);
      }
      return;
    }

    if (state.createForgeOpen) {
      const index = parseInt(event.key, 10);
      if (!Number.isNaN(index) && index >= 1 && index <= CREATE_FORGE_UPGRADES.length) {
        event.preventDefault();
        buyCreateForgeUpgrade(index - 1);
      }
      return;
    }

    if (state.upgradeMenuOpen) {
      const index = parseInt(event.key, 10);
      if (!Number.isNaN(index) && index >= 1 && index <= 9) {
        event.preventDefault();
        buyUpgrade(index - 1);
      }
      return;
    }

    if (state.rebirthShopOpen) {
      if (!REBIRTH_ENABLED) {
        state.rebirthShopOpen = false;
        toast("Rebirth is temporarily disabled", 1.8);
        return;
      }
      const index = parseInt(event.key, 10);
      if (!Number.isNaN(index) && index >= 1 && index <= 9) {
        event.preventDefault();
        buyRebirthUpgrade(index - 1);
      }
      return;
    }

  }

  function onKeyUp(event) {
    input.keys.delete(event.code);
  }

  window.addEventListener("resize", onResize);
  window.addEventListener("mousemove", onMouseMove);
  window.addEventListener("keydown", onKeyDown);
  window.addEventListener("keyup", onKeyUp);
  for (const eventName of BLOCKED_OVERLAY_EVENTS) {
    root.addEventListener(eventName, blockOverlayInteraction, { passive: false });
  }

  function forceLevelUp() {
    state.level += 1;
    if (state.godMode) state.points = 0;
    else state.points += 1;
    refreshXpNeed();
    player.hp = Math.min(player.maxHp, player.hp + player.maxHp * 0.08);
    onLevelMilestones();
  }

  function gainXp(amount) {
    if (amount <= 0 || state.gameOver) return;
    state.xp += amount * state.xpGainMult;
    while (state.xp >= state.xpNeed) {
      state.xp -= state.xpNeed;
      forceLevelUp();
      toast(state.godMode ? `Level ${state.level}!` : `Level ${state.level}! +1 upgrade point`, 1.6);
    }
  }

  function chooseWorld1Path() {
    if (state.pathChoiceOffered) return;
    state.pathChoiceOffered = true;
    openModal("Pick Your Path (World I)", "Choose with number keys", [
      {
        label: "Spray",
        desc: "Shoot shoot kill kill",
        onPick: () => applyPathChoice("spray"),
      },
      {
        label: "Tank",
        desc: "Smash smash kill kill",
        onPick: () => applyPathChoice("tank"),
      },
    ]);
  }

  function chooseWorld2Path() {
    if (state.world2PathOffered) return;
    state.world2PathOffered = true;
    openModal("World II Ascension", "New path replaces old combat style", [
      {

  function spawnOffscreenPosition() {
    const side = irand(0, 3);
    const margin = 80;
    if (side === 0) return { x: -margin, y: rand(-margin, height + margin) };
    if (side === 1) return { x: width + margin, y: rand(-margin, height + margin) };
    if (side === 2) return { x: rand(-margin, width + margin), y: -margin };
    return { x: rand(-margin, width + margin), y: height + margin };
  }

  function createEnemy(type, options = {}) {
    const base = enemyBase(type);
    if (!base) return null;
    const levelFactor = state.world === 1
      ? 1 + Math.max(0, state.level - 1) * 0.018
      : 1 + Math.max(0, state.level - 1) * 0.024;
    const earlyLevelT = clamp(state.level / 10, 0, 1);
    const earlyHpMult = state.world === 1 ? lerp(0.52, 1, earlyLevelT) : 1;
    const earlySpeedMult = state.world === 1 ? lerp(0.62, 1, earlyLevelT) : 1;
    const earlyDamageMult = state.world === 1 ? lerp(0.28, 1, earlyLevelT) : 1;

    const pos = options.x != null && options.y != null
      ? { x: options.x, y: options.y }
      : type === "xpCache"
        ? { x: rand(120, width - 120), y: rand(100, height - 100) }
        : spawnOffscreenPosition();

    const boss = Boolean(options.boss);
    const hpScale = boss ? 1 : Math.pow(levelFactor, 1.23) * earlyHpMult;
    const speedScale = boss ? 1 : (1 + (levelFactor - 1) * 0.38) * earlySpeedMult;
    const damageScale = boss ? 1 : (1 + (levelFactor - 1) * 0.75) * earlyDamageMult;
    const sizeScale = boss ? 1 : 1 + (levelFactor - 1) * 0.15;
    const xpScale = boss ? 1 : 1 + (levelFactor - 1) * 0.82;

    const enemy = {
      type,
      x: pos.x,
      y: pos.y,
      vx: 0,
      vy: 0,
      hp: base.hp * hpScale,
      maxHp: base.hp * hpScale,
      speed: base.speed * speedScale,
      size: base.size * sizeScale,
      damage: base.damage * damageScale,
      xp: base.xp * xpScale,
      color: base.color,
      boss,
      dead: false,
      modeIndex: 0,
      modeTimer: 2.3,
      fireTimer: rand(0.2, 1.0),
      aiTimer: rand(0.2, 0.8),
      angle: rand(0, TAU),
      phase: rand(0, TAU),
      summonTimer: rand(3, 6),
      invuln: options.invuln || 0,
      hexOriginal: Boolean(options.hexOriginal),
      hexGroup: options.hexGroup || 0,
      ramHitCd: 0,
      transHitCd: 0,
      immobile: type === "xpCache" || type === "axiomTurret",
      healthBar: 1,
      velMult: 1,
      dotTimer: 0,
      dotDamage: 0,
      stage: options.stage || 0,
      crimsonVariant: Boolean(options.crimsonVariant),
      beamCharge: 0,
      beamChargeMax: 0,
      summonFxTimer: options.summonFxTimer || 0,
      phaseOneMaxHp: 0,
      phaseTwoMaxHp: 0,
      reforming: false,
      reformTimer: 0,
      reformDuration: 0,
      reformBar1: 0,
      reformBar2: 0,
    };

    if (type === "xpCache" && !boss) {
      const rampTo55 = clamp((state.level - 25) / 30, 0, 1);
      const rampPost55 = clamp((state.level - 55) / 40, 0, 1);
      const hpScaleCache = state.level <= 55
        ? lerp(0.28, 0.62, rampTo55)
        : lerp(0.62, 1.05, rampPost55);
      const damageScaleCache = state.level <= 55
        ? lerp(0.24, 0.55, rampTo55)
        : lerp(0.55, 0.92, rampPost55);
      const xpScaleCache = state.level <= 55
        ? lerp(0.64, 0.82, rampTo55)
        : lerp(0.82, 1.08, rampPost55);
      const cooldownScale = state.level <= 55
        ? lerp(1.85, 1.15, rampTo55)
        : lerp(1.15, 0.78, rampPost55);

      enemy.hp *= hpScaleCache;
      enemy.maxHp *= hpScaleCache;
      enemy.damage *= damageScaleCache;
      enemy.xp *= xpScaleCache;
      enemy.fireTimer = rand(0.75, 1.05) * cooldownScale;
    }

    return enemy;
  }

  function hasBoss() {
    return state.enemies.some((enemy) => enemy.boss && !enemy.dead);
  }

  function hyperDodecaFightActive() {
    if (!state.hyperDodecaFight) return false;
    const active = state.enemies.some((enemy) => enemy.type === "bossHyperDodeca" && !enemy.dead);
    if (!active) state.hyperDodecaFight = false;
    return active;
  }

  function hyperBossQualityScale() {
    if (!hyperDodecaFightActive()) return 1;
    if (state.fps >= 58) return 1;
    if (state.fps >= 45) return 0.85;
    if (state.fps >= 35) return 0.68;
    if (state.fps >= 25) return 0.52;
    return 0.4;
  }

  function dynamicEnemyBulletCap() {
    if (!hyperDodecaFightActive()) return 1400;
    const quality = hyperBossQualityScale();
    return Math.max(120, Math.round(150 + quality * 140));
  }

  function dynamicPlayerBulletCap() {
    if (!hyperDodecaFightActive()) return 1800;
    const quality = hyperBossQualityScale();
    return Math.max(180, Math.round(230 + quality * 470));
  }

  function hyperCreateBotCap() {
    if (!hyperDodecaFightActive()) return createPath.slots;
    const quality = hyperBossQualityScale();
    return Math.max(20, Math.round(18 + quality * 54));
  }

  function majorBossFightActive() {
    return state.enemies.some(
      (enemy) => enemy.boss && !enemy.dead
        && (
          enemy.type === "bossSuper" ||
          enemy.type === "bossW2A" ||

          enemy.type === "bossW2Hex" ||
          enemy.type === "bossW2Tri" ||

  function world2BossFightActive() {
    return state.enemies.some(
      (enemy) => enemy.boss && !enemy.dead
        && (
          enemy.type === "bossW2A" ||
          enemy.type === "bossW2B" ||

    );
