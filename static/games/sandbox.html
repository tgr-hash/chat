<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sandbox Circle</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }
  </style>
</head>
<body>
<script>
(() => {
  if (document.getElementById("powderCircle")) return;

  const B = 3, R = 60, D = R * 2, U = 50;
  const W = D, H = D;
  const A = 0, S = 1, WTR = 2, SD = 3;

  const M = [
    { id: S, n: "Block", c: "#000" },
    { id: WTR, n: "Water", c: "#1e90ff" },
    { id: SD, n: "Sand", c: "#d2b48c" }
  ];

  let sel = S, md = false, erase = false, bs = 1;
  const MIN = 1, MAX = 8;

  const c = document.createElement("canvas");
  c.id = "powderCircle";
  c.width = W * B;
  c.height = H * B + U;

  Object.assign(c.style, {
    position: "absolute",
    left: "50%",
    top: "50%",
    transform: "translate(-50%,-50%)",
    background: "#fff",
    border: "2px solid #aaa",
    cursor: "crosshair"
  });

  document.body.appendChild(c);

  const x = c.getContext("2d");
  const g = Array.from({ length: H }, () => Array(W).fill(A));
  const cx = R, cy = R;

  const inside = (x0, y) => {
    const dx = x0 - cx, dy = y - cy;
    return dx * dx + dy * dy <= R * R;
  };

  const step = () => {
    for (let y = H - 2; y >= 0; y--) {
      for (let x0 = 0; x0 < W; x0++) {
        if (!inside(x0, y)) continue;

        const v = g[y][x0];

        if (v === SD) {
          const ny = y + 1;
          if (inside(x0, ny)) {
            const b = g[ny][x0];
            if (b === A || b === WTR) {
              g[ny][x0] = SD;
              g[y][x0] = b;
            }
          }
        }

        if (v === WTR) {
          const ny = y + 1;
          if (inside(x0, ny) && g[ny][x0] === A) {
            g[ny][x0] = WTR;
            g[y][x0] = A;
          } else {
            const d = Math.random() < 0.5 ? [-1, 1] : [1, -1];
            for (const dx of d) {
              const nx = x0 + dx;
              if (inside(nx, y) && g[y][nx] === A) {
                g[y][nx] = WTR;
                g[y][x0] = A;
                break;
              }
            }
          }
        }
      }
    }
  };

  setInterval(step, 250);

  const draw = () => {
    x.clearRect(0, 0, c.width, c.height);

    for (let y = 0; y < H; y++) {
      for (let x0 = 0; x0 < W; x0++) {
        if (!inside(x0, y)) continue;
        const v = g[y][x0];
        if (v !== A) {
          x.fillStyle = M.find(m => m.id === v).c;
          x.fillRect(x0 * B, y * B, B, B);
        }
      }
    }

    x.strokeStyle = "#999";
    x.beginPath();
    x.arc(cx * B, cy * B, R * B, 0, Math.PI * 2);
    x.stroke();

    x.fillStyle = "#f0f0f0";
    x.fillRect(0, H * B, c.width, U);

    M.forEach((m, i) => {
      const px = 15 + i * 90, py = H * B + 10;
      x.fillStyle = m.c;
      x.fillRect(px, py, 24, 24);
      x.fillStyle = "#000";
      x.font = "13px sans-serif";
      x.fillText(m.n, px + 32, py + 17);
      if (sel === m.id) x.strokeRect(px - 2, py - 2, 28, 28);
    });

    x.font = "12px monospace";
    x.fillText("Brush: " + bs, c.width - 90, H * B + 30);

    requestAnimationFrame(draw);
  };

  draw();

  const paint = (mx, my) => {
    const gx = Math.floor(mx / B);
    const gy = Math.floor(my / B);

    for (let dy = -bs; dy <= bs; dy++) {
      for (let dx = -bs; dx <= bs; dx++) {
        if (dx * dx + dy * dy > bs * bs) continue;

        const x0 = gx + dx, y0 = gy + dy;
        if (x0 < 0 || y0 < 0 || x0 >= W || y0 >= H) continue;
        if (!inside(x0, y0)) continue;

        g[y0][x0] = erase ? A : sel;
      }
    }
  };

  c.addEventListener("mousedown", e => {
    const r = c.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;

    md = true;
    erase = e.button === 2;

    if (my > H * B) {
      M.forEach((m, i) => {
        const px = 15 + i * 90, py = H * B + 10;
        if (mx >= px && mx <= px + 24 && my >= py && my <= py + 24) {
          sel = m.id;
        }
      });
      return;
    }

    paint(mx, my);
  });

  c.addEventListener("mousemove", e => {
    if (!md) return;
    const r = c.getBoundingClientRect();
    paint(e.clientX - r.left, e.clientY - r.top);
  });

  window.addEventListener("mouseup", () => md = false);
  c.addEventListener("contextmenu", e => e.preventDefault());

  document.addEventListener("keydown", e => {
    if (e.key === "=") bs = Math.min(MAX, bs + 1);
    if (e.key === "-") bs = Math.max(MIN, bs - 1);

    if (e.key === "Escape") {
      document.body.innerHTML = "";
    }

    if (e.key.toLowerCase() === "r") {
      for (let y = 0; y < H; y++) {
        for (let x0 = 0; x0 < W; x0++) {
          g[y][x0] = A;
        }
      }
    }
  });

})();
</script>
</body>
</html>
