
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Flappy Bird</title>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body style="margin:0; background:black; overflow:hidden;">

<script>
/* --- Flappy Bird Game --- */

// Setup canvas
const canvas = document.createElement("canvas");
canvas.id = "fB";
canvas.width = 400;
canvas.height = 600;
Object.assign(canvas.style, {
  position: "fixed",
  left: "50%",
  top: "50%",
  transform: "translate(-50%, -50%)",
  zIndex: 999999999,
  border: "4px solid #333",
  borderRadius: "10px"
});
document.body.appendChild(canvas);

const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const birdImg = new Image();
birdImg.src = "https://art.pixilart.com/b0f4ca051aa111f.png";

const pipeImg = new Image();
pipeImg.src = "./assets/flappybirdpipe.png";

// Game state
let ball = { x: 80, y: 300, v: 0, r: 12 };
let pipes = [];
let frame = 0;
const gravity = 0.65;
const jump = -7.5;
let gameOver = false;
let score = 0;
let highScore = 0;
const colors = ["#2ecc71", "#3498db", "#9b59b6", "#e67e22", "#e74c3c"];

// Helpers
function pipeColor() {
  return colors[Math.floor(score / 20) % colors.length];
}

function addPipe() {
  const h = Math.random() * 250 + 50;
  pipes.push({ x: 400, top: h, bot: h + 150, scored: false });
}

function reset() {
  ball.y = 300;
  ball.v = 0;
  pipes = [];
  frame = 0;
  score = 0;
  gameOver = false;
}

// Game loop
function update() {
  if (gameOver) return;

  ball.v += gravity;
  ball.y += ball.v;

  // Check collisions
  if (ball.y < 0 || ball.y > canvas.height) {
    gameOver = true;
    highScore = Math.max(highScore, score);
  }

  // Add new pipe every 90 frames
  if (frame % 90 === 0) addPipe();

  pipes.forEach(p => {
    p.x -= 2;

    // Collision detection
    if (ball.x + ball.r > p.x && ball.x - ball.r < p.x + 50 &&
        (ball.y - ball.r < p.top || ball.y + ball.r > p.bot)) {
      gameOver = true;
      highScore = Math.max(highScore, score);
    }

    // Score
    if (!p.scored && p.x + 50 < ball.x) {
      p.scored = true;
      score++;
    }
  });

  pipes = pipes.filter(p => p.x > -50);
  frame++;
}

function draw() {
  // Background
  ctx.fillStyle = "#70c5ce";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Bird (pixel art)
const size = 32;
ctx.drawImage(
  birdImg,
  ball.x - size / 2,
  ball.y - size / 2,
  size,
  size);

  // Pipes
 pipes.forEach(p => {
  const width = 50;
  const height = 400;

  // TOP PIPE (no flip)
  ctx.drawImage(
    pipeImg,
    p.x,
    p.top - height,
    width,
    height
  );

 // BOTTOM PIPE (flipped correctly)
ctx.save();
ctx.translate(p.x, p.bot + height); // move origin to bottom pipe bottom edge
ctx.scale(1, -1); // flip vertically
ctx.drawImage(
  pipeImg,
  0,
  0,
  width,
  height
);
ctx.restore();
});
  

  // Scores
  ctx.fillStyle = "#000";
  ctx.font = "20px 'Pixelify Sans', sans-serif";
  ctx.fillText("Score: " + score, 20, 30);
  ctx.fillText("High: " + highScore, 320, 30);

  // Game over
  if (gameOver) {
    ctx.fillStyle = "red";
    ctx.font = "30px 'Pixelify Sans', sans-serif";
    ctx.fillText("GAME OVER", 90, 300);
    ctx.font = "16px 'Pixelify Sans', sans-serif";
    ctx.fillText("Click/Space/R Restart", 65, 330);
    ctx.fillText("ESC Quit", 145, 355);
  }
}

// Main loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Controls
function flap() {
  if (gameOver) reset();
  ball.v = jump;
}

function keyHandler(e) {
  if (e.code === "Space") flap();
  if (e.key.toLowerCase() === "r") reset();
  if (e.code === "Escape") {
    canvas.remove();
    document.removeEventListener("keydown", keyHandler);
  }
}

document.addEventListener("keydown", keyHandler);
canvas.addEventListener("click", flap);

// Start the game
let assetsLoaded = 0;

function checkStart() {
  assetsLoaded++;
  if (assetsLoaded === 2) {
    loop();
  }
}

birdImg.onload = checkStart;
pipeImg.onload = checkStart;

</script>

</body>
</html>
