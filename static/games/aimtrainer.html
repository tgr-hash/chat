<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Click Dots Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }
  </style>
</head>
<body>

<script>
"use strict";

if (document.getElementById("clickDotsGame")) {
  // prevent double load
} else {
  const c = document.createElement("canvas");
  c.id = "clickDotsGame";
  c.width = 800;
  c.height = 600;

  Object.assign(c.style, {
    position: "fixed",
    left: "50%",
    top: "50%",
    transform: "translate(-50%,-50%)",
    zIndex: 999999999,
    border: "4px solid #333",
    borderRadius: "10px",
    background: "#111"
  });

  document.body.appendChild(c);

  const ctx = c.getContext("2d");

  let dots = [];
  let score = 0;
  let running = true;
  const GAME_TIME = 30000;
  let startTime = Date.now();

  function spawnDot() {
    const s = Math.random() * 20 + 30;
    const X = Math.random() * (c.width - s);
    const Y = Math.random() * (c.height - s);

    dots.push({
      x: X,
      y: Y,
      size: s,
      created: Date.now(),
      lifespan: 1000 + 2000 * Math.random()
    });
  }

  function draw() {
    if (!running) return;

    const now = Date.now();
    const elapsed = now - startTime;

    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, c.width, c.height);

    dots = dots.filter(d => now - d.created < d.lifespan);

    ctx.fillStyle = "#a0dfff";
    dots.forEach(d => {
      ctx.beginPath();
      ctx.arc(
        d.x + d.size / 2,
        d.y + d.size / 2,
        d.size / 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    });

    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("Score: " + score, 10, 25);
    ctx.fillText(
      "Time: " + Math.max(0, Math.ceil((GAME_TIME - elapsed) / 1000)) + "s",
      10,
      50
    );

    if (elapsed >= GAME_TIME) {
      running = false;
      ctx.fillStyle = "yellow";
      ctx.font = "30px sans-serif";
      ctx.fillText("TIME'S UP! Final Score: " + score, 200, 300);
      return;
    }

    requestAnimationFrame(draw);
  }

  function clickHandler(e) {
    if (!running) return;

    const r = c.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;

    for (let i = dots.length - 1; i >= 0; i--) {
      const d = dots[i];
      const dx = mx - (d.x + d.size / 2);
      const dy = my - (d.y + d.size / 2);

      if (Math.sqrt(dx * dx + dy * dy) <= d.size / 2) {
        score++;
        dots.splice(i, 1);
        break;
      }
    }
  }

  function keyHandler(e) {
    if (e.key === "Escape") {
      running = false;
      document.removeEventListener("keydown", keyHandler);
      document.removeEventListener("click", clickHandler);
      c.remove();
    }

    if (e.key === "r" || e.key === "R") {
      dots = [];
      score = 0;
      running = true;
      startTime = Date.now();
      draw();
    }
  }

  document.addEventListener("click", clickHandler);
  document.addEventListener("keydown", keyHandler);

  setInterval(() => {
    if (running) spawnDot();
  }, 500);

  draw();
}
</script>

</body>
</html>
