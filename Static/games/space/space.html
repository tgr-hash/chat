<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shooter Game</title>
  <style>
    body {
      margin: 0;
      background: #000000;
      overflow: hidden;
    }
  </style>
</head>
<body>

<script>
(() => {
  if (document.getElementById("shooterGame")) return;

  const c = document.createElement("canvas");
  c.id = "shooterGame";
  c.width = 500;
  c.height = 500;

  Object.assign(c.style, {
    position: "fixed",
    left: "50%",
    top: "50%",
    transform: "translate(-50%,-50%)",
    zIndex: 999999999,
    border: "4px solid #333",
    borderRadius: "10px",
    background: "#000000"
  });

  document.body.appendChild(c);
  const x = c.getContext("2d");

  x.imageSmoothingEnabled = false;

  const playerImg = new Image();
  playerImg.src = "./assets/main.png";

  const enemyImg = new Image();
  enemyImg.src = "./assets/enemy1.gif";

  let keys = {},
      player,
      playerShots = [],
      enemyShots = [],
      enemies = [],
      score = 0,
      high = 0,
      lives = 3,
      gameOver = false,
      run = true,
      lastEnemyShot = 0,
      lastPlayerShot = 0,
      hitAnimation = null;

  const lifeColors = ["dodgerblue", "limegreen", "purple"];

  function reset() {
    player = { x: c.width / 2, y: c.height - 40, r: 12, color: lifeColors[0] };
    playerShots = [];
    enemyShots = [];
    enemies = [];
    score = 0;
    lives = 3;
    gameOver = false;
    hitAnimation = null;
    spawnWave();
  }

  function spawnWave() {
    enemies = [];
    for (let i = 0; i < 5; i++) {
      enemies.push({
  x: 50 + i * 80,
  y: 50,
  w: 32,
  h: 32
});
    }
  }

  function key(e) {
    keys[e.key] = e.type === "keydown";
    if (gameOver && (e.key === "r" || e.key === "R")) reset();
    if (e.key === "Escape") quit();
  }

  function quit() {
    run = false;
    document.removeEventListener("keydown", key);
    document.removeEventListener("keyup", key);
    c.remove();
  }

  function shootPlayer() {
    playerShots.push({
      x: player.x - 2.5,
      y: player.y - player.r - 10,
      w: 5,
      h: 10,
      vy: -6
    });
  }

  function shootEnemies() {
    enemies.forEach(e => {
      enemyShots.push({
        x: e.x + e.w / 2 - 2.5,
        y: e.y + e.h,
        w: 5,
        h: 10,
        vy: 4
      });
    });
  }

  function triggerHitAnimation() {
    hitAnimation = {
      startTime: Date.now(),
      duration: 1500
    };
  }

  function loop() {
    if (!run) return;

    const now = Date.now();
    const freeze = hitAnimation && now - hitAnimation.startTime < hitAnimation.duration;

    if (!gameOver && !freeze) {
    // movement
    if (keys.a || keys.ArrowLeft) player.x -= 5;
    if (keys.d || keys.ArrowRight) player.x += 5;
    if (keys.w || keys.ArrowUp) player.y -= 5;
    if (keys.s || keys.ArrowDown) player.y += 5;

  player.x = Math.max(0, Math.min(c.width, player.x));
  player.y = Math.max(0, Math.min(c.height, player.y));

  // ✅ NEW: shooting
  if ((keys[" "] || keys["Space"]) && now - lastPlayerShot > 500) {
    shootPlayer();
    lastPlayerShot = now;
  }

      player.x = Math.max(0, Math.min(c.width, player.x));
      player.y = Math.max(0, Math.min(c.height, player.y));

    
      if (now - lastEnemyShot > 1000) {
        shootEnemies();
        lastEnemyShot = now;
      }

      playerShots.forEach((s, i) => {
        s.y += s.vy;

        enemies.forEach((e, j) => {
          if (
            s.x < e.x + e.w &&
            s.x + s.w > e.x &&
            s.y < e.y + e.h &&
            s.y + s.h > e.y
          ) {
            score++;
            high = Math.max(high, score);
            enemies.splice(j, 1);
            playerShots.splice(i, 1);
          }
        });

        if (s.y < 0) playerShots.splice(i, 1);
      });

      enemyShots.forEach((s, i) => {
        s.y += s.vy;

        if (
          s.x < player.x + player.r &&
          s.x + s.w > player.x - player.r &&
          s.y < player.y + player.r &&
          s.y + s.h > player.y - player.r
        ) {
          lives--;
          triggerHitAnimation();
          enemyShots.splice(i, 1);

          if (lives > 0) {
            player.color = lifeColors[3 - lives];
          } else {
            gameOver = true;
          }
        }
      });

      if (enemies.length === 0) spawnWave();
    }

    x.clearRect(0, 0, c.width, c.height);

    if (!freeze) {
  // player
  x.drawImage(playerImg, player.x - 16, player.y - 16, 32, 32);

  // enemies
  enemies.forEach(e => {
    x.drawImage(enemyImg, e.x, e.y, 32, 32);
  });

  // shots (THIS WAS MISSING)
  x.fillStyle = "red";
  playerShots.forEach(s => x.fillRect(s.x, s.y, s.w, s.h));

  x.fillStyle = "yellow";
  enemyShots.forEach(s => x.fillRect(s.x, s.y, s.w, s.h));
}
    for (let i = 0; i < lives; i++) {
      x.fillStyle = lifeColors[i];
      x.beginPath();
      x.arc(c.width - 20 - 30 * i, c.height - 20, 10, 0, 2 * Math.PI);
      x.fill();
    }

    if (hitAnimation) {
      const elapsed = now - hitAnimation.startTime;
      if (elapsed < hitAnimation.duration) {
        const progress = elapsed / hitAnimation.duration;
        const radius = progress * 100;

        x.fillStyle = "orange";
        x.beginPath();
        x.arc(player.x, player.y, radius, 0, 2 * Math.PI);
        x.fill();
      } else {
        hitAnimation = null;
      }
    }

    if (gameOver) {
      x.fillStyle = "red";
      x.font = "30px sans-serif";
      x.fillText("GAME OVER", 130, 220);

      x.font = "16px sans-serif";
      x.fillText("R = Reset   ESC = Quit", 130, 250);
    }

    requestAnimationFrame(loop);
  }

  document.addEventListener("keydown", key);
  document.addEventListener("keyup", key);

  reset();
  requestAnimationFrame(loop);

})();

</script>

</body>
</html>
