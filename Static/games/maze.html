<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maze Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }
  </style>
</head>
<body>

<script>
(() => {
  if (document.getElementById("fB")) return;

  const c = document.createElement("canvas");
  c.id = "fB";
  c.width = 400;
  c.height = 400;

  Object.assign(c.style, {
    position: "absolute",
    left: "50%",
    top: "50%",
    transform: "translate(-50%,-50%)",
    zIndex: 999999999,
    border: "4px solid #333",
    borderRadius: "10px",
    background: "#fff"
  });

  document.body.appendChild(c);

  const x = c.getContext("2d");

  const rows = 10, cols = 10;
  const cellSize = c.width / cols;

  const maze = [];
  const visited = [];

  const dirs = [
    [0, -1],
    [1, 0],
    [0, 1],
    [-1, 0]
  ];

  for (let y = 0; y < rows; y++) {
    maze[y] = [];
    visited[y] = [];
    for (let x2 = 0; x2 < cols; x2++) {
      maze[y][x2] = [1, 1, 1, 1];
      visited[y][x2] = false;
    }
  }

  function genMaze(cx, cy) {
    visited[cy][cx] = true;

    const d = dirs.slice().sort(() => Math.random() - 0.5);

    for (let i = 0; i < d.length; i++) {
      const dx = d[i][0], dy = d[i][1];
      const nx = cx + dx, ny = cy + dy;

      if (
        nx >= 0 && nx < cols &&
        ny >= 0 && ny < rows &&
        !visited[ny][nx]
      ) {
        if (dx === 1) {
          maze[cy][cx][1] = 0;
          maze[ny][nx][3] = 0;
        }
        if (dx === -1) {
          maze[cy][cx][3] = 0;
          maze[ny][nx][1] = 0;
        }
        if (dy === 1) {
          maze[cy][cx][2] = 0;
          maze[ny][nx][0] = 0;
        }
        if (dy === -1) {
          maze[cy][cx][0] = 0;
          maze[ny][nx][2] = 0;
        }

        genMaze(nx, ny);
      }
    }
  }

  genMaze(0, 0);

  let player = { x: 0, y: 0 };
  const exit = { x: cols - 1, y: rows - 1 };

  function draw() {
    x.fillStyle = "#fff";
    x.fillRect(0, 0, c.width, c.height);

    x.strokeStyle = "#000";
    x.lineWidth = 2;

    for (let y = 0; y < rows; y++) {
      for (let x2 = 0; x2 < cols; x2++) {
        const cell = maze[y][x2];
        const px = x2 * cellSize;
        const py = y * cellSize;

        // top
        if (cell[0]) {
          x.beginPath();
          x.moveTo(px, py);
          x.lineTo(px + cellSize, py);
          x.stroke();
        }

        // right
        if (cell[1]) {
          x.beginPath();
          x.moveTo(px + cellSize, py);
          x.lineTo(px + cellSize, py + cellSize);
          x.stroke();
        }

        // bottom
        if (cell[2]) {
          x.beginPath();
          x.moveTo(px + cellSize, py + cellSize);
          x.lineTo(px, py + cellSize);
          x.stroke();
        }

        // left
        if (cell[3]) {
          x.beginPath();
          x.moveTo(px, py + cellSize);
          x.lineTo(px, py);
          x.stroke();
        }
      }
    }

    // exit
    x.fillStyle = "green";
    x.fillRect(
      exit.x * cellSize + cellSize / 4,
      exit.y * cellSize + cellSize / 4,
      cellSize / 2,
      cellSize / 2
    );

    // player
    x.fillStyle = "red";
    x.fillRect(
      player.x * cellSize + cellSize / 4,
      player.y * cellSize + cellSize / 4,
      cellSize / 2,
      cellSize / 2
    );
  }

  draw();

  function move(dx, dy) {
    const cell = maze[player.y][player.x];

    if (dx === 1 && cell[1] === 0) player.x++;
    if (dx === -1 && cell[3] === 0) player.x--;
    if (dy === 1 && cell[2] === 0) player.y++;
    if (dy === -1 && cell[0] === 0) player.y--;

    draw();

    if (player.x === exit.x && player.y === exit.y) {
      setTimeout(() => {
        alert("You reached the exit!");
        c.remove();
      }, 10);
    }
  }

  function keyHandler(e) {
    if (e.code === "ArrowUp") move(0, -1);
    if (e.code === "ArrowDown") move(0, 1);
    if (e.code === "ArrowLeft") move(-1, 0);
    if (e.code === "ArrowRight") move(1, 0);
    if (e.code === "Escape") c.remove();
  }

  document.addEventListener("keydown", keyHandler);
})();
</script>

</body>
</html>
