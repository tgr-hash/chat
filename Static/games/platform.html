<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Platform Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
    }
  </style>
</head>
<body>

<script>
(() => {
  if (document.getElementById("platformGame")) return;

  const c = document.createElement("canvas");
  c.id = "platformGame";
  c.width = 400;
  c.height = 500;

  Object.assign(c.style, {
    position: "absolute",
    left: "50%",
    top: "50%",
    transform: "translate(-50%,-50%)",
    zIndex: 999999999,
    border: "4px solid #333",
    borderRadius: "10px",
    background: "#fff"
  });

  document.body.appendChild(c);

  const x = c.getContext("2d");
  const keys = {};

  let player, plats, stars;
  let score = 0, high = 0;
  let running = true, gameOver = false;

  const gravity = 0.4;
  const fallSpeed = 1.4;
  const platH = 8;

  function reset() {
    player = {
      x: c.width / 2,
      y: c.height / 2 - 40,
      r: 10,
      vx: 0,
      vy: 0,
      onGround: false
    };

    plats = [];
    stars = [];
    score = 0;
    gameOver = false;

    const startW = 80;
    const startX = c.width / 2 - startW / 2;
    const startY = c.height / 2;

    plats.push({ x: startX, y: startY, w: startW, h: platH });

    const spacing = 40 * 1.5;
    for (let i = 1; i < 9; i++) spawnPlatform(startY - i * spacing);
  }

  function spawnPlatform(y = -platH) {
    const minW = platH;
    const w = Math.random() * 60 + minW + 30;
    const px = Math.random() * (c.width - w);

    const p = { x: px, y, w, h: platH };
    plats.push(p);

    if (Math.random() < 0.45) {
      stars.push({ s: 12, on: p });
    }
  }

  function key(e) {
    keys[e.key] = e.type === "keydown";

    if (gameOver && (e.key === "r" || e.key === "R")) reset();
    if (e.key === "Escape") quit();
  }

  function quit() {
    running = false;
    document.removeEventListener("keydown", key);
    document.removeEventListener("keyup", key);
    c.remove();
  }

  function loop() {
    if (!running) return;

    if (!gameOver) {
      player.vx =
        (keys.a || keys.ArrowLeft ? -4 : 0) +
        (keys.d || keys.ArrowRight ? 4 : 0);

      if ((keys.w || keys.ArrowUp || keys[" "]) && player.onGround) {
        player.vy = -9;
        player.onGround = false;
      }

      player.vy += gravity;
      player.x += player.vx;
      player.y += player.vy;

      if (player.x < 0) player.x = 0;
      if (player.x > c.width) player.x = c.width;

      player.onGround = false;

      for (let i = plats.length - 1; i >= 0; i--) {
        const p = plats[i];
        p.y += fallSpeed;

        if (
          player.vy > 0 &&
          player.y + player.r > p.y &&
          player.y + player.r < p.y + p.h &&
          player.x > p.x &&
          player.x < p.x + p.w
        ) {
          player.y = p.y - player.r;
          player.vy = 0;
          player.onGround = true;
        }

        if (p.y > c.height) {
          stars = stars.filter(s => s.on !== p);
          plats.splice(i, 1);
          spawnPlatform();
        }
      }

      for (let i = stars.length - 1; i >= 0; i--) {
        const s = stars[i];
        const p = s.on;

        const sx = p.x + p.w / 2 - s.s / 2;
        const sy = p.y - 14;

        if (
          Math.abs(player.x - (sx + s.s / 2)) < player.r + s.s / 2 &&
          Math.abs(player.y - (sy + s.s / 2)) < player.r + s.s / 2
        ) {
          score++;
          high = Math.max(high, score);
          stars.splice(i, 1);
        }
      }

      if (player.y - player.r > c.height) gameOver = true;
    }

    x.clearRect(0, 0, c.width, c.height);

    x.fillStyle = "black";
    plats.forEach(p => x.fillRect(p.x, p.y, p.w, p.h));

    x.fillStyle = "gold";
    stars.forEach(s => {
      const p = s.on;
      x.fillRect(p.x + p.w / 2 - s.s / 2, p.y - 14, s.s, s.s);
    });

    x.fillStyle = "dodgerblue";
    x.beginPath();
    x.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    x.fill();

    x.fillStyle = "black";
    x.font = "18px sans-serif";
    x.fillText("Score: " + score, 10, 22);
    x.fillText("High: " + high, c.width - 110, 22);

    if (gameOver) {
      x.fillStyle = "red";
      x.font = "30px sans-serif";
      x.fillText("GAME OVER", 105, 240);
      x.font = "16px sans-serif";
      x.fillText("R = Restart   ESC = Quit", 95, 270);
    }

    requestAnimationFrame(loop);
  }

  document.addEventListener("keydown", key);
  document.addEventListener("keyup", key);

  reset();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
